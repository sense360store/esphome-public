substitutions:
  fallback_ssid: "${device_name} FB"

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  fast_connect: true
  # Note: power_save_mode: none is incompatible with esp32_ble/bluetooth_proxy
  # Using light mode for better compatibility while maintaining reasonable performance
  power_save_mode: light
  ap:
    ssid: "${fallback_ssid}"
    # SEC-ESP-FALLBACK-AP-001: the fallback access-point password is a real
    # credential (the AP + captive_portal activates whenever the device cannot
    # join WiFi), so it must come from secrets.yaml — never a committed literal
    # baked identically into every shipped unit. Mirror the main WiFi block
    # above. Provide a unique, strong value per build in secrets.yaml
    # (see secrets.example.yaml).
    password: !secret fallback_ap_password

captive_portal:
