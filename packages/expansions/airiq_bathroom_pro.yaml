# ============================================================================
# SENSE360 AIRIQ BATHROOM PRO MODULE — HARDWARE DRIVER  (legacy alias)
# ============================================================================
# SKU: S360-BATH-P
#
# PACKAGE-RENAME-003 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the Pro VentIQ hardware stack
# (base SHT4x + BMP390 + SGP41 plus MLX90614 IR surface temperature @ 0x5A and
# SPS30 particulate matter @ 0x69, all on `bathroom_i2c_id: core_i2c`) now lives
# in the SKU-aligned board package `packages/boards/s360-211-ventiq-pro.yaml`.
# This legacy functional path is retained as a thin alias that `!include`s that
# board package, so the resolved config is byte-identical to before the
# source-of-truth flip.
#
# Why this path is preserved (NOT deleted): the Phase-2 naming alias
# `ventiq_extended.yaml` still binds this path. Per the alias policy (§3.3), no
# alias is dropped while a live binder exists; alias removal is a separate later
# slice gated on the binder count reaching zero.
#
# Sensors / pin assignment are documented in the board package this file
# aliases (packages/boards/s360-211-ventiq-pro.yaml).
# ============================================================================

packages:
  board_ventiq: !include ../boards/s360-211-ventiq-pro.yaml
