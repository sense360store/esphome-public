# ============================================================================
# SENSE360 FAN EXPANSION MODULE - TRIAC (AC PHASE-CUT) VERSION
# ============================================================================
# AC fan dimming via TRIAC + zero-crossing detection.
#
# Use this driver for standard AC ceiling/extractor fans where speed is
# controlled by phase-cut dimming. NOT interchangeable with FanRelay,
# FanPWM, or FanDAC — the GPIO routing and driver code differ.
#
# Required pin substitutions (must come from the parent board file):
#   fan_triac_gate_pin  -> TRIAC gate output
#   fan_triac_zc_pin    -> Zero-crossing input
#
# Both pins MUST be **direct, interrupt-capable ESP32 GPIOs**. This driver
# uses ESPHome's `output: ac_dimmer` platform, which attaches a hardware
# interrupt to `zero_cross_pin` and toggles `gate_pin` from a timed ISR with
# sub-millisecond precision (typical gate-firing resolution <100 µs on
# 50/60 Hz mains). I²C-attached GPIO expanders (e.g. the SX1509 on the
# Sense360 Core) cannot meet that timing and are NOT supported as a source
# for either pin.
#
# Sense360 Core (S360-100-R4) FanTRIAC mapping status: SCHEMATIC-BACKED,
# COMPILE-ONLY, ADVANCED-PREVIEW; bench + COMPLIANCE-001 pending.
# The SX1509-free S360-100-R4 Core respin routes the J15 TRIAC connector nets
# TRI_GPIO1 / TRI_GPIO2 DIRECT to interrupt-capable ESP32-S3 GPIOs, so this
# ac_dimmer driver works: the parent bundle maps fan_triac_gate_pin -> IO13
# (gate, MOC3023M) and fan_triac_zc_pin -> IO14 (zero-cross, EL814). This
# resolves the HW-005 BUILDABILITY blocker only; it is NOT bench verification
# and NOT COMPLIANCE-001 mains-voltage sign-off, so the config stays
# compile-only / advanced-preview (never stable / recommended / default /
# buyable / WebFlash-exposed).
# See: docs/hardware/s360-320-r4-triac.md and docs/hardware/s360-100-r4-core.md
#
# IMPORTANT:
#   - The fan load is mains AC. Wiring must be done by a qualified
#     electrician and only with a TRIAC dimmer module rated for the load.
#   - This module replaces, and is NOT compatible with, fan_pwm.yaml /
#     fan_gp8403.yaml / fan_relay.yaml.
# ============================================================================

substitutions:
  # GPIO Configuration
  # fan_triac_gate_pin and fan_triac_zc_pin MUST be provided by the parent
  # board file. Both must resolve to **direct, interrupt-capable ESP32 GPIOs**
  # — expander-driven pins (SX1509, PCA9555, etc.) are NOT acceptable because
  # the ac_dimmer ISR timing cannot be served across I²C. See the header
  # comment above and the FanTRIAC mapping resolution in
  # docs/release-one-hardware-audit.md before adding new product YAMLs that
  # consume this package.

  # Mains line frequency (Hz). Use "60" for 60 Hz regions.
  fan_triac_line_frequency: "50"

  # Speed limits (percentages)
  fan_min_speed: "10"
  fan_max_speed: "100"
  fan_default_speed: "50"

  # Minimum dimmer brightness floor (some fans stall below this)
  fan_triac_min_power: "10"

# ============================================================================
# AC Dimmer (TRIAC + zero-cross detection)
# ============================================================================
output:
  - platform: ac_dimmer
    id: fan_triac_output
    gate_pin: ${fan_triac_gate_pin}
    zero_cross_pin:
      number: ${fan_triac_zc_pin}
      mode:
        input: true
      inverted: false
    method: leading
    min_power: ${fan_triac_min_power}%
    init_with_half_cycle: true

# ============================================================================
# Fan Component (speed-mapped to TRIAC dimmer)
# ============================================================================
fan:
  - platform: speed
    id: fan_controller
    name: "${friendly_name} Fan"
    output: fan_triac_output
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF

# ============================================================================
# Globals for Fan Control (shared with feature profiles)
# ============================================================================
globals:
  - id: fan_target_speed
    type: int
    restore_value: true
    initial_value: '${fan_default_speed}'

  - id: fan_quiet_mode
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: fan_auto_mode
    type: bool
    restore_value: true
    initial_value: 'false'

# ============================================================================
# Diagnostic sensor — current speed percentage
# ============================================================================
sensor:
  - platform: template
    id: fan_speed_percent
    name: "${friendly_name} Fan Speed"
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      if (id(fan_controller).state) {
        return id(fan_controller).speed;
      }
      return 0.0f;

# ============================================================================
# Scripts for Fan Control
# ============================================================================
script:
  - id: fan_set_speed
    mode: single
    parameters:
      speed: int
    then:
      - lambda: |-
          int target = speed;
          if (target < 0) target = 0;
          if (target > 100) target = 100;

          if (target > 0 && target < ${fan_min_speed}) {
            target = ${fan_min_speed};
          }

          if (id(fan_quiet_mode) && target > 50) {
            target = 50;
          }

          id(fan_target_speed) = target;

          if (target == 0) {
            auto call = id(fan_controller).turn_off();
            call.perform();
          } else {
            auto call = id(fan_controller).turn_on();
            call.set_speed(target);
            call.perform();
          }

  - id: fan_emergency_stop
    mode: single
    then:
      - fan.turn_off: fan_controller
      - lambda: |-
          id(fan_target_speed) = 0;
          ESP_LOGW("fan", "TRIAC emergency stop activated");
