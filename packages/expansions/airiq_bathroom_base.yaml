# ============================================================================
# SENSE360 AIRIQ BATHROOM BASE MODULE — HARDWARE DRIVER  (legacy alias)
# ============================================================================
# SKU: S360-BATH-B
#
# PACKAGE-RENAME-003 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the base VentIQ hardware
# stack (SHT4x temp/humidity @ 0x44, BMP390 pressure @ 0x77, SGP41 VOC/NOx @
# 0x59, all on `bathroom_i2c_id: core_i2c`) now lives in the SKU-aligned board
# package `packages/boards/s360-211-ventiq.yaml`. This legacy functional path is
# retained as a thin alias that `!include`s that board package, so the resolved
# config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): the production product binds the
# board package directly, but `products/sense360-core-ceiling-bathroom.yaml`,
# the FanRelay / FanTRIAC bundles, the VentIQ compile-only target
# (`products/compile-only/ceiling-poe-ventiq.yaml`), the Phase-2 naming alias
# `ventiq.yaml`, and the compat wrapper `bathroom.yaml` still bind this path.
# Per the alias policy (§3.3), no alias is dropped while a live binder exists;
# alias removal is a separate later slice gated on the binder count reaching
# zero.
#
# Sensors / pin assignment are documented in the board package this file
# aliases (packages/boards/s360-211-ventiq.yaml).
# ============================================================================

packages:
  board_ventiq: !include ../boards/s360-211-ventiq.yaml
