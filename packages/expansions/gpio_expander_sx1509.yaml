# ============================================================================
# LEGACY / SUPERSEDED SX1509 FAN PATH (SX1509-RECONCILE-001)
# ============================================================================
# This SX1509 GPIO/PWM expander module declares a fan PWM + tach path on the
# SX1509 (`U3`) expander. Per docs/hardware/s360-100-native-fan-gpio-map.md
# (S360-100-NATIVE-FAN-GPIO-MAP-001) the refreshed S360-100-R4 schematic
# REMOVES the SX1509 from the fan signal path: every per-fan PWM-drive net
# (`TachPMW1..4`) and tach net (`Pul_Cou1..4`) plus the shared `TachIO`
# passthrough now terminate on native ESP32-S3 GPIO. This package is therefore
# LEGACY / SUPERSEDED for the fan path and is NOT the current FanPWM
# implementation. The native successor is
# packages/expansions/fan_pwm_native.yaml.
#
# RETIREMENT DISPOSITION (SX1509-RECONCILE-001): kept-with-reason, NOT deleted.
#   * No surviving product / bundle / package `!include`s this file (verified:
#     only doc / comment references remain).
#   * It is retained because tests/test_core_abstract_bus.py reads its
#     `sx1509_interrupt_pin` / `sx1509_i2c_id` substitutions directly (the
#     CORE-ABSTRACT-BUS-001C interrupt-pin guard), and because
#     S360-100-NATIVE-FAN-GPIO-MAP-001 forbids removing the SX1509 globally —
#     the expander may still appear as historical / superseded context. A
#     hard delete is therefore out of scope for this fan-path slice and is
#     left to a future cleanup PR under docs/product-deprecation-removal-policy.md
#     if the doc/test references are also retired.
# ----------------------------------------------------------------------------
# SX1509 GPIO/PWM Expander Module
# 16-channel I2C GPIO expander with PWM support
#
# Pin Layout:
#   IO0-IO3:  Fan PWM outputs (4 channels)
#   IO4-IO7:  Tachometer inputs
#   IO8-IO11: Auxiliary PWM outputs
#   IO12-IO15: General purpose inputs
#
# Connection: shared core_i2c bus (GPIO48 SDA / GPIO45 SCL per
# CORE-ABSTRACT-BUS-001B), Address 0x3E.

substitutions:
  # I2C bus ID (uses the shared core_i2c bus from the parent Core abstract
  # package by default; CORE-ABSTRACT-BUS-001B). Override with the
  # sx1509_i2c_id substitution if a product binds a different bus.
  sx1509_i2c_id: core_i2c
  sx1509_address: "0x3E"
  # CORE-ABSTRACT-BUS-001C: rebound from GPIO3 to GPIO17. The schematic-correct
  # SX1509 expander interrupt net is `expander_int` on IO17 per S360-100-R4.
  # The previous GPIO3 binding collided with the schematic-correct relay_pin
  # and is freed for the relay slice (CORE-ABSTRACT-BUS-001A).
  sx1509_interrupt_pin: GPIO17

sx1509:
  - id: sx1509_expander
    i2c_id: ${sx1509_i2c_id}
    address: ${sx1509_address}

# PWM Outputs
output:
  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_fan_0
    pin: 0

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_fan_1
    pin: 1

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_fan_2
    pin: 2

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_fan_3
    pin: 3

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_aux_0
    pin: 8

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_aux_1
    pin: 9

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_aux_2
    pin: 10

  - platform: sx1509
    sx1509_id: sx1509_expander
    id: sx1509_pwm_aux_3
    pin: 11

# Fan Controllers
fan:
  - platform: speed
    id: sx1509_fan_0
    name: "${friendly_name} Expander Fan 1"
    output: sx1509_pwm_fan_0
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: sx1509_fan_1
    name: "${friendly_name} Expander Fan 2"
    output: sx1509_pwm_fan_1
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: sx1509_fan_2
    name: "${friendly_name} Expander Fan 3"
    output: sx1509_pwm_fan_2
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: sx1509_fan_3
    name: "${friendly_name} Expander Fan 4"
    output: sx1509_pwm_fan_3
    speed_count: 100
    restore_mode: RESTORE_DEFAULT_OFF

# Digital Inputs
binary_sensor:
  - platform: gpio
    id: sx1509_tach_0
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 4
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_tach_1
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 5
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_tach_2
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 6
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_tach_3
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 7
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_input_0
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 12
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_input_1
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 13
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_input_2
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 14
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    id: sx1509_input_3
    internal: true
    pin:
      sx1509: sx1509_expander
      number: 15
      mode:
        input: true
        pullup: true
      inverted: true

# Auxiliary LED outputs
light:
  - platform: monochromatic
    id: sx1509_led_0
    output: sx1509_pwm_aux_0
    internal: true
    default_transition_length: 200ms

  - platform: monochromatic
    id: sx1509_led_1
    output: sx1509_pwm_aux_1
    internal: true
    default_transition_length: 200ms

  - platform: monochromatic
    id: sx1509_led_2
    output: sx1509_pwm_aux_2
    internal: true
    default_transition_length: 200ms

  - platform: monochromatic
    id: sx1509_led_3
    output: sx1509_pwm_aux_3
    internal: true
    default_transition_length: 200ms

# Speed sensors
sensor:
  - platform: template
    id: sx1509_fan_0_speed
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      return id(sx1509_fan_0).state ? id(sx1509_fan_0).speed : 0.0f;

  - platform: template
    id: sx1509_fan_1_speed
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      return id(sx1509_fan_1).state ? id(sx1509_fan_1).speed : 0.0f;

  - platform: template
    id: sx1509_fan_2_speed
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      return id(sx1509_fan_2).state ? id(sx1509_fan_2).speed : 0.0f;

  - platform: template
    id: sx1509_fan_3_speed
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      return id(sx1509_fan_3).state ? id(sx1509_fan_3).speed : 0.0f;

globals:
  - id: sx1509_online
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: sx1509_fan_0_target
    type: int
    restore_value: true
    initial_value: '0'

  - id: sx1509_fan_1_target
    type: int
    restore_value: true
    initial_value: '0'

  - id: sx1509_fan_2_target
    type: int
    restore_value: true
    initial_value: '0'

  - id: sx1509_fan_3_target
    type: int
    restore_value: true
    initial_value: '0'

  - id: sx1509_fans_linked
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: sx1509_fan_auto_mode
    type: bool
    restore_value: true
    initial_value: 'false'

script:
  - id: sx1509_set_fan_speed
    mode: single
    parameters:
      fan_num: int
      speed: int
    then:
      - lambda: |-
          int target = std::max(0, std::min(100, speed));
          esphome::fan::Fan *fan = nullptr;
          int *target_var = nullptr;

          switch (fan_num) {
            case 0: fan = id(sx1509_fan_0); target_var = &id(sx1509_fan_0_target); break;
            case 1: fan = id(sx1509_fan_1); target_var = &id(sx1509_fan_1_target); break;
            case 2: fan = id(sx1509_fan_2); target_var = &id(sx1509_fan_2_target); break;
            case 3: fan = id(sx1509_fan_3); target_var = &id(sx1509_fan_3_target); break;
            default: return;
          }
          *target_var = target;
          if (target == 0) {
            fan->turn_off().perform();
          } else {
            auto call = fan->turn_on();
            call.set_speed(target);
            call.perform();
          }

  - id: sx1509_set_all_fans
    mode: single
    parameters:
      speed: int
    then:
      - script.execute:
          id: sx1509_set_fan_speed
          fan_num: 0
          speed: !lambda 'return speed;'
      - script.execute:
          id: sx1509_set_fan_speed
          fan_num: 1
          speed: !lambda 'return speed;'
      - script.execute:
          id: sx1509_set_fan_speed
          fan_num: 2
          speed: !lambda 'return speed;'
      - script.execute:
          id: sx1509_set_fan_speed
          fan_num: 3
          speed: !lambda 'return speed;'

  - id: sx1509_emergency_stop
    mode: single
    then:
      - fan.turn_off: sx1509_fan_0
      - fan.turn_off: sx1509_fan_1
      - fan.turn_off: sx1509_fan_2
      - fan.turn_off: sx1509_fan_3
      - lambda: |-
          id(sx1509_fan_0_target) = 0;
          id(sx1509_fan_1_target) = 0;
          id(sx1509_fan_2_target) = 0;
          id(sx1509_fan_3_target) = 0;

interval:
  - interval: 5s
    then:
      - lambda: |-
          if (id(sx1509_fans_linked)) {
            int master = id(sx1509_fan_0_target);
            if (id(sx1509_fan_1_target) != master ||
                id(sx1509_fan_2_target) != master ||
                id(sx1509_fan_3_target) != master) {
              id(sx1509_fan_1_target) = master;
              id(sx1509_fan_2_target) = master;
              id(sx1509_fan_3_target) = master;
              for (int i = 1; i <= 3; i++) {
                auto *fan = (i == 1) ? id(sx1509_fan_1) :
                            (i == 2) ? id(sx1509_fan_2) : id(sx1509_fan_3);
                if (master == 0) {
                  fan->turn_off().perform();
                } else {
                  auto call = fan->turn_on();
                  call.set_speed(master);
                  call.perform();
                }
              }
            }
          }
