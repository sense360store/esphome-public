# ============================================================================
# AIRIQ EXPANSION MODULE - FOR CEILING S3 BOARD  (legacy alias)
# ============================================================================
# PACKAGE-RENAME-002 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the "AirIQ Ceiling S3"
# variant now lives in the SKU-aligned board overlay
# `packages/boards/s360-210-airiq-ceiling-s3.yaml`. This legacy functional path
# is retained as a thin alias that `!include`s that board overlay, so the
# resolved config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): the S360-210 AirIQ ceiling-S3 board
# package still binds this path. Per the alias policy (§3.3), no alias is
# dropped while a live binder exists; alias removal is a separate later slice
# gated on the binder count reaching zero.
#
# This S3 lineage is a DIFFERENT board lineage from the canonical ceiling AirIQ
# base: it keeps its own pre-001B `i2c_primary` bus and the AirIQ-only status
# LED (`airiq_status_led_pin: GPIO7`, schematic IO7 = AirQ_Status_Led). Those
# self-contained content assertions now travel with the board overlay this file
# aliases (`tests/test_core_abstract_bus.py`).
# ============================================================================

packages:
  board_airiq: !include ../boards/s360-210-airiq-ceiling-s3.yaml
