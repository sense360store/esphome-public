# ============================================================================
# SENSE360 VENTIQ MODULE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical VentIQ alias for the bathroom IAQ module (S360-211).
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-VENTIQ-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550). It exists so new product /
# compile-only YAMLs can `!include` the canonical productized
# `VentIQ` name instead of the legacy `airiq_bathroom_*` filename,
# without breaking any current consumer of the legacy path.
#
# Implementation source of truth:
#   packages/expansions/airiq_bathroom_base.yaml
#
# This file stays a pure include wrapper of the legacy
# `airiq_bathroom_base.yaml` basename per the naming-audit Phase 2
# contract (docs/package-naming-audit.md §"Phase 2 — Add canonical
# aliases / wrapper packages"). As of PACKAGE-RENAME-003
# (docs/arch-board-bundle-plan.md §7 item 4) that legacy path is itself
# now a thin alias of the SKU-aligned board package
# `packages/boards/s360-211-ventiq.yaml` (the authoritative,
# self-contained definition), so this naming alias chains through to the
# board package and resolves byte-identically. The `!include` target is
# intentionally left as the bare `airiq_bathroom_base.yaml` basename (the
# Phase-2 naming contract pins it there). Do not add substitutions,
# globals, sensors, or any other YAML blocks here — this file must stay a
# pure include wrapper.
# ============================================================================

packages:
  legacy_ventiq_base: !include airiq_bathroom_base.yaml
