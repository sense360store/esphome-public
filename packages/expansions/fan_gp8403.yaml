# ============================================================================
# SENSE360 FAN EXPANSION MODULE - GP8403 DAC VERSION (S360-312-R4 FanDAC)
# ============================================================================
# Professional HVAC fan control via analog voltage output. The S360-312-R4
# FanDAC board carries TWO GP8403 dual-channel 12-bit I2C DACs:
#   - IC1 (DAC1, default I2C 0x58) -> J2 outputs VOUT0 / VOUT1
#   - IC2 (DAC2, default I2C 0x59) -> J3 outputs VOUT0 / VOUT1
# giving FOUR analog outputs total across the two terminal blocks.
#
# Output range (0-10V or 0-5V) is firmware/register-driven (GP8403 register
# 0x01, one range per chip). It is set in firmware, not by a hardware jumper:
# each chip's V5V reference pin is hardwired to the +12V boost rail and the
# board carries no range jumper or solder-bridge (per
# docs/hardware/s360-312-r4-fandac.md). Range is per DAC chip; a single GP8403
# cannot mix 0-5V and 0-10V across its two outputs.
#
# This file provides the package-layer hardware setup only: the two DAC chips
# and their four neutral outputs. Product-facing fan entities, names, sensors,
# and control behaviour belong in the product / feature layer (PRODUCT-DAC-001)
# and are intentionally not declared here.
#
# Expansion Bus Connection:
#   Pin 4 (SDA) -> GPIO48 (Core I2C SDA per CORE-ABSTRACT-BUS-001B)
#   Pin 5 (SCL) -> GPIO45 (Core I2C SCL per CORE-ABSTRACT-BUS-001B)
#   Pin 2 (3.3V) -> Power
#   Pin 1 (GND) -> Ground
#
# Power Requirements: 3.3V / 50mA max
# ============================================================================

substitutions:
  # I2C bus ID (uses the shared core_i2c bus from the parent Core abstract
  # package by default; CORE-ABSTRACT-BUS-001B). Override with the
  # fan_dac_i2c_id substitution if a product binds a different bus.
  fan_dac_i2c_id: core_i2c

  # Per-chip I2C addresses. IC1/IC2 share the bus and are addressed
  # independently via their own DIP switches (SW1 -> IC1, SW2 -> IC2).
  # GP8403 address span is 0x58-0x5F (A0/A1/A2 = address bits 0/1/2).
  fan_dac_1_i2c_address: "0x58"  # IC1 (DAC1)
  fan_dac_2_i2c_address: "0x59"  # IC2 (DAC2)

  # Per-chip output range (one range per GP8403, register 0x01).
  #
  # VALUE IS THE ESPHome `gp8403:` `voltage:` ENUM, NOT a user-facing
  # label. ESPHome's gp8403 component accepts only the bare enum tokens
  # "10V" or "5V" for `voltage:` (https://esphome.io/components/output/
  # gp8403). The customer-facing range that "10V" produces is 0-10V
  # (and "5V" produces 0-5V); the user-facing "0-10V" / "0-5V" wording
  # lives in the product / kit docs (e.g. S360-KIT-DUCT-0-10V), never in
  # this `voltage:` substitution. FW-COMPILE-DAC-001 corrected these
  # values from the prior invalid "0-10V" / "0-5V" strings that ESPHome
  # config validation rejects; this matches the default "10V" the
  # output-range policy (docs/hardware/s360-312-r4-fandac.md row 6,
  # operator decision D3) already implied.
  #
  # Both chips default to "10V" (customer-facing 0-10V); a product /
  # firmware may override DAC1 and DAC2 independently (e.g. to "5V" for
  # customer-facing 0-5V). Range cannot be mixed per-output within a
  # single chip (one V5V reference / one range register 0x01 per chip).
  fan_dac_1_output_range: "10V"  # IC1 (DAC1) -> customer-facing 0-10V
  fan_dac_2_output_range: "10V"  # IC2 (DAC2) -> customer-facing 0-10V

# ============================================================================
# GP8403 DAC chips (two on the shared core_i2c bus)
# ============================================================================
gp8403:
  - id: fan_dac_1
    i2c_id: ${fan_dac_i2c_id}
    address: ${fan_dac_1_i2c_address}
    voltage: ${fan_dac_1_output_range}
  - id: fan_dac_2
    i2c_id: ${fan_dac_i2c_id}
    address: ${fan_dac_2_i2c_address}
    voltage: ${fan_dac_2_output_range}

# ============================================================================
# Neutral package-layer outputs (four total: two per DAC chip)
# ============================================================================
output:
  # DAC1 (IC1) -> J2
  - platform: gp8403
    id: fan_dac_1_vout0
    gp8403_id: fan_dac_1
    channel: 0
  - platform: gp8403
    id: fan_dac_1_vout1
    gp8403_id: fan_dac_1
    channel: 1

  # DAC2 (IC2) -> J3
  - platform: gp8403
    id: fan_dac_2_vout0
    gp8403_id: fan_dac_2
    channel: 0
  - platform: gp8403
    id: fan_dac_2_vout1
    gp8403_id: fan_dac_2
    channel: 1
