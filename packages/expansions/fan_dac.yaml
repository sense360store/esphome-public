# ============================================================================
# SENSE360 FANDAC MODULE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical FanDAC alias for the GP8403 DAC 0–10V analog fan-control
# hardware driver (S360-312 — the productized FanDAC module). The GP8403
# is the DAC implementation detail (a DFRobot dual-channel 12-bit I²C
# DAC); the productized / package-facing module name is `FanDAC`, listed
# in `config/webflash-compatibility.json`'s `canonical_modules` array.
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-FANDAC-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550) and the sibling Phase 2 slices
# PACKAGE-NAMING-ALIASES-VENTIQ-001 (PR #552),
# PACKAGE-NAMING-ALIASES-ROOMIQ-001 (PR #553), and
# PACKAGE-NAMING-ALIASES-AIRIQ-001 (PR #555). It exists so new product /
# compile-only YAMLs can `!include` the canonical productized `FanDAC`
# name instead of the legacy `fan_gp8403` vendor-chip filename, without
# breaking any current consumer of the legacy path.
#
# Implementation source of truth:
#   packages/expansions/fan_gp8403.yaml
#
# The legacy file remains the actual hardware driver (GP8403 component,
# two DAC outputs, two `fan` speed controllers, monitoring sensors,
# globals, control scripts, emergency stop). Do not add substitutions,
# globals, sensors, outputs, components, or fan-control behavior here —
# this file must stay a pure include wrapper per the naming-audit
# Phase 2 contract (docs/package-naming-audit.md §"Phase 2 — Add
# canonical aliases / wrapper packages") and the Rule 8 compatibility-
# shim policy (canonical-name file `!include`s the legacy file with no
# new substitutions or globals; legacy file remains source of truth
# until Phase 5).
#
# Why this filename is allowed despite the `Fan` forbidden token:
#   - The token `Fan` (uppercase, standalone) is listed in
#     `config/webflash-compatibility.json`'s `forbidden_tokens` array as
#     a generic / customer-facing label that must not appear in WebFlash
#     artifact filenames (the productized fan modules are `FanRelay`,
#     `FanPWM`, `FanDAC`, `FanTRIAC` — each fan variant is firmware-
#     distinct per the `fan_variants_are_firmware_distinct` rule).
#   - This file is an internal `packages/**` implementation alias, not a
#     WebFlash artifact name. The canonical product / module token it
#     represents is `FanDAC` (a member of `canonical_modules`), not the
#     forbidden generic `Fan` token. The filename `fan_dac.yaml` is the
#     lowercase `snake_case` rendering of the canonical `FanDAC` module
#     token, mirroring the existing `airiq.yaml` / `ventiq.yaml` /
#     `roomiq.yaml` precedent where the alias filename is the lowercase
#     rendering of the productized module token.
#   - This file must not be exposed as a loose customer-facing product:
#     customer-facing labels surfaced to WebFlash UI / Home Assistant /
#     marketing remain outcome-first (for example, "0–10V fan control"
#     describes what the customer gets without leaking the GP8403 chip
#     or the generic `Fan` token).
# ============================================================================

packages:
  legacy_fan_dac_gp8403: !include fan_gp8403.yaml
