# ============================================================================
# COMFORT CEILING — RoomIQ legacy alias (S360-200)
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of this RoomIQ driver now lives
# in the SKU-aligned board package
# `packages/boards/s360-200-roomiq-climate.yaml`. This legacy functional path
# is retained as a thin alias that `!include`s that board package, so the
# resolved config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): the legacy `sense360-core-*`
# ceiling/wall product family, the RoomIQ bundles / compile-only targets, and
# the Phase-2 naming alias `roomiq.yaml` still bind this path. Per the alias
# policy (§3.3), no alias is dropped while a live binder exists; alias removal
# is a separate later slice gated on the binder count reaching zero.
#
# Sensors / pin assignment (LTR-303ALS-01 ALS @ 0x29 + SHT45 temp/humidity @
# 0x44 on core_i2c; corrected under S360-200-R4-HARDWARE-RECONCILIATION-001) are
# documented in the board package this file aliases.
# ============================================================================

packages:
  board_roomiq_climate: !include ../boards/s360-200-roomiq-climate.yaml
