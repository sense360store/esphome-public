# ============================================================================
# SENSE360 FANPWM PACKAGE — PWM-DRIVE-ONLY (PACKAGE-PWM-001-IMPLEMENT-001)
# ============================================================================
# Canonical FanPWM hardware package for the S360-311 12 V PWM fan driver.
# This implements the PWM-drive-only initial scope: four independent SX1509
# PWM-drive fan-speed controllers, no per-fan RPM.
#
# Decision lineage:
#   * PR #586 (PWM-BLOCKER-REMOVAL-001) — operator decisions D1 (FanPWM is
#     four-channel) / D2 (SX1509 routing: TachPMW1..4 -> channels 0..3,
#     Pul_Cou1..4 -> channels 4..7, TachIO direct on ESP32 IO16) / D3
#     (committed JST-SH schematic is current R4).
#   * PR #587 (CORE-ABSTRACT-BUS-SX1509-001) — added the neutral binding-only
#     SX1509 layer packages/expansions/fan_pwm_sx1509.yaml that this package
#     composes.
#   * PR #588 (PACKAGE-PWM-TACH-STRATEGY-001, operator decision D-T1) — scoped
#     the first FanPWM package PWM-drive-only: four PWM outputs, no per-fan RPM
#     sensors, optional diagnostic binary tach only, TachIO/GPIO16
#     reserved/pending.
#   * PR #589 (PWM-SX1509-TACH-PROOF-001) — compile/config proof confirming
#     SX1509 PWM-drive output is supported and that an SX1509 pin cannot back
#     an ESPHome pulse_counter RPM input.
#
# Scope (PWM-drive-only):
#   * Four INDEPENDENT PWM fan-speed controllers, one per SX1509 PWM-drive
#     channel exposed by packages/expansions/fan_pwm_sx1509.yaml:
#       fan channel 1 -> output fan_pwm_drive_1 (SX1509 channel 0, TachPMW1)
#       fan channel 2 -> output fan_pwm_drive_2 (SX1509 channel 1, TachPMW2)
#       fan channel 3 -> output fan_pwm_drive_3 (SX1509 channel 2, TachPMW3)
#       fan channel 4 -> output fan_pwm_drive_4 (SX1509 channel 3, TachPMW4)
#   * NO per-fan RPM sensors and NO RPM claim of any kind.
#   * NO ESPHome pulse_counter (see capability note below).
#   * The four Pul_Cou1..4 tach lines stay as the polled, INTERNAL diagnostic
#     binary GPIO states declared by fan_pwm_sx1509.yaml (fan_pwm_tach_1..4).
#     They are diagnostic level states only — NOT RPM, and are never labelled
#     or surfaced as RPM by this package.
#   * TachIO / GPIO16 is RESERVED / PENDING: this package binds no TachIO
#     sensor and makes no aggregate-RPM claim.
#
# Composition (DO NOT duplicate the SX1509 channel definitions):
#   This package COMPOSES packages/expansions/fan_pwm_sx1509.yaml — the
#   neutral, binding-only Core abstract-bus layer (CORE-ABSTRACT-BUS-SX1509-001).
#   That binding owns the SX1509 hub, the four PWM-drive outputs
#   (fan_pwm_drive_1..4 -> channels 0..3), the four diagnostic tach binary
#   inputs (fan_pwm_tach_1..4 -> channels 4..7), and the tach_io_pin: GPIO16
#   substitution. This package adds ONLY the four user-facing fan-speed
#   controllers on top of those neutral output IDs; it declares no SX1509
#   channels, no `ledc`/direct-ESP32 PWM, and no direct ESP32 mapping for
#   TachPMW1..4 / Pul_Cou1..4.
#
# ESPHome capability note (compile-proven — PWM-SX1509-TACH-PROOF-001):
#   SX1509 PWM-drive output IS supported and is the basis of this package
#   (`output: platform: sx1509`, the SX1509 on-chip LED-driver PWM engine).
#   Only per-fan RPM via an SX1509 pin used as an ESPHome `pulse_counter` is
#   compile-proven unsupported: `esphome config` rejects it with
#   `[sx1509] is an invalid option for [pin]` (ESPHome 2026.5.1). Per-fan RPM
#   therefore stays future work (COMPONENT-SX1509-TACH-001 or a bench-confirmed
#   TachIO follow-up); no RPM is implemented or claimed here. See
#   packages/expansions/fan_pwm_sx1509.yaml and
#   tests/test_sx1509_tach_pulse_counter_proof.py for the proof.
#
# Readiness: this is a PACKAGE-layer artifact only. It does NOT make any
# FanPWM product, WebFlash build, release artifact, import, or compliance
# posture ready. Remaining gates (bench PWM polarity; per-fan / aggregate
# current and thermal envelope; product YAML; compile-only target / result;
# WebFlash / release / import / compliance; optional future RPM strategy) are
# tracked in docs/hardware/s360-311-r4-pwm.md.
#
# Requires a parent Core package that provides the shared `core_i2c` I2C bus
# (CORE-ABSTRACT-BUS-001B) and a `${friendly_name}` substitution.
#
# NOT compatible with the other fan-driver variants (FanRelay / FanDAC /
# FanTRIAC) — fan-driver variants are firmware-distinct.
# ============================================================================

substitutions:
  # Number of discrete speed steps presented per fan (1..100).
  fan_pwm_speed_count: "100"

# Neutral SX1509 binding layer (CORE-ABSTRACT-BUS-SX1509-001). Owns the SX1509
# hub, the four PWM-drive outputs (fan_pwm_drive_1..4 -> channels 0..3), the
# four diagnostic tach binary inputs (fan_pwm_tach_1..4 -> channels 4..7), and
# the tach_io_pin: GPIO16 substitution. Composed here so the SX1509 channel map
# is defined in exactly one place (this package never re-declares it).
packages:
  fan_pwm_sx1509_binding: !include fan_pwm_sx1509.yaml

# Four independent PWM fan-speed controllers, one per SX1509 PWM-drive output.
# Speed control only — no RPM feedback is wired (per-fan RPM via an SX1509
# pulse_counter is compile-proven unsupported; see the capability note above).
fan:
  - platform: speed
    id: fan_pwm_1
    name: "${friendly_name} Fan 1"
    output: fan_pwm_drive_1
    speed_count: ${fan_pwm_speed_count}
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: fan_pwm_2
    name: "${friendly_name} Fan 2"
    output: fan_pwm_drive_2
    speed_count: ${fan_pwm_speed_count}
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: fan_pwm_3
    name: "${friendly_name} Fan 3"
    output: fan_pwm_drive_3
    speed_count: ${fan_pwm_speed_count}
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: speed
    id: fan_pwm_4
    name: "${friendly_name} Fan 4"
    output: fan_pwm_drive_4
    speed_count: ${fan_pwm_speed_count}
    restore_mode: RESTORE_DEFAULT_OFF
