# ============================================================================
# SENSE360 ROOMIQ MODULE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical RoomIQ alias for the room sensing comfort hardware driver
# (S360-200 — ceiling variant; SHT45 temperature/humidity + LTR-303ALS-01
# ambient light on the shared core I2C bus; corrected under
# S360-200-R4-HARDWARE-RECONCILIATION-001).
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-ROOMIQ-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550) and the sibling Phase 2 slice
# PACKAGE-NAMING-ALIASES-VENTIQ-001 (PR #552). It exists so new
# product / compile-only YAMLs can `!include` the canonical
# productized `RoomIQ` name instead of the legacy `comfort_ceiling`
# filename, without breaking any current consumer of the legacy path
# (Release-One product `products/sense360-ceiling-poe-ventiq-roomiq.yaml`
# and several Core / compile-only ceiling YAMLs `!include` the
# legacy file by path).
#
# Implementation source of truth:
#   packages/expansions/comfort_ceiling.yaml
#
# The legacy file remains the actual hardware driver. Do not add
# substitutions, globals, sensors, or any other YAML blocks here —
# this file must stay a pure include wrapper per the naming-audit
# Phase 2 contract (docs/package-naming-audit.md §"Phase 2 — Add
# canonical aliases / wrapper packages").
# ============================================================================

packages:
  legacy_roomiq_comfort: !include comfort_ceiling.yaml
