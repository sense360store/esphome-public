# ============================================================================
# PRESENCE WALL — RoomIQ legacy alias (S360-200)
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of this RoomIQ driver now lives
# in the SKU-aligned board package
# `packages/boards/s360-200-roomiq-radar-wall.yaml`. This legacy functional
# path is retained as a thin alias that `!include`s that board package, so the
# resolved config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): the legacy `sense360-core-*`
# ceiling/wall product family and the RoomIQ bundles / compile-only targets
# still bind this path. Per the alias policy (§3.3), no alias is dropped while a
# live binder exists; alias removal is a separate later slice gated on the
# binder count reaching zero.
#
# Sensors / pin assignment (HLK-LD2450 24GHz radar on roomiq_hi_link_uart @
# 256000 baud) are documented in the board package this file aliases.
# ============================================================================

packages:
  board_roomiq_radar: !include ../boards/s360-200-roomiq-radar-wall.yaml
