# ============================================================================
# SENSE360 AIRIQ EXPANSION MODULE — generic base driver (legacy alias)
# ============================================================================
# AIRIQ-HW-RECONCILE-001. This generic AirIQ base driver previously duplicated
# an SPS30 + SGP41 + SCD41 stack that unconditionally probed the external SPS30
# (0x69) — no longer correct: the SPS30 is an off-board opt-in attachment, not
# part of the S360-210 PCB. This file has no live binder (no product or package
# composes it), so it is now a thin alias of the canonical, reconciled board
# package — resolving to the fitted S360-210-R4 hardware (SGP41 @ 0x59, SCD41
# @ 0x62, SFA40 @ 0x5D, MICS-4514/STM8 @ 0x60; no BMP390; external SPS30 PM
# opt-in only) instead of a stale duplicate. A device that needs the external
# SPS30 additionally composes packages/boards/s360-210-airiq-sps30.yaml.
# ============================================================================

packages:
  board_airiq: !include ../boards/s360-210-airiq.yaml
