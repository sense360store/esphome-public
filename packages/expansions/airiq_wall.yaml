# ============================================================================
# SENSE360 AIRIQ MODULE - WALL/DESK VARIANT  (legacy alias)
# ============================================================================
# SKU: S360-AIR-W
#
# PACKAGE-RENAME-002 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the wall/desk AirIQ stack now
# lives in the SKU-aligned board overlay
# `packages/boards/s360-210-airiq-wall.yaml`. This legacy functional path is
# retained as a thin alias that `!include`s that board overlay, so the resolved
# config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): legacy `products/sense360-core-*`
# wall products still bind this path. Per the alias policy (§3.3), no alias is
# dropped while a live binder exists; alias removal is a separate later slice
# gated on the binder count reaching zero.
#
# Sensors / pin assignment (SPS30 PM @ 0x69, SGP41 VOC/NOx @ 0x59, SCD41 CO2 @
# 0x62, BMP390 pressure @ 0x77, all on `airiq_i2c_id: core_i2c`) are documented
# in the board overlay this file aliases.
# ============================================================================

packages:
  board_airiq: !include ../boards/s360-210-airiq-wall.yaml
