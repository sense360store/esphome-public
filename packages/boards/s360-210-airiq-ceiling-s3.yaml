# ============================================================================
# Sense360 AirIQ — Ceiling S3 (legacy lineage) variant overlay (S360-210)
# ============================================================================
# PACKAGE-RENAME-002 (docs/arch-board-bundle-plan.md §7 item 4). SKU-aligned
# overlay for the legacy "AirIQ Ceiling S3" variant of the canonical AirIQ
# board package `packages/boards/s360-210-airiq.yaml`.
#
# Source-of-truth inversion (docs/arch-board-bundle-plan.md §3.3, §5.5): the
# content below previously lived in `packages/expansions/airiq_ceiling_s3.yaml`
# and this overlay was a thin `!include` wrapper over it. That is now inverted —
# the definition lives here and `packages/expansions/airiq_ceiling_s3.yaml` is a
# thin alias that `!include`s this overlay, so the resolved behaviour is
# byte-identical to the legacy path.
#
# This variant is a DIFFERENT board lineage from the canonical ceiling AirIQ
# base: per CORE-ABSTRACT-BUS-001B operator decision #10 and the regression in
# `tests/test_core_abstract_bus.py`, the S3 lineage
# (`airiq_ceiling_s3.yaml` / `sense360_core_ceiling_s3.yaml`) is deliberately
# OUT OF SCOPE for the shared `core_i2c` consolidation and retains its own
# pre-001B `i2c_primary` bus binding, and it carries the AirIQ-only status-LED
# line (`airiq_status_led_pin: GPIO7`, schematic IO7 = AirQ_Status_Led).
#
# This board package is kept distinct precisely so a future board-layer sweep
# does not silently fold the S3 lineage into the canonical AirIQ namespace —
# mirroring how Core keeps `s360-100-core-ceiling-s3.yaml` distinct. Because it
# retains the legacy `i2c_primary` bus id, this overlay is recorded in the
# `out_of_scope_paths` allow-list of
# `tests/test_core_abstract_bus.py::test_no_legacy_bus_id_in_any_active_consumer_line`
# alongside the legacy alias it now backs.
#
# Legacy alias (path preserved, retained while live binders exist; §3.3):
#   airiq_ceiling_s3.yaml -> !include this overlay
# ============================================================================

substitutions:
  # I2C Configuration (uses ceiling S3 primary bus)
  airiq_i2c_id: i2c_primary
  airiq_i2c_sda: ${i2c_primary_sda_pin}
  airiq_i2c_scl: ${i2c_primary_scl_pin}

  # Sensor update intervals
  airiq_sps30_update: 30s
  airiq_sgp41_update: 30s
  airiq_scd41_update: 30s

  # SPS30 auto-cleaning interval (7 days default)
  airiq_sps30_cleaning_interval: "604800s"

  # CO2 calibration
  co2_auto_calibration: "true"

  # Status LED (only GPIO7 available, GPIO8 conflicts with I2C)
  airiq_status_led_pin: GPIO7

# ============================================================================
# SPS30 - Particulate Matter Sensor
# ============================================================================
sensor:
  - platform: sps30
    id: sps30_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x69
    update_interval: ${airiq_sps30_update}

    pm_1_0:
      id: airiq_pm1_0
      name: "${friendly_name} PM1.0"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_2_5:
      id: airiq_pm2_5
      name: "${friendly_name} PM2.5"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_4_0:
      id: airiq_pm4_0
      name: "${friendly_name} PM4.0"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_10_0:
      id: airiq_pm10_0
      name: "${friendly_name} PM10"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    # Particle counts
    pmc_0_5:
      id: airiq_pmc0_5
      name: "${friendly_name} PMC 0.5"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_1_0:
      id: airiq_pmc1_0
      name: "${friendly_name} PMC 1.0"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_2_5:
      id: airiq_pmc2_5
      name: "${friendly_name} PMC 2.5"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_4_0:
      id: airiq_pmc4_0
      name: "${friendly_name} PMC 4.0"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_10_0:
      id: airiq_pmc10_0
      name: "${friendly_name} PMC 10"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pm_size:
      id: airiq_pm_size
      name: "${friendly_name} Typical Particle Size"
      accuracy_decimals: 2
      filters:
        - throttle: ${airiq_sps30_update}

    auto_cleaning_interval: ${airiq_sps30_cleaning_interval}

    # ============================================================================
    # SGP41 - VOC/NOx Sensor
    # ============================================================================
  - platform: sgp4x
    id: sgp41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x59
    update_interval: ${airiq_sgp41_update}

    voc:
      id: airiq_voc_index
      name: "${friendly_name} VOC Index"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    nox:
      id: airiq_nox_index
      name: "${friendly_name} NOx Index"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    compensation:
      temperature_source: airiq_scd41_temperature
      humidity_source: airiq_scd41_humidity

    store_baseline: true

    # ============================================================================
    # SCD41 - CO2 Sensor
    # ============================================================================
  - platform: scd4x
    id: scd41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x62
    update_interval: ${airiq_scd41_update}

    co2:
      id: airiq_co2
      name: "${friendly_name} CO2"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_scd41_update}

    temperature:
      id: airiq_scd41_temperature
      name: "${friendly_name} Temperature (SCD41)"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    humidity:
      id: airiq_scd41_humidity
      name: "${friendly_name} Humidity (SCD41)"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    automatic_self_calibration: ${co2_auto_calibration}
    measurement_mode: periodic

  # ============================================================================
  # COMPOSITE SENSORS (from SCD41 - SPS30 doesn't provide temp/humidity)
  # ============================================================================
  - platform: template
    id: airiq_temperature
    name: "${friendly_name} Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:thermometer
    lambda: |-
      float temp_scd41 = id(airiq_scd41_temperature).state;
      if (!std::isnan(temp_scd41)) return temp_scd41;
      return NAN;
    update_interval: 30s

  - platform: template
    id: airiq_humidity
    name: "${friendly_name} Humidity"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:water-percent
    lambda: |-
      float hum_scd41 = id(airiq_scd41_humidity).state;
      if (!std::isnan(hum_scd41)) return hum_scd41;
      return NAN;
    update_interval: 30s

  # AQI based on PM2.5 (US EPA standard)
  - platform: template
    id: airiq_aqi
    name: "${friendly_name} AQI"
    unit_of_measurement: "AQI"
    accuracy_decimals: 0
    icon: mdi:air-filter
    lambda: |-
      float pm25 = id(airiq_pm2_5).state;
      if (std::isnan(pm25)) return NAN;

      int aqi = 0;
      if (pm25 <= 12.0f) {
        aqi = (int)((50.0f / 12.0f) * pm25);
      } else if (pm25 <= 35.4f) {
        aqi = (int)(((100.0f - 51.0f) / (35.4f - 12.1f)) * (pm25 - 12.1f) + 51.0f);
      } else if (pm25 <= 55.4f) {
        aqi = (int)(((150.0f - 101.0f) / (55.4f - 35.5f)) * (pm25 - 35.5f) + 101.0f);
      } else if (pm25 <= 150.4f) {
        aqi = (int)(((200.0f - 151.0f) / (150.4f - 55.5f)) * (pm25 - 55.5f) + 151.0f);
      } else if (pm25 <= 250.4f) {
        aqi = (int)(((300.0f - 201.0f) / (250.4f - 150.5f)) * (pm25 - 150.5f) + 201.0f);
      } else {
        aqi = (int)(((500.0f - 301.0f) / (500.4f - 250.5f)) * (pm25 - 250.5f) + 301.0f);
      }
      return (float)aqi;
    update_interval: 30s

# ============================================================================
# AIR QUALITY STATUS TEXT
# ============================================================================
text_sensor:
  - platform: template
    id: airiq_aqi_category
    name: "${friendly_name} Air Quality"
    icon: mdi:air-filter
    lambda: |-
      float aqi = id(airiq_aqi).state;
      if (std::isnan(aqi)) return std::string("Unknown");
      if (aqi <= 50) return std::string("Good");
      if (aqi <= 100) return std::string("Moderate");
      if (aqi <= 150) return std::string("Unhealthy (Sensitive)");
      if (aqi <= 200) return std::string("Unhealthy");
      if (aqi <= 300) return std::string("Very Unhealthy");
      return std::string("Hazardous");
    update_interval: 30s

# ============================================================================
# Button for Manual SPS30 Fan Cleaning
# ============================================================================
button:
  - platform: template
    name: "${friendly_name} SPS30 Clean Fan"
    id: airiq_sps30_clean_button
    icon: mdi:fan
    on_press:
      then:
        - sps30.start_fan_autoclean: sps30_sensor
        - logger.log:
            level: INFO
            format: "AirIQ: SPS30 fan cleaning started"

# ============================================================================
# MODULE INITIALIZATION
# ============================================================================
esphome:
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            id(module_airiq_present) = true;
            ESP_LOGI("airiq_ceiling_s3", "AirIQ module initialized on I2C %s/%s",
                     "${airiq_i2c_sda}", "${airiq_i2c_scl}");
            ESP_LOGI("airiq_ceiling_s3", "  - SPS30 at 0x69");
            ESP_LOGI("airiq_ceiling_s3", "  - SGP41 at 0x59");
            ESP_LOGI("airiq_ceiling_s3", "  - SCD41 at 0x62");

# ============================================================================
# LOGGING
# ============================================================================
logger:
  logs:
    sps30: INFO
    sgp4x: INFO
    scd4x: INFO
    component: ERROR
