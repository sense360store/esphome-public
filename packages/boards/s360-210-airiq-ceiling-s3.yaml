# ============================================================================
# Sense360 AirIQ — Ceiling S3 (legacy lineage) variant overlay (S360-210)
# ============================================================================
# SKU-aligned overlay for the legacy "AirIQ Ceiling S3" variant. This is a
# DIFFERENT board lineage from the canonical ceiling AirIQ base: per
# CORE-ABSTRACT-BUS-001B operator decision #10 it is deliberately OUT OF SCOPE
# for the shared `core_i2c` consolidation and retains its own pre-001B
# `i2c_primary` bus binding, and it carries the AirIQ-only status-LED line
# (`airiq_status_led_pin: GPIO7`, schematic IO7 = AirQ_Status_Led).
#
# AIRIQ-HW-RECONCILE-001. This legacy lineage previously instantiated the SPS30
# unconditionally (0x69). The SPS30 is an off-board opt-in attachment, not part
# of the S360-210 PCB, so the unconditional probe and the PM-derived entities
# have been removed here too. This lineage has no live product binder; it is
# frozen at the SGP41 + SCD41 core and is NOT extended with the R4 SFA40 / MICS
# stack (that lives in the canonical `s360-210-airiq.yaml`). The canonical
# board package + the SPS30 opt-in overlay
# (`packages/boards/s360-210-airiq-sps30.yaml`) are the supported path for the
# full R4 hardware.
#
# Legacy alias (path preserved, retained while live binders exist):
#   airiq_ceiling_s3.yaml -> !include this overlay
# ============================================================================

substitutions:
  # I2C Configuration (uses ceiling S3 primary bus)
  airiq_i2c_id: i2c_primary
  airiq_i2c_sda: ${i2c_primary_sda_pin}
  airiq_i2c_scl: ${i2c_primary_scl_pin}

  # Sensor update intervals
  airiq_sgp41_update: 30s
  airiq_scd41_update: 30s

  # CO2 calibration
  co2_auto_calibration: "true"

  # Status LED (only GPIO7 available, GPIO8 conflicts with I2C)
  airiq_status_led_pin: GPIO7

# ============================================================================
# SGP41 - VOC/NOx Sensor
# ============================================================================
sensor:
  - platform: sgp4x
    id: sgp41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x59
    update_interval: ${airiq_sgp41_update}

    voc:
      id: airiq_voc_index
      name: "${friendly_name} VOC Index"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    nox:
      id: airiq_nox_index
      name: "${friendly_name} NOx Index"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    compensation:
      temperature_source: airiq_scd41_temperature
      humidity_source: airiq_scd41_humidity

    store_baseline: true

    # ==========================================================================
    # SCD41 - CO2 Sensor
    # ==========================================================================
  - platform: scd4x
    id: scd41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x62
    update_interval: ${airiq_scd41_update}

    co2:
      id: airiq_co2
      name: "${friendly_name} CO2"
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_scd41_update}

    temperature:
      id: airiq_scd41_temperature
      name: "${friendly_name} Temperature (SCD41)"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    humidity:
      id: airiq_scd41_humidity
      name: "${friendly_name} Humidity (SCD41)"
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    automatic_self_calibration: ${co2_auto_calibration}
    measurement_mode: periodic

  # ==========================================================================
  # COMPOSITE SENSORS (from SCD41)
  # ==========================================================================
  - platform: template
    id: airiq_temperature
    name: "${friendly_name} Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:thermometer
    lambda: |-
      float temp_scd41 = id(airiq_scd41_temperature).state;
      if (!std::isnan(temp_scd41)) return temp_scd41;
      return NAN;
    update_interval: 30s

  - platform: template
    id: airiq_humidity
    name: "${friendly_name} Humidity"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:water-percent
    lambda: |-
      float hum_scd41 = id(airiq_scd41_humidity).state;
      if (!std::isnan(hum_scd41)) return hum_scd41;
      return NAN;
    update_interval: 30s

# ============================================================================
# MODULE INITIALIZATION
# ============================================================================
esphome:
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            id(module_airiq_present) = true;
            ESP_LOGI("airiq_ceiling_s3", "AirIQ module initialized on I2C %s/%s",
                     "${airiq_i2c_sda}", "${airiq_i2c_scl}");
            ESP_LOGI("airiq_ceiling_s3", "  - SGP41 at 0x59");
            ESP_LOGI("airiq_ceiling_s3", "  - SCD41 at 0x62");
            ESP_LOGI("airiq_ceiling_s3", "  - SPS30 PM: external, opt-in only");

# ============================================================================
# LOGGING
# ============================================================================
logger:
  logs:
    sgp4x: INFO
    scd4x: INFO
    component: ERROR
