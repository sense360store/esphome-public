# ============================================================================
# Sense360 RoomIQ — Radar (presence) driver, wall/desk  (S360-200-R4)  [AUTHORITATIVE]
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# Authoritative, self-contained definition of the wall/desk RoomIQ radar/
# presence half — HLK-LD2450 24 GHz multi-target radar on the named
# `ld2450_uart_id: roomiq_hi_link_uart` (CORE-ABSTRACT-BUS-001C, 256000 baud).
# The wall merged board `s360-200-roomiq-wall.yaml` composes this radar half
# with the wall climate half `s360-200-roomiq-climate-wall.yaml`.
#
# Source-of-truth inversion: the body below previously lived in
# `packages/expansions/presence_wall.yaml`; that path is now a thin alias that
# `!include`s this file, so the resolved behaviour is byte-identical.
# ============================================================================
substitutions:
  module_sku: S360-PRES-W
  module_variant: wall

  # UART Configuration — RoomIQ J10 Hi-Link radar UART.
  # CORE-ABSTRACT-BUS-001C: was `uart_bus` (single, schematic-conflicting); now
  # uses the named Hi-Link UART defined by the Core abstract package. The
  # Hi-Link LD2450 radar runs at 256000 baud per operator decision #7.
  ld2450_uart_id: roomiq_hi_link_uart
  ld2450_baud: "256000"

  # Presence detection settings
  presence_timeout: 30s

# ============================================================================
# LD2450 Radar Component (Native ESPHome)
# ============================================================================
ld2450:
  id: ld2450_radar
  uart_id: ${ld2450_uart_id}

# ============================================================================
# Binary Sensors - Presence Detection
# ============================================================================
binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      id: ld2450_occupancy
      name: "${friendly_name} Radar Presence"
      internal: true
      device_class: occupancy
    has_moving_target:
      id: ld2450_has_moving
      name: "${friendly_name} Moving Target"
      internal: true
    has_still_target:
      id: ld2450_has_still
      name: "${friendly_name} Still Target"
      internal: true

# ============================================================================
# Sensors - Target Tracking
# ============================================================================
sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      id: ld2450_target_count
      name: "${friendly_name} Target Count"
      internal: true
    still_target_count:
      id: ld2450_still_target_count
      name: "${friendly_name} Still Target Count"
      internal: true
    moving_target_count:
      id: ld2450_moving_target_count
      name: "${friendly_name} Moving Target Count"
      internal: true
    # Target 1
    target_1:
      x:
        id: ld2450_t1_x
        name: "${friendly_name} Target 1 X"
        internal: true
      y:
        id: ld2450_t1_y
        name: "${friendly_name} Target 1 Y"
        internal: true
      speed:
        id: ld2450_t1_speed
        name: "${friendly_name} Target 1 Speed"
        internal: true
      distance:
        id: ld2450_t1_distance
        name: "${friendly_name} Target 1 Distance"
        internal: true
      angle:
        id: ld2450_t1_angle
        name: "${friendly_name} Target 1 Angle"
        internal: true
    # Target 2
    target_2:
      x:
        id: ld2450_t2_x
        name: "${friendly_name} Target 2 X"
        internal: true
      y:
        id: ld2450_t2_y
        name: "${friendly_name} Target 2 Y"
        internal: true
      speed:
        id: ld2450_t2_speed
        name: "${friendly_name} Target 2 Speed"
        internal: true
      distance:
        id: ld2450_t2_distance
        name: "${friendly_name} Target 2 Distance"
        internal: true
      angle:
        id: ld2450_t2_angle
        name: "${friendly_name} Target 2 Angle"
        internal: true
    # Target 3
    target_3:
      x:
        id: ld2450_t3_x
        name: "${friendly_name} Target 3 X"
        internal: true
      y:
        id: ld2450_t3_y
        name: "${friendly_name} Target 3 Y"
        internal: true
      speed:
        id: ld2450_t3_speed
        name: "${friendly_name} Target 3 Speed"
        internal: true
      distance:
        id: ld2450_t3_distance
        name: "${friendly_name} Target 3 Distance"
        internal: true
      angle:
        id: ld2450_t3_angle
        name: "${friendly_name} Target 3 Angle"
        internal: true

# ============================================================================
# Globals for Presence Detection
# ============================================================================
globals:
  - id: presence_confidence
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: presence_closest_distance
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: presence_people_count
    type: int
    restore_value: false
    initial_value: '0'

  - id: ld2450_still_count
    type: int
    restore_value: false
    initial_value: '0'

  - id: ld2450_moving_count
    type: int
    restore_value: false
    initial_value: '0'

# Update presence data
interval:
  - interval: 1s
    then:
      - lambda: |-
          int targets = id(ld2450_target_count).state;
          int moving = id(ld2450_moving_target_count).state;
          int still = id(ld2450_still_target_count).state;

          id(ld2450_still_count) = still;
          id(ld2450_moving_count) = moving;
          id(presence_people_count) = targets;

          if (targets > 0) {
            if (moving > 0) {
              id(presence_confidence) = 0.95f;
            } else if (still > 0) {
              id(presence_confidence) = 0.7f;
            } else {
              id(presence_confidence) = 0.6f;
            }

            float min_dist = 9999.0f;
            float d1 = id(ld2450_t1_distance).state;
            float d2 = id(ld2450_t2_distance).state;
            float d3 = id(ld2450_t3_distance).state;

            if (!std::isnan(d1) && d1 > 0 && d1 < min_dist) min_dist = d1;
            if (!std::isnan(d2) && d2 > 0 && d2 < min_dist) min_dist = d2;
            if (!std::isnan(d3) && d3 > 0 && d3 < min_dist) min_dist = d3;

            if (min_dist < 9999.0f) {
              id(presence_closest_distance) = min_dist;
            }
          } else {
            id(presence_confidence) = 0.1f;
            id(presence_closest_distance) = 0.0f;
          }

text_sensor:
  - platform: template
    name: "${friendly_name} Presence Module SKU"
    lambda: |-
      return {"${module_sku}"};
    update_interval: never
    entity_category: diagnostic
