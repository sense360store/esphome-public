# ============================================================================
# Sense360 Core — Wall variant overlay (S360-100-R4)
# ============================================================================
# BOARD-PACKAGE-LAYER-001. SKU-aligned mount variant of the canonical Core
# board package `packages/boards/s360-100-core.yaml`.
#
# Thin wrapper over the existing functional package
# `packages/hardware/sense360_core_wall.yaml` (byte-identical behaviour). The
# wrapped package embeds the same reconciled ESP32-S3-WROOM-1-N16R8 chip block
# (16 MB / 8 MB octal PSRAM), the schematic pin map, and the shared `core_i2c`
# bus the canonical base defines — i.e. base + the wall mount delta (dual user
# buttons, button-action selects, relay state-time sensor).
#
# Legacy alias policy (docs/arch-board-bundle-plan.md §3.3): the legacy
# `packages/hardware/sense360_core_wall.yaml` path is preserved unchanged as
# the source of truth; no product is rebound onto this board package in this
# slice.
# ============================================================================

packages:
  board_core: !include ../hardware/sense360_core_wall.yaml
