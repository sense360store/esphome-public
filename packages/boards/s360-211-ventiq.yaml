# ============================================================================
# Sense360 VentIQ — Canonical Board Package (S360-211-R4)
# ============================================================================
# PACKAGE-RENAME-003 (docs/arch-board-bundle-plan.md §7 item 4) — the VentIQ
# family is the third source-of-truth flip (after LED and AirIQ). This board
# package is now the AUTHORITATIVE, self-contained definition of the Sense360
# VentIQ bathroom-focused air-quality / ventilation board (SKU `S360-211`,
# revision R4, friendly name "Sense360 VentIQ"; `schematic_status: verified`
# per config/hardware-catalog.json). VentIQ is the bathroom IAQ board
# (docs/arch-board-bundle-plan.md §2.1): SHT4x temp/humidity + BMP390 pressure
# + SGP41 VOC/NOx tuned for shower-humidity and mould-risk detection, on the
# shared core_i2c bus (CORE-ABSTRACT-BUS-001B).
#
# This canonical base IS the **base** VentIQ hardware stack (SKU S360-BATH-B):
#
#   - SHT4x temp/humidity @ 0x44, BMP390 pressure @ 0x77, SGP41 VOC/NOx @ 0x59
#     — all on `bathroom_i2c_id: core_i2c`.
#
# Source-of-truth inversion (docs/arch-board-bundle-plan.md §3.3, §5.5): the
# content below previously lived in
# `packages/expansions/airiq_bathroom_base.yaml` and this package was a thin
# `!include` wrapper over it. That is now inverted — the definition lives here
# and `packages/expansions/airiq_bathroom_base.yaml` is a thin alias that
# `!include`s this package, so the resolved behaviour is byte-identical to the
# legacy path. The "Pro" hardware variant is the thin overlay
# `s360-211-ventiq-pro.yaml`.
#
# ----------------------------------------------------------------------------
# Variant map (docs/arch-board-bundle-plan.md §2.1)
# ----------------------------------------------------------------------------
#   base VentIQ : THIS file                 (SHT4x + BMP390 + SGP41, core_i2c)
#   pro VentIQ  : s360-211-ventiq-pro.yaml  (adds MLX90614 IR surface temp +
#                                            SPS30 particulate matter)
#
# No un-folded base driver: unlike AirIQ (where the generic `airiq.yaml` stayed
# authoritative and cross-referenced, mirroring how `ceiling_halo_leds.yaml`
# stayed a feature in PACKAGE-RENAME-001), the entire VentIQ driver content
# lives in `airiq_bathroom_base.yaml` / `airiq_bathroom_pro.yaml`, both of which
# are folded here / into the Pro overlay. There is therefore no VentIQ
# equivalent of a cross-referenced base driver to keep authoritative.
#
# The VentIQ user-facing experience lives in the feature layer (layered on
# top of this board, not absorbed — docs/arch-board-bundle-plan.md §2.3):
# bundles compose `packages/features/ventiq_framework.yaml`
# (VENTIQ-FRAMEWORK-001) while legacy shim products keep the legacy
# `packages/features/bathroom_profile.yaml` profile unchanged. VentIQ
# has no Core-driven LED line (CORE-ABSTRACT-BUS-001C operator decision #12) —
# this board package adds none. AirIQ (S360-210) and VentIQ are mutually
# exclusive air-quality modules per docs/release-one.md.
#
# ----------------------------------------------------------------------------
# Legacy aliases (paths preserved, retained while live binders exist; §3.3)
# ----------------------------------------------------------------------------
#   airiq_bathroom_base.yaml -> !include this file               (folded; now alias)
#   airiq_bathroom_pro.yaml  -> !include s360-211-ventiq-pro.yaml (folded; now alias)
#   bathroom.yaml            -> !include this file + bathroom_profile (compat wrapper)
#   ventiq.yaml              -> !include airiq_bathroom_base.yaml  (Phase-2 naming
#                               alias; chains through the now-aliased legacy path)
#   ventiq_extended.yaml     -> !include airiq_bathroom_pro.yaml   (Phase-2 naming alias)
#
# Live binders keep resolving through the preserved legacy paths: the production
# bundle/product (Ceiling-POE-VentIQ-RoomIQ) binds THIS board package directly;
# `products/sense360-core-ceiling-bathroom.yaml`, the FanRelay/FanTRIAC bundles,
# and `products/compile-only/ceiling-poe-ventiq.yaml` bind
# `airiq_bathroom_base.yaml` (now an alias of this file). No alias is dropped
# while a live binder exists; alias removal is a separate later slice (§3.3).
#
# Expansion Bus Connection (per CORE-ABSTRACT-BUS-001B):
#   Pin 4 (SDA) -> GPIO48   Pin 5 (SCL) -> GPIO45
#   Pin 2 (3.3V) -> Power    Pin 1 (GND) -> Ground
# Power Requirements: 3.3V / 200mA max
#
# ----------------------------------------------------------------------------
# Hardware-authority note (VENTIQ-FRAMEWORK-001 audit — behaviour unchanged)
# ----------------------------------------------------------------------------
# The verified schematic docs/hardware/schematics/S360-211-R4.pdf (single
# sheet, Id 1/1; `schematic_status: verified` in config/hardware-catalog.json)
# shows exactly ONE on-board sensor: the SGP41 (U3). It shows NO SHT4x and
# NO BMP390 anywhere, and no S360-211 BOM artifact record is committed
# (docs/hardware/artifacts/ has no S360-211 entry). The SHT4x @0x44 and
# BMP390 @0x77 drivers compiled below are therefore FIRMWARE/SCHEMATIC
# DRIFT — already CONFIRM-flagged in config/feature-entity-matrix.json. In
# every current VentIQ composition the S360-200 RoomIQ board's SHT4x sits at
# the same address (0x44) on the same shared core_i2c bus, so the two
# compiled sht4x components poll one physical device; no plausible device
# answers the bmp3xx driver at 0x77 in a VentIQ+RoomIQ composition. This
# package deliberately stays byte-compatible (raw ids internal, addresses
# and intervals unchanged) — removing or rebinding the drifted drivers is
# the VENTIQ-HW-DRIFT-001 reconciliation's decision (owner sign-off, BOM /
# CPL evidence), never this framework's. The `module_sku: S360-BATH-B`
# substitution below is a legacy identifier that is NOT in the hardware
# catalog (canonical SKU: S360-211) — tracked as VENTIQ-SKU-LABEL-001. The
# schematic also shows the SPS30 (J4) and IR-temperature (J3) connectors
# (optional external attachments, no compiled driver) and an inline
# fan-relay stage whose components are drawn crossed-out (KiCad
# do-not-populate convention; population unproven, no bound driver, no
# compliance claim — COMPLIANCE-001 / VENTIQ-RELAY-POPULATION-001).
# ============================================================================

substitutions:
  module_sku: S360-BATH-B
  module_variant: bathroom_base

  # I2C Configuration
  # Uses the shared core_i2c bus defined by the parent Core abstract package
  # (GPIO48/GPIO45 per S360-100-R4; CORE-ABSTRACT-BUS-001B).
  bathroom_i2c_id: core_i2c

  # Sensor update intervals
  bathroom_sht4x_update: 10s   # Fast updates for shower detection
  bathroom_bmp390_update: 60s
  bathroom_sgp41_update: 10s

  # Humidity thresholds
  shower_humidity_threshold: "75"      # Humidity % to detect shower
  shower_humidity_rate: "5"            # Rate of change to detect shower start
  mold_risk_humidity: "65"             # Sustained humidity for mold risk
  mold_risk_duration_minutes: "30"     # Duration for mold risk warning

# ============================================================================
# SENSORS
# ============================================================================
sensor:
  # ============================================================================
  # SHT4x - High-Accuracy Temperature/Humidity Sensor (Sensirion)
  # I2C Address: 0x44
  # Primary sensor for humidity spike detection
  # ============================================================================
  - platform: sht4x
    id: bathroom_sht4x_sensor
    i2c_id: ${bathroom_i2c_id}
    address: 0x44

    temperature:
      id: bathroom_temperature
      name: "${friendly_name} Temperature"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${bathroom_sht4x_update}

    humidity:
      id: bathroom_humidity
      name: "${friendly_name} Humidity"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${bathroom_sht4x_update}

    precision: High
    heater_power: "Low"
    update_interval: ${bathroom_sht4x_update}

  # ============================================================================
  # BMP390 - Barometric Pressure Sensor (Bosch)
  # I2C Address: 0x77
  # ============================================================================
  - platform: bmp3xx_i2c
    id: bathroom_bmp390_sensor
    i2c_id: ${bathroom_i2c_id}
    address: 0x77

    temperature:
      id: bathroom_bmp390_temperature
      name: "${friendly_name} BMP390 Temperature"
      internal: true
      oversampling: 2x

    pressure:
      id: bathroom_pressure
      name: "${friendly_name} Pressure"
      internal: true
      oversampling: 2x

    update_interval: ${bathroom_bmp390_update}

  # ============================================================================
  # SGP41 - VOC/NOx Sensor (Sensirion)
  # I2C Address: 0x59
  # Detects odors and bathroom-specific VOCs
  # ============================================================================
  - platform: sgp4x
    id: bathroom_sgp41_sensor
    i2c_id: ${bathroom_i2c_id}
    address: 0x59

    voc:
      id: bathroom_voc_index
      name: "${friendly_name} VOC Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${bathroom_sgp41_update}

    nox:
      id: bathroom_nox_index
      name: "${friendly_name} NOx Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${bathroom_sgp41_update}

    # Compensation from SHT4x for better accuracy
    compensation:
      temperature_source: bathroom_temperature
      humidity_source: bathroom_humidity

    store_baseline: true
    update_interval: ${bathroom_sgp41_update}

  # ============================================================================
  # Calculated Sensors
  # ============================================================================
  # Humidity rate of change (for shower detection)
  - platform: template
    id: bathroom_humidity_rate
    name: "${friendly_name} Humidity Rate"
    internal: true
    unit_of_measurement: "%/min"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      static float last_humidity = 0.0f;
      static unsigned long last_time = 0;

      float current_humidity = id(bathroom_humidity).state;
      unsigned long current_time = millis();

      if (std::isnan(current_humidity)) {
        return 0.0f;
      }

      if (last_time == 0) {
        last_humidity = current_humidity;
        last_time = current_time;
        return 0.0f;
      }

      float time_diff_min = (current_time - last_time) / 60000.0f;
      float humidity_diff = current_humidity - last_humidity;

      last_humidity = current_humidity;
      last_time = current_time;

      if (time_diff_min > 0) {
        return humidity_diff / time_diff_min;
      }
      return 0.0f;

  # Dew point calculation
  - platform: template
    id: bathroom_dew_point
    name: "${friendly_name} Dew Point"
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      float temp = id(bathroom_temperature).state;
      float humidity = id(bathroom_humidity).state;

      if (std::isnan(temp) || std::isnan(humidity)) {
        return NAN;
      }

      // Magnus formula for dew point
      float a = 17.27f;
      float b = 237.7f;
      float alpha = ((a * temp) / (b + temp)) + log(humidity / 100.0f);
      return (b * alpha) / (a - alpha);

# ============================================================================
# Globals for Bathroom Logic
# ============================================================================
globals:
  # Shower detected flag
  - id: bathroom_shower_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Mold risk level (0=none, 1=low, 2=medium, 3=high)
  - id: bathroom_mold_risk
    type: int
    restore_value: false
    initial_value: '0'

  # High humidity duration counter (minutes)
  - id: bathroom_high_humidity_minutes
    type: int
    restore_value: false
    initial_value: '0'

  # Odor detected flag
  - id: bathroom_odor_detected
    type: bool
    restore_value: false
    initial_value: 'false'

  # Post-shower ventilation timer (minutes remaining)
  - id: bathroom_post_shower_timer
    type: int
    restore_value: false
    initial_value: '0'

  # Recommended fan speed (0-100)
  - id: bathroom_fan_recommendation
    type: int
    restore_value: false
    initial_value: '0'

# ============================================================================
# Binary Sensors
# ============================================================================
binary_sensor:
  # Shower detection
  - platform: template
    id: bathroom_shower_sensor
    name: "${friendly_name} Shower Active"
    internal: true
    device_class: moisture
    lambda: |-
      return id(bathroom_shower_active);

  # Mold risk warning
  - platform: template
    id: bathroom_mold_warning
    name: "${friendly_name} Mold Risk"
    internal: true
    device_class: problem
    lambda: |-
      return id(bathroom_mold_risk) >= 2;

  # Odor detection
  - platform: template
    id: bathroom_odor_sensor
    name: "${friendly_name} Odor Detected"
    internal: true
    device_class: gas
    lambda: |-
      return id(bathroom_odor_detected);

# ============================================================================
# Interval for Bathroom Logic
# ============================================================================
interval:
  # Fast interval for shower detection
  - interval: 10s
    then:
      - lambda: |-
          float humidity = id(bathroom_humidity).state;
          float humidity_rate = id(bathroom_humidity_rate).state;
          float voc = id(bathroom_voc_index).state;

          if (std::isnan(humidity)) return;

          // Shower detection logic
          bool was_shower_active = id(bathroom_shower_active);

          // Start shower detection: rapid humidity increase OR high humidity
          if (!was_shower_active) {
            if (humidity_rate > ${shower_humidity_rate} || humidity > ${shower_humidity_threshold}) {
              id(bathroom_shower_active) = true;
              ESP_LOGI("bathroom", "Shower started - humidity: %.1f%%, rate: %.1f%%/min",
                       humidity, humidity_rate);
            }
          } else {
            // End shower detection: humidity dropping below threshold
            if (humidity < (${shower_humidity_threshold} - 10) && humidity_rate < 0) {
              id(bathroom_shower_active) = false;
              // Start post-shower timer (15 minutes default)
              id(bathroom_post_shower_timer) = 15;
              ESP_LOGI("bathroom", "Shower ended - starting post-shower ventilation");
            }
          }

          // Odor detection (VOC index > 150 indicates odor)
          if (!std::isnan(voc)) {
            id(bathroom_odor_detected) = (voc > 150);
          }

          // Calculate fan recommendation
          int fan_speed = 0;

          if (id(bathroom_shower_active)) {
            // During shower: high speed
            fan_speed = 100;
          } else if (id(bathroom_post_shower_timer) > 0) {
            // Post-shower: medium-high speed
            fan_speed = 70;
          } else if (id(bathroom_odor_detected)) {
            // Odor detected: medium speed
            fan_speed = 50;
          } else if (humidity > 60.0f) {
            // Elevated humidity: low speed
            fan_speed = 30;
          }

          id(bathroom_fan_recommendation) = fan_speed;

  # Slow interval for mold risk calculation
  - interval: 1min
    then:
      - lambda: |-
          float humidity = id(bathroom_humidity).state;

          if (std::isnan(humidity)) return;

          // Track duration of high humidity
          if (humidity > ${mold_risk_humidity}) {
            id(bathroom_high_humidity_minutes)++;
          } else {
            // Reset counter when humidity drops
            if (id(bathroom_high_humidity_minutes) > 0) {
              id(bathroom_high_humidity_minutes) = 0;
            }
          }

          // Calculate mold risk level
          int minutes = id(bathroom_high_humidity_minutes);
          if (minutes >= ${mold_risk_duration_minutes} * 2) {
            id(bathroom_mold_risk) = 3;  // High risk
          } else if (minutes >= ${mold_risk_duration_minutes}) {
            id(bathroom_mold_risk) = 2;  // Medium risk
          } else if (minutes >= ${mold_risk_duration_minutes} / 2) {
            id(bathroom_mold_risk) = 1;  // Low risk
          } else {
            id(bathroom_mold_risk) = 0;  // No risk
          }

          // Decrement post-shower timer
          if (id(bathroom_post_shower_timer) > 0) {
            id(bathroom_post_shower_timer)--;
          }

text_sensor:
  - platform: template
    name: "${friendly_name} AirIQ Module SKU"
    lambda: |-
      return {"${module_sku}"};
    update_interval: never
    entity_category: diagnostic
