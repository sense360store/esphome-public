# ============================================================================
# Sense360 Core ŌĆö Canonical Board Package (S360-100-R4)
# ============================================================================
# BOARD-PACKAGE-LAYER-001 ŌĆö the SKU-aligned board layer, Core first.
#
# This is the single canonical definition of the Sense360 Core main board
# (SKU `S360-100`, revision R4, friendly name "Sense360 Core"). It owns the
# board's three hardware fundamentals per docs/arch-board-bundle-plan.md ┬¦2.1:
#
#   1. the reconciled ESP32-S3 chip block (flash size + PSRAM mode/speed),
#   2. the schematic-correct Core pin map (substitutions), and
#   3. the single shared `core_i2c` bus (CORE-ABSTRACT-BUS-001B).
#
# It consolidates what was previously split ŌĆö and drifting ŌĆö between
# `packages/hardware/sense360_core.yaml` and
# `packages/hardware/sense360_core_mapping.yaml`. One definition, no internal
# contradiction.
#
# ----------------------------------------------------------------------------
# Chip drift reconciliation (BOARD-PACKAGE-LAYER-001 first act)
# ----------------------------------------------------------------------------
# docs/arch-board-bundle-plan.md ┬¦4.1 records a flash/PSRAM drift: the
# product-bound Core packages (`sense360_core*.yaml`, `*_ceiling`, `*_wall`,
# `*_poe`) said "8 MB Flash / 2 MB PSRAM", while `sense360_core_mapping.yaml`
# (and the voice / S3 variants) said "16 MB / 8 MB N16R8".
#
# Resolved to the single verified value: ESP32-S3-WROOM-1-N16R8
#   - Flash : 16 MB   (`flash_size: 16MB`)
#   - PSRAM : 8 MB octal-SPI @ 80 MHz (`mode: octal`, `speed: 80MHz`)
#
# Source (schematic AND BOM agree ŌĆö no conflict):
#   - Schematic: docs/hardware/schematics/S360-100-R4.pdf
#     (SHA256 4c9e8b06d129fbb55f61e143b648e03762d06cb4dc67fe3120c268cd3a4bdf16,
#      837,443 bytes, KiCad E.D.A. 10.0.3) ŌĆö component U6 is the
#     `ESP32-S3-WROOM-1-N16R8` module; IO35/IO36/IO37 are reserved for the
#     on-module octal-SPI PSRAM per the schematic note. Transcribed in
#     docs/hardware/s360-100-r4-core.md ┬¦"Main components" and ┬¦"ESP32-S3 pin
#     and net mapping".
#   - BOM: bc386261-S360100R4_BOM.xlsx
#     (SHA256 e289f135a2c88dd747689c70075e2f1cf49906f4bda8b4c4abad67d0dad961fc),
#     U6 module, per docs/hardware/artifacts/S360-100-R4.md ┬¦"Board identity".
#
# ----------------------------------------------------------------------------
# GPIO4 / GPIO5 fan-vs-radar collision reconciliation (┬¦4.2)
# ----------------------------------------------------------------------------
# Schematic S360-100-R4: IO4 = SEN0609_RX, IO5 = SEN0609_TX ŌĆö the RoomIQ J10
# DFRobot SEN0609 radar UART. The canonical Core therefore binds GPIO4/GPIO5
# to `roomiq_sen0609_uart` (below) and does NOT expose native fan PWM/tach on
# those pins (the legacy `fan_pwm_pin: GPIO4` / `fan_tach_pin: GPIO5` of
# `sense360_core_mapping.yaml` is the collision flagged in ┬¦4.2). Native fan
# tach / PWM terminate on their own dedicated GPIOs per
# docs/hardware/s360-100-native-fan-gpio-map.md (TachIO = IO16; Pul_Cou1..4 =
# IO17/IO18/IO46/IO9; TachPMW1..4 = IO10/IO11/IO12/IO39). The board cannot
# simultaneously expose the SEN0609 UART and native fan PWM/tach on GPIO4/5.
#
# ----------------------------------------------------------------------------
# Schematic pin map (S360-100-R4 ŌĆö IO Ōåö net, see docs/hardware/s360-100-r4-core.md)
# ----------------------------------------------------------------------------
#   IO48 = I2C_SDA   IO45 = I2C_SCL   (shared core_i2c, R22/R21 10 k╬® pull-ups)
#   IO1  = Hi-Link_RX  IO2 = Hi-Link_TX   (RoomIQ J10 Hi-Link radar UART)
#   IO4  = SEN0609_RX  IO5 = SEN0609_TX   (RoomIQ J10 DFRobot radar UART)
#   IO6  = out(gpio6)  (RoomIQ J10 auxiliary line)
#   IO3  = Relay       (J4 Relay module gate; CORE-ABSTRACT-BUS-001A)
#   IO15 = PIR         (RoomIQ J10 motion input)
#   IO46 = GP_Fan_Status_Led  (Core-side fan status indicator)
#   IO9  = user button   IO0 = boot/IO0 strap
#
# This package is additive: no product or test references it in this slice.
# The legacy `packages/hardware/sense360_core*.yaml` paths are preserved as
# source-of-truth aliases (docs/arch-board-bundle-plan.md ┬¦3.3) so every
# existing product and test keeps resolving unchanged. The SKU-aligned
# mount/power/voice variant overlays live alongside this file as
# `packages/boards/s360-100-core-*.yaml`.
# ============================================================================

substitutions:
  # Board identity (S360-100-R4 / Sense360 Core)
  board_sku: S360-100
  board_rev: R4

  # Relay: schematic-correct Relay net on IO3 (CORE-ABSTRACT-BUS-001A).
  relay_pin: GPIO3

  # Core-side Fan Status LED indicator (schematic IO46 = GP_Fan_Status_Led).
  fan_status_led_pin: GPIO46

  # RoomIQ J10 SEN0609 auxiliary output line (schematic IO6 = out(gpio6)).
  roomiq_sen0609_output_pin: GPIO6

  # RoomIQ J10 PIR motion input (schematic IO15 = PIR).
  pir_sensor_pin: GPIO15

  # Buttons
  user_button_pin: GPIO9
  boot_button_pin: GPIO0

  # RGB status-LED substitution name retained for downstream consumers. Note
  # GPIO48 is the I┬▓C SDA pin per CORE-ABSTRACT-BUS-001B; a future LED-ring
  # audit reconciles or retires this name (no `light:` block here consumes it).
  status_led_rgb_pin: GPIO48

# Reconciled ESP32-S3-WROOM-1-N16R8 chip block (16 MB flash, 8 MB octal PSRAM).
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y

psram:
  mode: octal
  speed: 80MHz

# Shared Core I2C bus (CORE-ABSTRACT-BUS-001B).
# Schematic IO48 = I2C_SDA, IO45 = I2C_SCL per S360-100-R4; pulled up by
# R22/R21 10 k╬®. Single bus serves every Core-side I┬▓C consumer (sensors,
# SX1509 expander, GP8403 DAC, halo LED PCA9685).
i2c:
  - id: core_i2c
    sda: GPIO48
    scl: GPIO45
    scan: true
    frequency: 400kHz

# RoomIQ J10 radar UARTs ŌĆö schematic-correct ESP-perspective direction and
# baud rates (CORE-ABSTRACT-BUS-001C).
uart:
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000

  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200
