# ============================================================================
# Sense360 RoomIQ — Radar (presence) driver, ceiling  (S360-200-R4)  [AUTHORITATIVE]
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# Authoritative, self-contained definition of the ceiling RoomIQ radar/presence
# half — HLK-LD2450 24 GHz multi-target radar on the named
# `ld2450_uart_id: roomiq_hi_link_uart` (CORE-ABSTRACT-BUS-001C, 256000 baud).
# The production-facing merged board `s360-200-roomiq.yaml` composes this radar
# half with the climate half `s360-200-roomiq-climate.yaml`.
#
# Source-of-truth inversion: the body below previously lived in
# `packages/expansions/presence_ceiling.yaml` and the board package was a thin
# `!include` wrapper over it. That is now inverted — the definition lives here
# and `presence_ceiling.yaml` is a thin alias that `!include`s this file, so the
# resolved behaviour is byte-identical. The wall radar half is
# `s360-200-roomiq-radar-wall.yaml`.
#
# NOTE — distinct from the radar PRIMITIVES: the shared base radar drivers
# `packages/expansions/presence_ld2450.yaml` and `presence_ld2412.yaml` are
# cross-referenced primitives (documented in packages/SENSE360_MODULES.md, no
# board package holds their content); they stay AUTHORITATIVE and are NOT
# aliased, mirroring how `airiq.yaml` / `ceiling_halo_leds.yaml` stayed
# authoritative in RENAME-001/002.
#
# PRESENCE-FRAMEWORK-001 changes (see
# docs/architecture/sense360-presence-framework.md):
#   * This file is now the LD2450 ADAPTER of the tri-sensor Presence
#     framework. Radar target detail (per-target X/Y/speed/distance/angle,
#     moving/still counts, has-target flags) is exposed as diagnostic,
#     disabled-by-default entities — available to advanced users and to
#     Sense360Zones (the ld2450_t{1..3}_{x,y,speed,distance,angle} IDs are a
#     stable API surface) without cluttering the default customer view.
#   * Real freshness signal: the LD2450 component republishes its
#     target-count, moving-target-count and still-target-count sensors as it
#     processes radar frames, and the on_value hook of EACH of those three
#     sensors calls the board-local s360_radar_mark_frame script, which
#     timestamps s360_radar_last_frame_ms. The fusion engine treats missing
#     frames as STALE (unknown), never as "clear".
#     Freshness evidence limitation (S360-200-R4 bench, firmware
#     2.14.25112412): ESPHome's ld2450 platform exposes no single callback
#     guaranteed to fire on every received frame. The native target-count
#     sensor does NOT necessarily republish when the count is unchanged, so a
#     stationary occupant held at target count 1 while coordinates, speed and
#     moving/still state keep changing would previously age the radar out to
#     STALE even though live frames were arriving. Using the union of the
#     target-count, moving-count and still-count callbacks is the strongest
#     evidence-backed combination available: at least one of them updates on
#     the frame transitions the bench proves continue. This is a supported
#     component-callback signal, NOT an exact per-frame guarantee, and it is
#     not claimed as one.
#   * The former synthetic confidence tiers (0.95 / 0.7 / 0.6) had no
#     evidence basis and were removed. presence_confidence remains ONLY as
#     a legacy compatibility signal for the pre-framework profiles
#     (packages/features/presence_basic*.yaml, still used by legacy
#     products and compile-only skeletons): 1.0 while the radar reports a
#     target, 0.0 otherwise — a binary radar-presence indicator, NOT a
#     probability or confidence claim.
# ============================================================================
substitutions:
  module_sku: S360-PRES-C
  module_variant: ceiling

  # UART Configuration — RoomIQ J10 Hi-Link radar UART.
  # CORE-ABSTRACT-BUS-001C: was `uart_bus` (single, schematic-conflicting); now
  # uses the named Hi-Link UART defined by the Core abstract package. The
  # Hi-Link LD2450 radar runs at 256000 baud per operator decision #7.
  ld2450_uart_id: roomiq_hi_link_uart
  ld2450_baud: "256000"

  # Presence detection settings
  presence_timeout: 30s

# ============================================================================
# LD2450 Radar Component (Native ESPHome)
# ============================================================================
ld2450:
  id: ld2450_radar
  uart_id: ${ld2450_uart_id}

# ============================================================================
# Binary Sensors - Presence Detection (diagnostic, disabled by default)
# ============================================================================
binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      id: ld2450_occupancy
      name: "Radar Presence"
      device_class: occupancy
      entity_category: diagnostic
      disabled_by_default: true
    has_moving_target:
      id: ld2450_has_moving
      name: "Radar Moving Target"
      entity_category: diagnostic
      disabled_by_default: true
    has_still_target:
      id: ld2450_has_still
      name: "Radar Still Target"
      entity_category: diagnostic
      disabled_by_default: true

# ============================================================================
# Sensors - Target Tracking (diagnostic / internal)
# ============================================================================
# The per-target coordinate stream keeps its stable IDs
# (ld2450_t{1..3}_{x,y,speed,distance,angle}) — the Sense360Zones data
# contract — and full component resolution. Entities are diagnostic and
# disabled by default: the customer surface is the fusion layer
# (packages/features/presence_framework.yaml).
sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      id: ld2450_target_count
      internal: true
      # PRESENCE-FRAMEWORK-001 freshness signal. This is ONE of the three
      # LD2450 frame-driven callbacks that record radar activity via the
      # board-local s360_radar_mark_frame script. target_count alone is not
      # a valid proxy for every frame: the bench proves it does not
      # necessarily republish while the count is unchanged (a person held at
      # target count 1 while still moving). The moving- and still-count
      # callbacks below cover those unchanged-count frames.
      on_value:
        then:
          - script.execute: s360_radar_mark_frame
    still_target_count:
      id: ld2450_still_target_count
      name: "Radar Still Target Count"
      entity_category: diagnostic
      disabled_by_default: true
      # Frame-freshness callback (see s360_radar_mark_frame): the bench
      # proves this updates while target_count is unchanged.
      on_value:
        then:
          - script.execute: s360_radar_mark_frame
    moving_target_count:
      id: ld2450_moving_target_count
      name: "Radar Moving Target Count"
      entity_category: diagnostic
      disabled_by_default: true
      # Frame-freshness callback (see s360_radar_mark_frame): the bench
      # proves this updates while target_count is unchanged.
      on_value:
        then:
          - script.execute: s360_radar_mark_frame
    # Target 1
    target_1:
      x:
        id: ld2450_t1_x
        name: "Radar Target 1 X"
        entity_category: diagnostic
        disabled_by_default: true
      y:
        id: ld2450_t1_y
        name: "Radar Target 1 Y"
        entity_category: diagnostic
        disabled_by_default: true
      speed:
        id: ld2450_t1_speed
        name: "Radar Target 1 Speed"
        entity_category: diagnostic
        disabled_by_default: true
      distance:
        id: ld2450_t1_distance
        name: "Radar Target 1 Distance"
        entity_category: diagnostic
        disabled_by_default: true
      angle:
        id: ld2450_t1_angle
        name: "Radar Target 1 Angle"
        entity_category: diagnostic
        disabled_by_default: true
    # Target 2
    target_2:
      x:
        id: ld2450_t2_x
        name: "Radar Target 2 X"
        entity_category: diagnostic
        disabled_by_default: true
      y:
        id: ld2450_t2_y
        name: "Radar Target 2 Y"
        entity_category: diagnostic
        disabled_by_default: true
      speed:
        id: ld2450_t2_speed
        name: "Radar Target 2 Speed"
        entity_category: diagnostic
        disabled_by_default: true
      distance:
        id: ld2450_t2_distance
        name: "Radar Target 2 Distance"
        entity_category: diagnostic
        disabled_by_default: true
      angle:
        id: ld2450_t2_angle
        name: "Radar Target 2 Angle"
        entity_category: diagnostic
        disabled_by_default: true
    # Target 3
    target_3:
      x:
        id: ld2450_t3_x
        name: "Radar Target 3 X"
        entity_category: diagnostic
        disabled_by_default: true
      y:
        id: ld2450_t3_y
        name: "Radar Target 3 Y"
        entity_category: diagnostic
        disabled_by_default: true
      speed:
        id: ld2450_t3_speed
        name: "Radar Target 3 Speed"
        entity_category: diagnostic
        disabled_by_default: true
      distance:
        id: ld2450_t3_distance
        name: "Radar Target 3 Distance"
        entity_category: diagnostic
        disabled_by_default: true
      angle:
        id: ld2450_t3_angle
        name: "Radar Target 3 Angle"
        entity_category: diagnostic
        disabled_by_default: true

# ============================================================================
# Globals for Presence Detection
# ============================================================================
globals:
  # Legacy compatibility signal (see header note): 1.0 while the radar
  # reports any target, 0.0 otherwise. NOT a probability.
  - id: presence_confidence
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: presence_closest_distance
    type: float
    restore_value: false
    initial_value: '0.0'

  # Radar target count mirror (internal). Named for backwards compatibility
  # only — radar targets are NOT verified people (PD-09); no entity exposes
  # this as a people count.
  - id: presence_people_count
    type: int
    restore_value: false
    initial_value: '0'

  - id: ld2450_still_count
    type: int
    restore_value: false
    initial_value: '0'

  - id: ld2450_moving_count
    type: int
    restore_value: false
    initial_value: '0'

  # PRESENCE-FRAMEWORK-001 freshness evidence: timestamp of the last real
  # LD2450 frame. Written ONLY by the s360_radar_mark_frame script below,
  # which is executed from the on_value hooks of the target-count,
  # moving-target-count and still-target-count sensors — real LD2450
  # component update callbacks. It is deliberately NOT written by the 1 s
  # compatibility interval below (which only re-reads cached sensor states);
  # refreshing it there would falsely mark a disconnected radar as healthy.
  - id: s360_radar_last_frame_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: s360_radar_frame_seen
    type: bool
    restore_value: false
    initial_value: 'false'

# ============================================================================
# Board-local radar frame-freshness recorder
# ============================================================================
# One helper so the freshness logic is not duplicated across the three
# LD2450 frame-driven callbacks. Every real LD2450 component update (target
# count, moving-target count, still-target count) executes this to stamp the
# freshness evidence the Presence framework consumes. It must be called only
# from genuine component update callbacks — never from the periodic
# compatibility interval, and never merely because an old sensor state can
# be read — so a disconnected/stopped UART correctly ages out to STALE.
script:
  - id: s360_radar_mark_frame
    then:
      - lambda: |-
          id(s360_radar_last_frame_ms) = millis();
          id(s360_radar_frame_seen) = true;

# Update legacy presence data (compatibility signal for the pre-framework
# profiles; the tri-sensor fusion lives in
# packages/features/presence_framework.yaml).
# IMPORTANT: this periodic interval re-reads cached sensor states only. It
# must NEVER touch s360_radar_last_frame_ms / s360_radar_frame_seen —
# doing so would keep marking a disconnected radar "fresh". Frame freshness
# is recorded exclusively by s360_radar_mark_frame from real component
# update callbacks.
interval:
  - interval: 1s
    then:
      - lambda: |-
          float tc = id(ld2450_target_count).state;
          float mc = id(ld2450_moving_target_count).state;
          float sc = id(ld2450_still_target_count).state;
          int targets = std::isnan(tc) ? 0 : (int) tc;
          int moving = std::isnan(mc) ? 0 : (int) mc;
          int still = std::isnan(sc) ? 0 : (int) sc;

          id(ld2450_still_count) = still;
          id(ld2450_moving_count) = moving;
          id(presence_people_count) = targets;

          if (targets > 0) {
            // Binary radar-presence indicator (documented compatibility
            // signal). The former 0.95/0.7/0.6 tiers had no evidence basis
            // and were removed by PRESENCE-FRAMEWORK-001.
            id(presence_confidence) = 1.0f;

            float min_dist = 9999.0f;
            float d1 = id(ld2450_t1_distance).state;
            float d2 = id(ld2450_t2_distance).state;
            float d3 = id(ld2450_t3_distance).state;

            if (!std::isnan(d1) && d1 > 0 && d1 < min_dist) min_dist = d1;
            if (!std::isnan(d2) && d2 > 0 && d2 < min_dist) min_dist = d2;
            if (!std::isnan(d3) && d3 > 0 && d3 < min_dist) min_dist = d3;

            if (min_dist < 9999.0f) {
              id(presence_closest_distance) = min_dist;
            }
          } else {
            id(presence_confidence) = 0.0f;
            id(presence_closest_distance) = 0.0f;
          }

text_sensor:
  - platform: template
    name: "${friendly_name} Presence Module SKU"
    lambda: |-
      return {"${module_sku}"};
    update_interval: never
    entity_category: diagnostic
