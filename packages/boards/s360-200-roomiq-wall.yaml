# ============================================================================
# Sense360 RoomIQ — Wall/Desk mount board package (S360-200-R4)
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §7 item 4). SKU-aligned
# wall/desk-mount RoomIQ board package, the wall sibling of the canonical
# ceiling board `packages/boards/s360-200-roomiq.yaml`.
#
# Like the ceiling board, RoomIQ is authoritative PER DRIVER (the legacy
# `sense360-core-wall*` family binds `comfort_wall.yaml` and `presence_wall.yaml`
# under separate package keys, so a single merged file cannot be the alias
# target of both). The authoritative wall content lives in:
#
#   wall climate (comfort) : packages/boards/s360-200-roomiq-climate-wall.yaml
#                            (SHT40 @ 0x44 + LTR-303 ALS @ 0x29 on core_i2c)
#   wall radar (presence)  : packages/boards/s360-200-roomiq-radar-wall.yaml
#                            (HLK-LD2450 on roomiq_hi_link_uart @ 256000)
#
# and the legacy `comfort_wall.yaml` / `presence_wall.yaml` paths are now thin
# aliases that `!include` the matching authoritative half (§3.3, §5.5).
#
# THIS file is the production-facing wall RoomIQ board: it COMPOSES the two
# authoritative wall halves. The merge is byte-identical to the previous
# comfort_wall + presence_wall composition.
# ============================================================================

packages:
  board_roomiq_comfort: !include s360-200-roomiq-climate-wall.yaml
  board_roomiq_radar: !include s360-200-roomiq-radar-wall.yaml
