# ============================================================================
# Sense360 RoomIQ — Wall/Desk mount variant overlay (S360-200-R4)
# ============================================================================
# BOARD-PACKAGE-LAYER-002. SKU-aligned wall-mount variant of the canonical
# RoomIQ board package `packages/boards/s360-200-roomiq.yaml`.
#
# Where the canonical base composes the ceiling-mount RoomIQ stack
# (comfort_ceiling + presence_ceiling), this overlay swaps in the wall/desk
# mount delta — the wall-form-factor comfort and radar source packages:
#
#   - comfort sensing : packages/expansions/comfort_wall.yaml
#                       (SHT40 temp/humidity @ 0x44 + LTR-303 ALS @ 0x29 on the
#                        shared core_i2c bus, CORE-ABSTRACT-BUS-001B)
#   - radar presence  : packages/expansions/presence_wall.yaml
#                       (HLK-LD2450 24 GHz multi-target radar on the named
#                        roomiq_hi_link_uart, CORE-ABSTRACT-BUS-001C)
#
# Thin `!include` wrapper over the existing functional packages (byte-identical
# behaviour), mirroring the Core mount-overlay pattern from
# BOARD-PACKAGE-LAYER-001.
#
# Legacy alias policy (docs/arch-board-bundle-plan.md §3.3): the legacy
# `comfort_wall.yaml` / `presence_wall.yaml` paths are preserved unchanged as
# the source of truth; no product is rebound onto this board package in this
# slice.
# ============================================================================

packages:
  board_roomiq_comfort: !include ../expansions/comfort_wall.yaml
  board_roomiq_radar: !include ../expansions/presence_wall.yaml
