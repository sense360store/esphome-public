# ============================================================================
# Sense360 AirIQ — Wall/Desk mount variant overlay (S360-210-R4)
# ============================================================================
# PACKAGE-RENAME-002 (docs/arch-board-bundle-plan.md §7 item 4). SKU-aligned
# wall-mount variant of the canonical AirIQ board package
# `packages/boards/s360-210-airiq.yaml`.
#
# Source-of-truth inversion (docs/arch-board-bundle-plan.md §3.3, §5.5): the
# wall/desk AirIQ stack below previously lived in
# `packages/expansions/airiq_wall.yaml` and this overlay was a thin `!include`
# wrapper over it. That is now inverted — the definition lives here and
# `packages/expansions/airiq_wall.yaml` is a thin alias that `!include`s this
# overlay, so the resolved behaviour is byte-identical to the legacy path.
#
# This wall/desk variant carries the same sensor suite as the ceiling base
# (SPS30 PM @ 0x69, SGP41 VOC/NOx @ 0x59, SCD41 CO2 @ 0x62, BMP390 pressure @
# 0x77 on `airiq_i2c_id: core_i2c`); the delta from the ceiling base is the
# wall form factor (`module_sku: S360-AIR-W`, `module_variant: wall`).
#
# Legacy alias (path preserved, retained while live binders exist; §3.3):
#   airiq_wall.yaml -> !include this overlay
# ============================================================================

substitutions:
  module_sku: S360-AIR-W
  module_variant: wall

  # I2C bus ID (uses the shared core_i2c bus from the parent Core abstract
  # package by default; CORE-ABSTRACT-BUS-001B). Override with the
  # airiq_i2c_id substitution if a product binds a different bus.
  airiq_i2c_id: core_i2c

  # Sensor update intervals
  airiq_sps30_update: 30s
  airiq_scd41_update: 30s
  airiq_sgp41_update: 30s
  airiq_bmp390_update: 60s

  # SPS30 auto-cleaning interval (7 days default)
  airiq_sps30_cleaning_interval: "604800s"

  # CO2 calibration settings
  co2_auto_calibration: "true"

# ============================================================================
# SENSORS
# ============================================================================
sensor:
  # SPS30 - Particulate Matter Sensor
  - platform: sps30
    id: sps30_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x69

    pm_1_0:
      id: airiq_pm1_0
      name: "${friendly_name} PM1.0"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_2_5:
      id: airiq_pm2_5
      name: "${friendly_name} PM2.5"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_4_0:
      id: airiq_pm4_0
      name: "${friendly_name} PM4.0"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    pm_10_0:
      id: airiq_pm10_0
      name: "${friendly_name} PM10"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sps30_update}

    # Particle counts (number concentration)
    pmc_0_5:
      id: airiq_pmc0_5
      name: "${friendly_name} PMC 0.5"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_1_0:
      id: airiq_pmc1_0
      name: "${friendly_name} PMC 1.0"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_2_5:
      id: airiq_pmc2_5
      name: "${friendly_name} PMC 2.5"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_4_0:
      id: airiq_pmc4_0
      name: "${friendly_name} PMC 4.0"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pmc_10_0:
      id: airiq_pmc10_0
      name: "${friendly_name} PMC 10"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sps30_update}

    pm_size:
      id: airiq_pm_size
      name: "${friendly_name} Typical Particle Size"
      internal: true
      accuracy_decimals: 2
      filters:
        - throttle: ${airiq_sps30_update}

    auto_cleaning_interval: ${airiq_sps30_cleaning_interval}
    update_interval: ${airiq_sps30_update}

  # SGP41 - VOC/NOx Sensor
  - platform: sgp4x
    id: sgp41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x59

    voc:
      id: airiq_voc_index
      name: "${friendly_name} VOC Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    nox:
      id: airiq_nox_index
      name: "${friendly_name} NOx Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    compensation:
      temperature_source: airiq_scd41_temperature
      humidity_source: airiq_scd41_humidity

    store_baseline: true
    update_interval: ${airiq_sgp41_update}

  # SCD41 - CO2 Sensor
  - platform: scd4x
    id: scd41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x62

    co2:
      id: airiq_co2
      name: "${friendly_name} CO2"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_scd41_update}

    temperature:
      id: airiq_scd41_temperature
      name: "${friendly_name} SCD41 Temperature"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    humidity:
      id: airiq_scd41_humidity
      name: "${friendly_name} SCD41 Humidity"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    automatic_self_calibration: ${co2_auto_calibration}
    measurement_mode: periodic
    update_interval: ${airiq_scd41_update}

  # BMP390 - Barometric Pressure
  - platform: bmp3xx_i2c
    id: bmp390_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x77

    temperature:
      id: airiq_bmp390_temperature
      name: "${friendly_name} BMP390 Temperature"
      internal: true
      oversampling: 2x

    pressure:
      id: airiq_pressure
      name: "${friendly_name} Pressure"
      internal: true
      oversampling: 2x

    update_interval: ${airiq_bmp390_update}

# ============================================================================
# Globals for Air Quality Calculations
# ============================================================================
globals:
  - id: airiq_aqi_value
    type: int
    restore_value: false
    initial_value: '0'

  - id: airiq_temperature_value
    type: float
    restore_value: false
    initial_value: '20.0'

  - id: airiq_humidity_value
    type: float
    restore_value: false
    initial_value: '50.0'

# ============================================================================
# Interval for Sensor Data Processing
# ============================================================================
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Temperature from SCD41 (SPS30 doesn't provide temperature)
          float temp_scd41 = id(airiq_scd41_temperature).state;
          if (!std::isnan(temp_scd41)) {
            id(airiq_temperature_value) = temp_scd41;
          }

          // Humidity from SCD41 (SPS30 doesn't provide humidity)
          float hum_scd41 = id(airiq_scd41_humidity).state;
          if (!std::isnan(hum_scd41)) {
            id(airiq_humidity_value) = hum_scd41;
          }

          // Calculate AQI based on PM2.5
          float pm25 = id(airiq_pm2_5).state;
          int aqi = 0;

          if (!std::isnan(pm25)) {
            if (pm25 <= 12.0f) {
              aqi = (int)((50.0f / 12.0f) * pm25);
            } else if (pm25 <= 35.4f) {
              aqi = (int)(((100.0f - 51.0f) / (35.4f - 12.1f)) * (pm25 - 12.1f) + 51.0f);
            } else if (pm25 <= 55.4f) {
              aqi = (int)(((150.0f - 101.0f) / (55.4f - 35.5f)) * (pm25 - 35.5f) + 101.0f);
            } else if (pm25 <= 150.4f) {
              aqi = (int)(((200.0f - 151.0f) / (150.4f - 55.5f)) * (pm25 - 55.5f) + 151.0f);
            } else {
              aqi = (int)(((300.0f - 201.0f) / (250.4f - 150.5f)) * (pm25 - 150.5f) + 201.0f);
            }
          }

          id(airiq_aqi_value) = aqi;

# ============================================================================
# Button for Manual SPS30 Fan Cleaning
# ============================================================================
button:
  - platform: template
    name: "${friendly_name} SPS30 Clean Fan"
    id: airiq_sps30_clean_button
    icon: mdi:fan
    internal: true
    on_press:
      then:
        - sps30.start_fan_autoclean: sps30_sensor
        - logger.log:
            level: INFO
            format: "AirIQ: SPS30 fan cleaning started"

text_sensor:
  - platform: template
    name: "${friendly_name} AirIQ Module SKU"
    lambda: |-
      return {"${module_sku}"};
    update_interval: never
    entity_category: diagnostic
