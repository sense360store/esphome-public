# ============================================================================
# Sense360 RoomIQ — Canonical Board Package (S360-200-R4)
# ============================================================================
# PACKAGE-RENAME-004 (docs/arch-board-bundle-plan.md §7 item 4) — the S360-200
# RoomIQ family is the fourth and largest source-of-truth flip (after LED,
# AirIQ, VentIQ). This is the SKU-aligned canonical entry for the Sense360
# RoomIQ room-sensing board (SKU `S360-200`, revision R4, friendly name
# "Sense360 RoomIQ"; `schematic_status: verified` per
# config/hardware-catalog.json). RoomIQ is the merged comfort + presence
# room-sensor board (docs/arch-board-bundle-plan.md §2.1): ambient-light +
# temperature/humidity comfort sensing plus 24 GHz mmWave radar
# presence/occupancy on the RoomIQ J10 connector.
#
# ----------------------------------------------------------------------------
# Why RoomIQ is AUTHORITATIVE PER DRIVER (not one merged document)
# ----------------------------------------------------------------------------
# Unlike the 1:1 LED / AirIQ / VentIQ families, the RoomIQ board composes TWO
# drivers that products bind INDEPENDENTLY (the legacy `sense360-core-ceiling*`
# family `!include`s `comfort_ceiling.yaml` and `presence_ceiling.yaml` under
# separate package keys). A single merged board file therefore cannot be the
# alias target of both legacy paths without duplicate-id breakage. So the
# authoritative content lives PER DRIVER in the board layer:
#
#   ceiling climate (comfort) : packages/boards/s360-200-roomiq-climate.yaml
#                               (VEML7700 ALS @ 0x10 + SHT4x @ 0x44 on core_i2c)
#   ceiling radar (presence)  : packages/boards/s360-200-roomiq-radar.yaml
#                               (HLK-LD2450 on roomiq_hi_link_uart @ 256000)
#
# and the legacy `comfort_ceiling.yaml` / `presence_ceiling.yaml` paths are now
# thin aliases that `!include` the matching authoritative half (§3.3, §5.5).
#
# THIS file is the production-facing ceiling RoomIQ board: it COMPOSES the two
# authoritative ceiling halves, exactly the pair the Release-One product
# (`products/sense360-ceiling-poe-ventiq-roomiq.yaml`) binds today. The merge
# of the two halves is byte-identical to the previous
# comfort_ceiling + presence_ceiling composition, so the production product
# resolves unchanged. The wall-mount variant is `s360-200-roomiq-wall.yaml`.
#
# ----------------------------------------------------------------------------
# Family map (docs/arch-board-bundle-plan.md §2.1)
# ----------------------------------------------------------------------------
#   ceiling climate : s360-200-roomiq-climate.yaml      (authoritative)
#   ceiling radar   : s360-200-roomiq-radar.yaml        (authoritative)
#   wall climate    : s360-200-roomiq-climate-wall.yaml (authoritative)
#   wall radar      : s360-200-roomiq-radar-wall.yaml   (authoritative)
#   ceiling board   : THIS file        (composes the two ceiling halves)
#   wall board      : s360-200-roomiq-wall.yaml (composes the two wall halves)
#
# Legacy aliases (paths preserved while live binders exist; §3.3):
#   comfort_ceiling.yaml  -> !include ../boards/s360-200-roomiq-climate.yaml
#   presence_ceiling.yaml -> !include ../boards/s360-200-roomiq-radar.yaml
#   comfort_wall.yaml     -> !include ../boards/s360-200-roomiq-climate-wall.yaml
#   presence_wall.yaml    -> !include ../boards/s360-200-roomiq-radar-wall.yaml
#
# ----------------------------------------------------------------------------
# Cross-referenced base drivers kept AUTHORITATIVE (NOT aliased)
# ----------------------------------------------------------------------------
# The shared radar PRIMITIVES `packages/expansions/presence_ld2450.yaml` and
# `presence_ld2412.yaml` are documented base drivers (packages/SENSE360_MODULES.md)
# with no board package holding their content; they stay authoritative and are
# NOT folded, mirroring how `airiq.yaml` (RENAME-002) and `ceiling_halo_leds.yaml`
# (RENAME-001) stayed authoritative. The Phase-2 naming aliases `roomiq.yaml` /
# `roomiq_radar.yaml` keep their pinned bare-basename `!include` of
# `comfort_ceiling.yaml` / `presence_ceiling.yaml` (now themselves board
# aliases) so tests/test_roomiq_alias_packages.py stays green and the chains
# resolve byte-identically.
# ============================================================================

packages:
  board_roomiq_comfort: !include s360-200-roomiq-climate.yaml
  board_roomiq_radar: !include s360-200-roomiq-radar.yaml
