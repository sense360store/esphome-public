# ============================================================================
# Sense360 AirIQ — Canonical Board Package (S360-210-R4)
# ============================================================================
# AIRIQ-HW-RECONCILE-001 — this board package is the AUTHORITATIVE, self-
# contained definition of the Sense360 AirIQ air-quality board (SKU `S360-210`,
# revision R4, friendly name "Sense360 AirIQ"; `schematic_status: verified` per
# config/hardware-catalog.json), reconciled against the verified R4 schematic
# (docs/hardware/schematics/S360-210-R4.pdf) and the R4 BOM artifact record
# (docs/hardware/artifacts/S360-210-R4.md). AirIQ is the indoor-air-quality
# sensor board on the shared core_i2c bus (CORE-ABSTRACT-BUS-001B).
#
# FITTED HARDWARE (populated on EVERY S360-210-R4 per the R4 BOM):
#   - SGP41  VOC/NOx  @ 0x59 (U1)  — sgp4x, PCB-mounted.
#   - SFA40  HCHO     @ 0x5D (U2)  — Sensirion formaldehyde, PCB-mounted. Driven
#            by the scoped `sfa40` external component (native `sfa30` uses a
#            different command set and cannot read the SFA40).
#   - SCD41  CO2/T/RH @ 0x62 (U3)  — scd4x, PCB-mounted.
#   - MICS-4514 gas   via STM8     @ 0x60 (U4 sensor + U5 STM8S003F3U bridge +
#            U6 LMV358 analog front end) — the STM8 co-processor digitises the
#            MICS analog stage and exposes a 24-byte I2C register block; driven
#            by the scoped `mics_stm8` external component. Diagnostic reducing/
#            oxidising RATIO surface only — NO CO/NO2 concentration is claimed.
#   All on `airiq_i2c_id: core_i2c`.
#
# EXTERNAL ATTACHMENT (NOT on the S360-210 PCB; opt-in only):
#   - SPS30  PM  @ 0x69 — an off-board module on the J2 (5-pin JST SH)
#     connector. The canonical base does NOT probe 0x69: a device with an
#     attached SPS30 composes the opt-in overlay
#     `packages/boards/s360-210-airiq-sps30.yaml` (which adds the sps30 driver
#     plus the framework PM wiring). An absent SPS30 never appears as a failure.
#
# NOT PRESENT (removed under AIRIQ-HW-RECONCILE-001):
#   - BMP390 / any pressure part — absent from the verified R4 schematic, the R4
#     BOM and the hardware catalog. The previously-compiled `bmp3xx_i2c` @0x77
#     was firmware/catalog drift and is REMOVED: no probe, no entity, no
#     pressure surface anywhere.
#
# Evidence level: source + datasheet-derived-protocol + compile proof only. The
# STM8 register map / address (0x60) / firmware (0x24) are per the owner-provided
# STM8 firmware specification; SFA40 protocol is per the Sensirion SFA40
# datasheet. NO hardware, bench, calibration, compliance, safety or commercial
# claim is made here; on-hardware validation of the fitted stack remains pending
# (docs/hardware/airiq-framework-bench-checklist.md, AIRIQ-FRAMEWORK-BENCH-001).
#
# ----------------------------------------------------------------------------
# Composition contract
# ----------------------------------------------------------------------------
# Bundles compose this board package (raw internal pollutant sensors + the
# MICS/STM8 diagnostic surface) together with the AirIQ framework
# (packages/features/airiq_framework.yaml — the canonical customer pollutant
# surface) and, only when a device declares an attached SPS30, the opt-in
# overlay packages/boards/s360-210-airiq-sps30.yaml.
#
# The S3-lineage variant is the thin overlay s360-210-airiq-ceiling-s3.yaml.
# The legacy alias packages/expansions/airiq_ceiling.yaml `!include`s this
# package.
#
# AirIQ and VentIQ (S360-211) are mutually exclusive air-quality modules per
# docs/release-one.md — see the S360-211 VentIQ board package. This package
# changes NO WebFlash taxonomy, Release-One posture or AirIQ/VentIQ mutex.
# ============================================================================

substitutions:
  module_sku: S360-AIR-C
  module_variant: ceiling

  # I2C Configuration (Ceiling reuses the shared core_i2c bus per
  # CORE-ABSTRACT-BUS-001B).
  airiq_i2c_sda: GPIO48
  airiq_i2c_scl: GPIO45
  # Use the existing shared Core bus defined by the core hardware package
  # to avoid duplicate I2C declarations when multiple modules are enabled
  # together.
  airiq_i2c_id: core_i2c

  # Sensor update intervals
  airiq_scd41_update: 30s
  airiq_sgp41_update: 30s
  airiq_sfa40_update: 30s
  airiq_mics_update: 30s

  # CO2 calibration settings
  co2_auto_calibration: "true"

  # Remote-consumable source for the scoped SFA40 + MICS/STM8 components
  # (see external_components below). A remote consumer that pins its
  # `packages:` entry to a release tag should override airiq_components_ref
  # to the same tag (packages/remote/ceiling-airiq.yaml wires this to
  # ${sense360_remote_ref} automatically).
  airiq_components_url: https://github.com/sense360store/esphome-public
  airiq_components_ref: main

# ----------------------------------------------------------------------------
# External components — the scoped SFA40 and MICS/STM8 drivers vendored under
# components/. Loaded via a GIT self-reference (the same pattern as
# packages/base/external_components.yaml) so a Home Assistant device that
# pulls THIS board package remotely — e.g. through
# packages/remote/ceiling-airiq.yaml — fetches the components from the
# repository. A `type: local` path is NOT usable here: ESPHome resolves a
# local external-component path against the CONSUMER's main config directory,
# not this file, so a remote consumer could never find `../../components`
# (the regression this fix corrects).
# ----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${airiq_components_url}
      ref: ${airiq_components_ref}
    components: [sfa40, mics_stm8]
    refresh: 1d

# I2C Bus Configuration
# The bus itself is declared by the core hardware package; the module only
# references it to prevent duplicate I2C definitions when combined with other
# expansions (e.g., LED ring, RoomIQ).

# ============================================================================
# MICS-4514 + STM8 bridge (U4/U5) — 24-byte I2C register block @ 0x60
# ============================================================================
mics_stm8:
  id: airiq_mics
  i2c_id: ${airiq_i2c_id}
  address: 0x60
  update_interval: ${airiq_mics_update}

# ============================================================================
# SENSORS (PCB-mounted, raw/internal — the framework re-exposes the canonical
# customer pollutant entities; MICS diagnostic entities are declared below)
# ============================================================================
sensor:
  # SGP41 - VOC/NOx Sensor (U1 @ 0x59)
  - platform: sgp4x
    id: sgp41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x59

    voc:
      id: airiq_voc_index
      name: "${friendly_name} VOC Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    nox:
      id: airiq_nox_index
      name: "${friendly_name} NOx Index"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_sgp41_update}

    compensation:
      temperature_source: airiq_scd41_temperature
      humidity_source: airiq_scd41_humidity

    store_baseline: true
    update_interval: ${airiq_sgp41_update}

  # SCD41 - CO2 Sensor (U3 @ 0x62)
  - platform: scd4x
    id: scd41_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x62

    co2:
      id: airiq_co2
      name: "${friendly_name} CO2"
      internal: true
      accuracy_decimals: 0
      filters:
        - throttle: ${airiq_scd41_update}

    temperature:
      id: airiq_scd41_temperature
      name: "${friendly_name} SCD41 Temperature"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    humidity:
      id: airiq_scd41_humidity
      name: "${friendly_name} SCD41 Humidity"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_scd41_update}

    automatic_self_calibration: ${co2_auto_calibration}
    measurement_mode: periodic
    update_interval: ${airiq_scd41_update}

  # SFA40 - Formaldehyde Sensor (U2 @ 0x5D), scoped external component.
  # Raw/internal — the framework re-exposes the canonical "Formaldehyde"
  # customer entity (freshness-gated) from airiq_hcho.
  - platform: sfa40
    id: sfa40_sensor
    i2c_id: ${airiq_i2c_id}
    address: 0x5D
    update_interval: ${airiq_sfa40_update}

    formaldehyde:
      id: airiq_hcho
      name: "${friendly_name} SFA40 Formaldehyde"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sfa40_update}

    humidity:
      id: airiq_sfa40_humidity
      name: "${friendly_name} SFA40 Humidity"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sfa40_update}

    temperature:
      id: airiq_sfa40_temperature
      name: "${friendly_name} SFA40 Temperature"
      internal: true
      accuracy_decimals: 1
      filters:
        - throttle: ${airiq_sfa40_update}

  # --- MICS-4514 / STM8 diagnostic surface (reads the airiq_mics hub) ---------
  # Reducing/oxidising RAW ADC and baselines are published whenever the bridge
  # is online (including during warm-up). The reducing/oxidising RATIOS are
  # validity-gated inside the component and read unavailable until the STM8
  # reports online + identity M4 + supported protocol + warm-up complete +
  # calibrated + heater on + non-zero baselines + zero fault flags. No CO/NO2
  # concentration is derived or claimed.
  - platform: template
    id: airiq_mics_red_ratio
    name: "${friendly_name} MICS Reducing Ratio"
    icon: mdi:molecule
    accuracy_decimals: 3
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).red_ratio();"

  - platform: template
    id: airiq_mics_ox_ratio
    name: "${friendly_name} MICS Oxidising Ratio"
    icon: mdi:molecule
    accuracy_decimals: 3
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).ox_ratio();"

  - platform: template
    id: airiq_mics_red_adc
    name: "${friendly_name} MICS Reducing ADC"
    icon: mdi:sine-wave
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).red_adc();"

  - platform: template
    id: airiq_mics_ox_adc
    name: "${friendly_name} MICS Oxidising ADC"
    icon: mdi:sine-wave
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).ox_adc();"

  - platform: template
    id: airiq_mics_red_baseline
    name: "${friendly_name} MICS Reducing Baseline"
    icon: mdi:chart-line
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).red_baseline();"

  - platform: template
    id: airiq_mics_ox_baseline
    name: "${friendly_name} MICS Oxidising Baseline"
    icon: mdi:chart-line
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).ox_baseline();"

  - platform: template
    id: airiq_mics_firmware
    name: "${friendly_name} MICS STM8 Firmware"
    icon: mdi:chip
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).firmware_version();"

  - platform: template
    id: airiq_mics_fault_flags
    name: "${friendly_name} MICS Fault Flags"
    icon: mdi:alert-circle-outline
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).fault_flags();"

  - platform: template
    id: airiq_mics_adc_error_count
    name: "${friendly_name} MICS ADC Error Count"
    icon: mdi:counter
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).adc_error_count();"

  - platform: template
    id: airiq_mics_i2c_error_count
    name: "${friendly_name} MICS I2C Error Count"
    icon: mdi:counter
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).i2c_error_count();"

  - platform: template
    id: airiq_mics_calibration_samples
    name: "${friendly_name} MICS Calibration Samples"
    icon: mdi:counter
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).calibration_samples();"

  - platform: template
    id: airiq_mics_red_cal_spread
    name: "${friendly_name} MICS Reducing Calibration Spread"
    icon: mdi:arrow-expand-vertical
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).red_calibration_spread();"

  - platform: template
    id: airiq_mics_ox_cal_spread
    name: "${friendly_name} MICS Oxidising Calibration Spread"
    icon: mdi:arrow-expand-vertical
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return id(airiq_mics).ox_calibration_spread();"

# ============================================================================
# MICS-4514 / STM8 diagnostic binary sensors, text sensors and button
# ============================================================================
binary_sensor:
  - platform: template
    id: airiq_mics_online
    name: "${friendly_name} MICS Online"
    icon: mdi:lan-connect
    entity_category: diagnostic
    lambda: "return id(airiq_mics).online();"

  - platform: template
    id: airiq_mics_warming
    name: "${friendly_name} MICS Warming Up"
    icon: mdi:fire
    entity_category: diagnostic
    lambda: "return id(airiq_mics).warming();"

  - platform: template
    id: airiq_mics_calibrated
    name: "${friendly_name} MICS Calibrated"
    icon: mdi:check-decagram
    entity_category: diagnostic
    lambda: "return id(airiq_mics).calibrated();"

  - platform: template
    id: airiq_mics_heater_on
    name: "${friendly_name} MICS Heater On"
    icon: mdi:radiator
    entity_category: diagnostic
    lambda: "return id(airiq_mics).heater_on_state();"

text_sensor:
  - platform: template
    name: "${friendly_name} AirIQ Module SKU"
    lambda: |-
      return {"${module_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    id: airiq_mics_identity
    name: "${friendly_name} MICS Identity"
    icon: mdi:identifier
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return {id(airiq_mics).identity_string()};"

  - platform: template
    id: airiq_mics_protocol_status
    name: "${friendly_name} MICS Protocol Status"
    icon: mdi:protocol
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return {id(airiq_mics).protocol_status()};"

  - platform: template
    id: airiq_mics_fault_detail
    name: "${friendly_name} MICS Fault Detail"
    icon: mdi:alert-circle-outline
    entity_category: diagnostic
    update_interval: ${airiq_mics_update}
    lambda: "return {id(airiq_mics).fault_detail()};"

  - platform: template
    id: airiq_mics_last_command_result
    name: "${friendly_name} MICS Last Command Result"
    icon: mdi:console
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return {id(airiq_mics).last_command_result()};"

  - platform: template
    id: airiq_mics_reset_reason
    name: "${friendly_name} MICS Reset Reason"
    icon: mdi:restart-alert
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${airiq_mics_update}
    lambda: "return {id(airiq_mics).reset_reason()};"

button:
  - platform: template
    id: airiq_mics_recalibrate
    name: "${friendly_name} MICS Recalibrate"
    icon: mdi:tune
    entity_category: config
    on_press:
      then:
        - lambda: "id(airiq_mics).recalibrate();"
        - logger.log:
            level: INFO
            format: "AirIQ: MICS/STM8 recalibration requested"
