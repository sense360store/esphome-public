# ============================================================================
# Sense360 AirIQ — Canonical Board Package (S360-210-R4)
# ============================================================================
# BOARD-PACKAGE-LAYER-002 — the SKU-aligned board layer, sensor boards.
#
# SKU-aligned canonical entry for the Sense360 AirIQ air-quality board (SKU
# `S360-210`, revision R4, friendly name "Sense360 AirIQ";
# `schematic_status: verified` per config/hardware-catalog.json). AirIQ is the
# comprehensive indoor-air-quality sensor board
# (docs/arch-board-bundle-plan.md §2.1): particulate matter, CO2, VOC/NOx, and
# (ceiling variant) barometric pressure + gas detection on the shared core_i2c
# bus (CORE-ABSTRACT-BUS-001B).
#
# This canonical base composes the representative **ceiling-mount** AirIQ
# stack:
#
#   - packages/expansions/airiq_ceiling.yaml
#     (SPS30 PM @ 0x69, SGP41 VOC/NOx @ 0x59, SCD41 CO2 @ 0x62, BMP390
#      pressure @ 0x77, MiCS4514 gas — all on `airiq_i2c_id: core_i2c`)
#
# Mirroring the Core pattern from BOARD-PACKAGE-LAYER-001, this board package
# is a thin `!include` wrapper over the existing functional package, so the
# resolved behaviour is byte-identical to the legacy path. The wall-mount and
# S3-lineage variants are the thin overlays `s360-210-airiq-wall.yaml` and
# `s360-210-airiq-ceiling-s3.yaml`.
#
# ----------------------------------------------------------------------------
# Folded source packages (docs/arch-board-bundle-plan.md §2.1)
# ----------------------------------------------------------------------------
#   ceiling AirIQ : airiq_ceiling.yaml      (this base; full ceiling suite)
#   wall AirIQ    : airiq_wall.yaml         (s360-210-airiq-wall.yaml)
#   base driver   : airiq.yaml              (generic SPS30 + SGP41 + SCD41
#                                            base hardware driver; ceiling adds
#                                            BMP390 + MiCS4514 on top —
#                                            cross-referenced, not double-bound)
#   S3 lineage    : airiq_ceiling_s3.yaml   (s360-210-airiq-ceiling-s3.yaml;
#                                            kept a distinct lineage, see that
#                                            overlay)
#
# AirIQ and VentIQ (S360-211) are mutually exclusive air-quality modules per
# docs/release-one.md — see the S360-211 VentIQ board package.
#
# ----------------------------------------------------------------------------
# Legacy alias policy (docs/arch-board-bundle-plan.md §3.3, §5.5)
# ----------------------------------------------------------------------------
# This package is additive: no product or test references it in this slice. The
# legacy `packages/expansions/airiq*.yaml` paths are preserved unchanged as the
# source of truth — they are NOT rewired to one-line includes in this slice
# because `tests/test_core_abstract_bus.py` asserts on the self-contained text
# of `airiq_ceiling.yaml` / `airiq_wall.yaml` / `airiq.yaml` (the
# `airiq_i2c_id` consumer defaults). The source-of-truth flip + test repoint is
# owned by a later PACKAGE-RENAME slice / CI-REFACTOR-VERIFY-001 (§5.5).
# ============================================================================

packages:
  board_airiq: !include ../expansions/airiq_ceiling.yaml
