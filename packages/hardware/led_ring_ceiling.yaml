# ============================================================================
# Sense360 LED Ring - Ceiling Standard  (legacy alias)
# ============================================================================
# SKU: S360-LED-C
#
# PACKAGE-RENAME-001 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the ceiling standard LED
# ring now lives in the SKU-aligned board package
# `packages/boards/s360-300-led.yaml`. This legacy functional path is retained
# as a thin alias that `!include`s that board package, so the resolved config
# is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): legacy `products/sense360-core-*`
# products and the LED-bearing preview product still bind this path. Per the
# alias policy (§3.3), no alias is dropped while a live binder exists; alias
# removal is a separate later slice gated on the binder count reaching zero.
#
# Hardware / pin assignment (12-LED WS2812B halo ring, `led_data_pin: GPIO38`)
# is documented in the board package this file aliases.
# ============================================================================

packages:
  board_led: !include ../boards/s360-300-led.yaml
