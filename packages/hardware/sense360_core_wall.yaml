# Sense360 Core Wall - Wall-Mounted Smart Home Hub
#
# This is the wall-mounted variant of the Sense360 Core board.
# Designed for standard electrical boxes and wall plates.
#
# Hardware Features:
# - ESP32-S3-WROOM-1 (8MB Flash, 2MB PSRAM)
# - WiFi 2.4GHz, Bluetooth 5.0 LE
# - Power: 240V AC / PoE / USB-C (via separate power packages)
# - Shared Core I²C bus for expansion modules
# - UART for presence/radar sensors
# - Built-in relay for load switching
# - GPIO expansion pins
# - RGB LED ring and status LED
# - Physical buttons for manual control
#
# Pin Assignments (ESP32-S3):
# - Core I2C (shared): SDA=GPIO48, SCL=GPIO45, 400kHz
# - UART (Hi-Link):   TX=GPIO2, RX=GPIO1, baud 256000
# - UART (SEN0609):   TX=GPIO5, RX=GPIO4, baud 115200
# - Relay:            GPIO3 (10A AC/DC; schematic Relay net per S360-100-R4
#                     after CORE-ABSTRACT-BUS-001A)
# - Status LED RGB:   GPIO48 (WS2812B ring — pin reused for I²C SDA per
#                     CORE-ABSTRACT-BUS-001B; legacy substitution kept as
#                     a separate consumer pin until a dedicated RGB-ring
#                     audit reconciles it)
# - Fan Status LED:   GPIO46 (GP_Fan_Status_Led per Core schematic)
# - User Button 1:    GPIO9 (multi-function)
# - User Button 2:    GPIO10 (multi-function)
# - Boot Button:      GPIO0
#
# CORE-ABSTRACT-BUS-001B rebinds applied here:
#   * Single shared Core I²C bus `core_i2c` on schematic-correct
#     `IO48` (SDA) / `IO45` (SCL) at `400kHz`; the legacy dual-bus
#     `i2c0` (`GPIO39` / `GPIO40`) and `i2c1` (`GPIO21` / `GPIO18`)
#     definitions and their `i2c0_*` / `i2c1_*` pin substitutions are
#     retired (hard rename only, no compatibility aliases per
#     CORE-ABSTRACT-BUS-001B-PLAN-001 operator decisions).
# CORE-ABSTRACT-BUS-001C rebinds applied here:
#   * generic `status_led_pin` retired (was GPIO47 = ALS_INT, schematic-conflict)
#   * `expansion_gpio1..4` retired (replaced by function-specific names)
#   * UART split into `roomiq_hi_link_uart` (256000) and `roomiq_sen0609_uart`
#     (115200); ESP-perspective tx/rx direction is now schematic-correct
#   * `fan_status_led_pin` introduced on GPIO46
#
# Form Factor:
# - Standard wall plate compatible (US/EU)
# - Flush mount in electrical box
# - Front-facing sensors and indicators
# - Side/bottom expansion connectors
#
# Expansion Bus Pinout (10-pin connector):
# 1. GND
# 2. 3.3V (500mA max)
# 3. 5V (1A max from relay-switched output)
# 4. Core I2C SDA (GPIO48) - shared Core I²C bus per CORE-ABSTRACT-BUS-001B
# 5. Core I2C SCL (GPIO45) - shared Core I²C bus per CORE-ABSTRACT-BUS-001B
# 6. UART TX (GPIO1)
# 7. UART RX (GPIO2)
# 8. GPIO5 (expansion)
# 9. GPIO6 (expansion)
# 10. IRQ/GPIO7 (optional interrupt)

substitutions:
  device_name: sense360-wall
  friendly_name: Sense360 Wall
  timezone: "America/Los_Angeles"

  # Relay (load switching)
  # CORE-ABSTRACT-BUS-001A: schematic Relay net on IO3 per S360-100-R4.
  # GPIO3 was freed by CORE-ABSTRACT-BUS-001C (#557) which moved ALS_INT
  # off GPIO3 to GPIO47 and the expander interrupt off GPIO3 to GPIO17.
  relay_pin: GPIO3
  relay_max_current: "10A"

  # Status indicators
  # CORE-ABSTRACT-BUS-001C: generic `status_led_pin: GPIO47` (= ALS_INT,
  # schematic-conflict) retired; Core-side indicator now uses the schematic-
  # named `fan_status_led_pin: GPIO46`. The RGB LED ring substitution
  # `status_led_rgb_pin: GPIO48` remains as a substitution-layer name only
  # (no `light:` block in this Core package consumes it); product / LED
  # packages bind WS2812B ring data on their own pin if needed. Note GPIO48
  # is the I²C SDA pin per CORE-ABSTRACT-BUS-001B — a future LED-ring
  # audit must reconcile or retire this name.
  status_led_rgb_pin: GPIO48
  fan_status_led_pin: GPIO46

  # User buttons (physical switches on wall plate)
  user_button1_pin: GPIO9
  user_button2_pin: GPIO10
  boot_button_pin: GPIO0

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: sense360.wall
    version: 1.0.0
  on_boot:
    - priority: 600
      then:
        - logger.log: "Sense360 Wall board initializing..."
    - priority: -100
      then:
        - logger.log: "Sense360 Wall board ready"
        # Restore relay state
        - switch.turn_on: restore_relay_state

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      # Enable PSRAM
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y

# Shared Core I2C bus (CORE-ABSTRACT-BUS-001B).
# Schematic IO48 = I2C_SDA, IO45 = I2C_SCL per S360-100-R4; pulled up by
# R22/R21 10 kΩ. Single bus serves every Core-side I²C consumer.
i2c:
  - id: core_i2c
    sda: GPIO48
    scl: GPIO45
    scan: true
    frequency: 400kHz

# CORE-ABSTRACT-BUS-001C: split single uart_bus into two named RoomIQ UARTs
# matching the schematic-correct ESP-perspective direction and baud rates.
uart:
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000

  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200

# Core-side Fan Status LED indicator (independent of any module).
# Replaces the retired generic status_led_pin per CORE-ABSTRACT-BUS-001C.
status_led:
  pin:
    number: ${fan_status_led_pin}
    inverted: true

# Main relay for load switching (lights, fans, etc.)
switch:
  - platform: gpio
    name: "${friendly_name} Relay"
    id: main_relay
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:electric-switch
    on_turn_on:
      - logger.log: "Relay turned ON"
    on_turn_off:
      - logger.log: "Relay turned OFF"

  # Virtual switch to trigger relay state restoration
  - platform: template
    id: restore_relay_state
    optimistic: true
    internal: true

# Physical buttons on wall plate
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    id: system_status

  # User Button 1 (left button on wall plate)
  - platform: gpio
    name: "${friendly_name} Button 1"
    id: user_button1
    pin:
      number: ${user_button1_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - logger.log: "Button 1 pressed"
        # Toggle relay on single press
        - switch.toggle: main_relay
    on_click:
      # Double-click action (customize as needed)
      min_length: 50ms
      max_length: 500ms
      then:
        - logger.log: "Button 1 clicked"
    on_double_click:
      min_length: 50ms
      max_length: 500ms
      then:
        - logger.log: "Button 1 double-clicked"
        # Could trigger a scene or automation
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  # User Button 2 (right button on wall plate)
  - platform: gpio
    name: "${friendly_name} Button 2"
    id: user_button2
    pin:
      number: ${user_button2_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - logger.log: "Button 2 pressed"
        # Can be customized for different actions
    on_click:
      min_length: 50ms
      max_length: 500ms
      then:
        - logger.log: "Button 2 clicked"
    on_double_click:
      min_length: 50ms
      max_length: 500ms
      then:
        - logger.log: "Button 2 double-clicked"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

# System controls
button:
  - platform: restart
    id: restart_button
    name: "${friendly_name} Restart"
    icon: mdi:restart

  # Internal alias used by shared API actions expecting a reset_button ID
  - platform: template
    id: reset_button
    internal: true
    on_press:
      - button.press: restart_button

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
    icon: mdi:safety-goggles

  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn
    icon: mdi:delete-forever
    disabled_by_default: true

# System sensors
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s
    icon: mdi:wifi

  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s
    icon: mdi:clock-outline

  # Internal temperature sensor (ESP32-S3)
  - platform: internal_temperature
    name: "${friendly_name} Internal Temperature"
    id: internal_temp
    update_interval: 60s
    icon: mdi:thermometer

  # Relay state tracking (for energy monitoring if available)
  - platform: template
    name: "${friendly_name} Relay State Time"
    id: relay_state_time
    icon: mdi:timer
    unit_of_measurement: "min"
    accuracy_decimals: 1
    lambda: |-
      static float on_time = 0;
      if (id(main_relay).state) {
        on_time += 1.0/60.0;  // Increment by 1 second / 60
      }
      return on_time;
    update_interval: 1s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:ip-network
    ssid:
      name: "${friendly_name} SSID"
      icon: mdi:wifi
    mac_address:
      name: "${friendly_name} MAC Address"
      icon: mdi:network-outline

  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: true
    icon: mdi:information-outline

# Configuration for wall plate specific features
# Allows customization of button actions via Home Assistant
select:
  - platform: template
    name: "${friendly_name} Button 1 Action"
    id: button1_action
    icon: mdi:gesture-tap-button
    options:
      - "Toggle Relay"
      - "Turn On Relay"
      - "Turn Off Relay"
      - "Trigger Scene"
      - "Disabled"
    initial_option: "Toggle Relay"
    optimistic: true
    restore_value: true

  - platform: template
    name: "${friendly_name} Button 2 Action"
    id: button2_action
    icon: mdi:gesture-tap-button
    options:
      - "Toggle Relay"
      - "Turn On Relay"
      - "Turn Off Relay"
      - "Trigger Scene"
      - "Disabled"
    initial_option: "Disabled"
    optimistic: true
    restore_value: true
