# Sense360 Core Ceiling - Ceiling-Mounted Smart Home Hub
#
# This is the ceiling-mounted variant of the Sense360 Core board.
# Designed for recessed ceiling installation with halo LED ring.
#
# Hardware Features:
# - ESP32-S3-WROOM-1 (8MB Flash, 2MB PSRAM)
# - WiFi 2.4GHz, Bluetooth 5.0 LE
# - Power: 240V AC / PoE (via separate power packages)
# - Dual I2C buses (halo LED ring + expansion modules)
# - UART for presence/radar sensors
# - Built-in relay for load switching (ceiling fan, lights)
# - GPIO expansion pins
# - RGB LED halo ring and status LED
#
# Pin Assignments (ESP32-S3):
# - I2C0 (Halo LED):  SDA=GPIO39, SCL=GPIO40
# - I2C1 (Expansion): SDA=GPIO21, SCL=GPIO18
# - UART (Hi-Link):   TX=GPIO2, RX=GPIO1, baud 256000  (RoomIQ J10 LD2450 radar)
# - UART (SEN0609):   TX=GPIO5, RX=GPIO4, baud 115200  (RoomIQ J10 DFRobot radar)
# - Relay:            GPIO3 (10A AC/DC for ceiling fan/light; schematic Relay
#                     net per S360-100-R4. CORE-ABSTRACT-BUS-001A rebound
#                     relay_pin GPIO4 → GPIO3 after CORE-ABSTRACT-BUS-001C
#                     freed GPIO3 by moving ALS_INT off it.)
# - PIR/Motion:       GPIO15 (schematic IO15 = PIR, RoomIQ J10 motion input)
# - Fan Status LED:   GPIO46 (schematic IO46 = GP_Fan_Status_Led, Core-side
#                     indicator independent of any module)
# - SEN0609 output:   GPIO6  (schematic IO6 = out(gpio6), RoomIQ J10 aux line)
#
# CORE-ABSTRACT-BUS-001C rebinds applied here:
#   * generic `status_led_pin` retired (no Core-baseline status-LED net on the
#     schematic; the S360-300 LED ring is owned by `led_ring_ceiling.yaml`)
#   * `expansion_gpio1..4` retired (replaced by function-specific names)
#   * UART split into `roomiq_hi_link_uart` (256000) and `roomiq_sen0609_uart`
#     (115200); ESP-perspective tx/rx direction is now schematic-correct
#   * `pir_sensor_pin` rebound GPIO47 → GPIO15 (schematic PIR net)
#   * `fan_status_led_pin` introduced on GPIO46 (Core-side indicator)
#   * `roomiq_sen0609_output_pin` introduced on GPIO6
# CORE-ABSTRACT-BUS-001A rebinds relay_pin GPIO4 → GPIO3 (schematic Relay
# net per S360-100-R4). The GPIO3 collision was resolved by 001C (#557)
# which moved ALS_INT to GPIO47 and the expander interrupt to GPIO17.
#
# Form Factor:
# - Ceiling recessed mount
# - Halo LED ring for ambient feedback
# - Downward-facing sensors (presence, air quality)
# - Top-side power and expansion connectors
#
# Expansion Bus Pinout (10-pin connector):
# 1. GND
# 2. 3.3V (500mA max)
# 3. 5V (1A max)
# 4. I2C1 SDA (GPIO21) - for expansion modules (consolidation owed to 001B)
# 5. I2C1 SCL (GPIO18) - for expansion modules (consolidation owed to 001B)
# 6. Hi-Link UART RX (GPIO1) — ESP receives from Hi-Link radar
# 7. Hi-Link UART TX (GPIO2) — ESP transmits to Hi-Link radar
# 8. SEN0609 UART RX (GPIO4) — ESP receives from DFRobot radar
# 9. SEN0609 UART TX (GPIO5) — ESP transmits to DFRobot radar
# 10. SEN0609 out (GPIO6) — DFRobot auxiliary line

substitutions:
  device_name: sense360-ceiling
  friendly_name: Sense360 Ceiling
  timezone: "America/New_York"

  # Pin definitions
  # I2C buses
  halo_i2c_sda_pin: GPIO39
  halo_i2c_scl_pin: GPIO40
  expansion_i2c_sda_pin: GPIO21
  expansion_i2c_scl_pin: GPIO18

  # Relay (ceiling fan/light control)
  # CORE-ABSTRACT-BUS-001A: schematic-correct Relay net on IO3 per
  # S360-100-R4. GPIO3 was freed by CORE-ABSTRACT-BUS-001C (#557) which
  # moved ALS_INT off GPIO3 to GPIO47 and the expander interrupt off
  # GPIO3 to GPIO17.
  relay_pin: GPIO3
  relay_max_current: "10A"

  # CORE-ABSTRACT-BUS-001C: Fan Status LED indicator (Core-side, no module
  # dependency). Schematic IO46 = GP_Fan_Status_Led per S360-100-R4.
  fan_status_led_pin: GPIO46

  # CORE-ABSTRACT-BUS-001C: PIR motion input.
  # Schematic IO15 = PIR (RoomIQ J10 PIR motion input). Was GPIO47 (= ALS_INT
  # net, schematic-conflicting).
  pir_sensor_pin: GPIO15

  # CORE-ABSTRACT-BUS-001C: SEN0609 auxiliary output line.
  # Schematic IO6 = out(gpio6), RoomIQ J10 auxiliary line.
  roomiq_sen0609_output_pin: GPIO6

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: sense360.ceiling
    version: 1.0.0
  on_boot:
    - priority: 600
      then:
        - logger.log: "Sense360 Ceiling board initializing..."
    - priority: -100
      then:
        - logger.log: "Sense360 Ceiling board ready"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      # Enable PSRAM
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y

# I2C bus for Halo LED ring (primary use)
i2c:
  - id: halo_i2c
    sda: ${halo_i2c_sda_pin}
    scl: ${halo_i2c_scl_pin}
    scan: true
    frequency: 400kHz

  # I2C bus for expansion modules (air quality, comfort, etc.)
  - id: expansion_i2c
    sda: ${expansion_i2c_sda_pin}
    scl: ${expansion_i2c_scl_pin}
    scan: true
    frequency: 400kHz

# CORE-ABSTRACT-BUS-001C: split single uart_bus into two named RoomIQ UARTs
# matching the schematic-correct ESP-perspective direction and baud rates.
uart:
  # RoomIQ J10 Hi-Link radar UART — Hi-Link LD2450 default baud 256000.
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000

  # RoomIQ J10 DFRobot SEN0609 radar UART — SEN0609/C4001 default baud 115200.
  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200

# Core-side Fan Status LED indicator (independent of any module).
# Replaces the retired generic status_led_pin per CORE-ABSTRACT-BUS-001C.
status_led:
  pin:
    number: ${fan_status_led_pin}
    inverted: true

# Main relay for ceiling fan or light control
switch:
  - platform: gpio
    name: "${friendly_name} Relay"
    id: main_relay
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:electric-switch
    on_turn_on:
      - logger.log: "Ceiling relay turned ON"
    on_turn_off:
      - logger.log: "Ceiling relay turned OFF"

# Binary sensors
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    id: system_status

# Optional: PIR motion sensor (backup for mmWave radar)
# Uncomment if PIR sensor is installed on GPIO15 (schematic PIR net).
# binary_sensor:
#   - platform: gpio
#     name: "${friendly_name} PIR Motion"
#     id: pir_motion
#     pin:
#       number: ${pir_sensor_pin}
#       mode:
#         input: true
#         pulldown: true
#     device_class: motion
#     filters:
#       - delayed_on: 100ms
#       - delayed_off: 5s

# System controls
button:
  - platform: restart
    id: reset_button
    name: "${friendly_name} Restart"
    icon: mdi:restart

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
    icon: mdi:safety-goggles

  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn
    icon: mdi:delete-forever
    disabled_by_default: true

# System sensors
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s
    icon: mdi:wifi

  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s
    icon: mdi:clock-outline

  # Internal temperature sensor (ESP32-S3)
  - platform: internal_temperature
    name: "${friendly_name} Internal Temperature"
    id: internal_temp
    update_interval: 60s
    icon: mdi:thermometer

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:ip-network
    ssid:
      name: "${friendly_name} SSID"
      icon: mdi:wifi
    mac_address:
      name: "${friendly_name} MAC Address"
      icon: mdi:network-outline

  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: true
    icon: mdi:information-outline
