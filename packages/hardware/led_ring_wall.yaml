# ============================================================================
# Sense360 LED Ring - Wall/Desk Standard  (legacy alias)
# ============================================================================
# SKU: S360-LED-C
#
# PACKAGE-RENAME-001 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the wall/desk standard LED
# ring now lives in the SKU-aligned board overlay
# `packages/boards/s360-300-led-wall.yaml`. This legacy functional path is
# retained as a thin alias that `!include`s that overlay, so the resolved
# config is byte-identical to before the source-of-truth flip.
#
# Why this path is preserved (NOT deleted): legacy `products/sense360-core-*`
# products still bind this path. Per the alias policy (§3.3), no alias is
# dropped while a live binder exists; alias removal is a separate later slice
# gated on the binder count reaching zero.
#
# Hardware / pin assignment (8-LED WS2812B ring, `led_data_pin: GPIO48`) is
# documented in the board overlay this file aliases.
# ============================================================================

packages:
  board_led: !include ../boards/s360-300-led-wall.yaml
