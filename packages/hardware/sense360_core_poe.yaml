# Sense360 Core PoE Board
#
# Ethernet-enabled variant of the Sense360 Core board with PoE power.
# Uses W5500 Ethernet controller for wired network connectivity.
#
# Hardware Features:
# - ESP32-S3-WROOM-1 (8MB Flash, 2MB PSRAM)
# - W5500 Ethernet Controller (SPI interface)
# - IEEE 802.3af PoE Power Supply
# - Dual I2C buses for expansion modules
# - UART for presence/radar sensors
# - 4x GPIO expansion pins
# - Built-in relay (10A)
# - Status LED
#
# Pin Assignments:
# - SPI (W5500):
#   - MOSI:             GPIO11
#   - MISO:             GPIO13
#   - SCK:              GPIO12
#   - CS:               GPIO14
#   - INT:              GPIO15  (NOTE: schematic GPIO15 is also PIR for RoomIQ;
#                                this Core variant repurposes it for W5500 INT
#                                and does not expose PIR.)
#   - RST:              GPIO16
# - I2C0 (Primary):     SDA=GPIO39, SCL=GPIO40    (consolidation owed to 001B)
# - I2C1 (Secondary):   SDA=GPIO21, SCL=GPIO18    (consolidation owed to 001B)
# - UART (Hi-Link):     TX=GPIO2, RX=GPIO1, baud 256000
# - UART (SEN0609):     TX=GPIO5, RX=GPIO4, baud 115200
# - Relay:              GPIO3 (schematic Relay net; CORE-ABSTRACT-BUS-001A)
# - Fan Status LED:     GPIO46 (GP_Fan_Status_Led per Core schematic)
# - User Button:        GPIO9
# - Boot Button:        GPIO0
#
# CORE-ABSTRACT-BUS-001C rebinds applied here:
#   * generic `status_led_pin` retired (was GPIO8 = AirQ_Led, AirIQ-only)
#   * `expansion_gpio1..4` retired (replaced by function-specific names)
#   * UART split into `roomiq_hi_link_uart` (256000) and `roomiq_sen0609_uart`
#     (115200); ESP-perspective tx/rx direction is now schematic-correct
#   * `fan_status_led_pin` introduced on GPIO46

substitutions:
  device_name: sense360-poe
  friendly_name: Sense360 PoE
  timezone: "America/Los_Angeles"

  # W5500 SPI pins (avoid PSRAM interface pins)
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13
  spi_clk_pin: GPIO12
  w5500_cs_pin: GPIO14
  w5500_int_pin: GPIO15
  w5500_rst_pin: GPIO16

  # I2C buses
  i2c0_sda_pin: GPIO39
  i2c0_scl_pin: GPIO40
  i2c1_sda_pin: GPIO21
  i2c1_scl_pin: GPIO18

  # Relay: schematic Relay net on IO3 per S360-100-R4
  # (CORE-ABSTRACT-BUS-001A). GPIO3 was freed by CORE-ABSTRACT-BUS-001C
  # (#557).
  relay_pin: GPIO3

  # Status indicators
  # CORE-ABSTRACT-BUS-001C: generic `status_led_pin: GPIO8` (= AirQ_Led, AirIQ
  # module indicator) retired; Core-side indicator now uses
  # `fan_status_led_pin` (GPIO46 = GP_Fan_Status_Led). AirIQ-owned LED stays
  # owned by the AirIQ expansion package.
  fan_status_led_pin: GPIO46

  # Buttons
  user_button_pin: GPIO9
  boot_button_pin: GPIO0

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: sense360.poe
    version: 1.0.0
  on_boot:
    - priority: 600
      then:
        - logger.log: "Sense360 PoE board initializing..."
    - priority: -100
      then:
        - logger.log: "Sense360 PoE board ready - Ethernet connected"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      # Enable PSRAM
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y

# W5500 Ethernet controller
ethernet:
  type: W5500
  mosi_pin: ${spi_mosi_pin}
  miso_pin: ${spi_miso_pin}
  clk_pin: ${spi_clk_pin}
  cs_pin: ${w5500_cs_pin}
  interrupt_pin: ${w5500_int_pin}
  reset_pin: ${w5500_rst_pin}
  clock_speed: 26.666MHz

  # Enable IPv6 support (optional)
  # enable_ipv6: false

# Primary I2C bus for expansion modules
i2c:
  - id: i2c0
    sda: ${i2c0_sda_pin}
    scl: ${i2c0_scl_pin}
    scan: true
    frequency: 400kHz

  # Secondary I2C bus (optional, for additional modules)
  - id: i2c1
    sda: ${i2c1_sda_pin}
    scl: ${i2c1_scl_pin}
    scan: true
    frequency: 400kHz

# CORE-ABSTRACT-BUS-001C: split single uart_bus into two named RoomIQ UARTs
# matching the schematic-correct ESP-perspective direction and baud rates.
uart:
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000

  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200

# Core-side Fan Status LED indicator (independent of any module).
# Replaces the retired generic status_led_pin per CORE-ABSTRACT-BUS-001C.
status_led:
  pin:
    number: ${fan_status_led_pin}
    inverted: true

# Main relay output
switch:
  - platform: gpio
    name: "${friendly_name} Relay"
    id: main_relay
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:electric-switch

# User button
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    id: system_status

  - platform: gpio
    name: "${friendly_name} User Button"
    id: user_button
    pin:
      number: ${user_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - logger.log: "User button pressed"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  # Ethernet link status
  - platform: template
    name: "${friendly_name} Ethernet Link"
    id: ethernet_link
    icon: mdi:ethernet-cable
    device_class: connectivity
    lambda: |-
      return id(system_status).state;

# System controls
button:
  - platform: restart
    id: reset_button
    name: "${friendly_name} Restart"
    icon: mdi:restart

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
    icon: mdi:safety-goggles

  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn
    icon: mdi:delete-forever
    disabled_by_default: true

# System sensors
sensor:
  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s
    icon: mdi:clock-outline

  # Internal temperature sensor (ESP32-S3)
  - platform: internal_temperature
    name: "${friendly_name} Internal Temperature"
    id: internal_temp
    update_interval: 60s
    icon: mdi:thermometer

# Network information
text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:ip-network
      id: ethernet_ip

  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: true
    icon: mdi:information-outline
