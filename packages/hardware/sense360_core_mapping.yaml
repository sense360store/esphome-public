# Sense360 Core - Hardware Pin Mapping
# ESP32-S3-WROOM-1-N16R8 (16MB Flash, 8MB PSRAM)
#
# CORE-ABSTRACT-BUS-001B: collapsed dual-bus i2c_primary (GPIO39/GPIO40
# @ 100 kHz) + i2c_expander (GPIO21/GPIO18 @ 400 kHz) into the single
# shared `core_i2c` on schematic-correct IO48/IO45 @ 400 kHz. The legacy
# `i2c0_*` / `i2c1_*` pin and frequency substitutions are retired (hard
# rename only, no compatibility aliases per CORE-ABSTRACT-BUS-001B-PLAN-001
# operator decisions).
#
# CORE-ABSTRACT-BUS-001C: status_led_simple_pin (was GPIO47=ALS_INT),
# expander_int_pin (was GPIO3=Relay net), and expansion_gpio1..3 retired or
# rebound per the schematic-backed plan in
# docs/hardware/core-abstract-bus-001c-rebind-plan.md.
#
# Pin Map:
#   Core I2C (shared): SDA=GPIO48, SCL=GPIO45, 400kHz (schematic IO48/IO45)
#   UART Hi-Link:  TX=GPIO2, RX=GPIO1, baud=256000 (RoomIQ J10 Hi-Link radar)
#   UART SEN0609:  TX=GPIO5, RX=GPIO4, baud=115200 (RoomIQ J10 DFRobot radar)
#   UART Aux:      TX=GPIO43, RX=GPIO44
#   Fan PWM:       GPIO4 (output), GPIO5 (tach) — LEGACY / SUPERSEDED single-
#                  channel placeholder. The canonical FanPWM path is the
#                  FOUR-CHANNEL native ESP32-S3 GPIO map (TachPMW1..4 =
#                  IO10/IO11/IO12/IO39, Pul_Cou1..4 = IO17/IO18/IO46/IO9,
#                  TachIO = IO16) owned by packages/expansions/fan_pwm_native.yaml
#                  per docs/hardware/s360-100-native-fan-gpio-map.md. GPIO4/GPIO5
#                  are the RoomIQ SEN0609 radar UART pins on the production Core
#                  board package (packages/boards/s360-100-core.yaml §4.2); this
#                  single-channel GPIO4/5 fan placeholder MUST NOT be revived.
#   Relay:         GPIO3 (schematic Relay net; CORE-ABSTRACT-BUS-001A)
#   Fan Status LED: GPIO46 (GP_Fan_Status_Led per Core schematic IO46)
#   User Button:   GPIO9
#   Expander INT:  GPIO17 (was GPIO3 - rebound per schematic IO17=expander_int)

substitutions:
  device_name: sense360-core
  friendly_name: Sense360 Core
  device_version: "1.0.0"
  timezone: "America/Los_Angeles"

  # UART Auxiliary
  uart_aux_tx_pin: GPIO43
  uart_aux_rx_pin: GPIO44
  uart_aux_baud: "115200"

  # Fan control — LEGACY / SUPERSEDED single-channel placeholder
  # (PRE-HW-PREP-FW-311-001 / SX1509-RECONCILE-001 / S360-100-NATIVE-FAN-GPIO-MAP-001).
  # This single-channel `fan_pwm_pin: GPIO4` / `fan_tach_pin: GPIO5` placeholder
  # is RECONCILED-OUT and SUPERSEDED by the canonical FOUR-CHANNEL native
  # ESP32-S3 GPIO fan map (TachPMW1..4 = IO10/IO11/IO12/IO39 drive, Pul_Cou1..4 =
  # IO17/IO18/IO46/IO9 tach, TachIO = IO16 shared) owned by the dedicated driver
  # packages/expansions/fan_pwm_native.yaml, per
  # docs/hardware/s360-100-native-fan-gpio-map.md. It contradicts the native map
  # AND collides with the RoomIQ SEN0609 radar UART (`roomiq_sen0609_uart` below
  # binds GPIO5/GPIO4): the production Core board package
  # packages/boards/s360-100-core.yaml binds GPIO4/GPIO5 to the radar UART and
  # does NOT expose native fan PWM/tach on those pins (its §4.2 reconciliation).
  # The GPIO4/5 values are retained ONLY as the legacy alias these substitutions
  # historically carried so existing reads resolve unchanged; they MUST NOT be
  # revived as the FanPWM path. The production radar-UART binding is unchanged.
  fan_pwm_pin: GPIO4
  fan_tach_pin: GPIO5
  fan_pwm_frequency: "25000"

  # Outputs
  # CORE-ABSTRACT-BUS-001A: schematic Relay net on IO3 per S360-100-R4.
  # GPIO3 was freed by CORE-ABSTRACT-BUS-001C (#557) which moved the
  # expander interrupt off GPIO3 to GPIO17.
  relay_pin: GPIO3
  status_led_rgb_pin: GPIO48
  # CORE-ABSTRACT-BUS-001C: status_led_simple_pin (was GPIO47=ALS_INT) retired;
  # replaced with the schematic-named fan_status_led_pin on IO46 (GP_Fan_Status_Led).
  # The schematic-correct LED ring data line is on GPIO38 and owned by the LED
  # ring package (packages/hardware/led_ring_ceiling.yaml), not the Core abstract.
  fan_status_led_pin: GPIO46
  roomiq_sen0609_output_pin: GPIO6

  # Inputs
  user_button_pin: GPIO9
  boot_button_pin: GPIO0
  # CORE-ABSTRACT-BUS-001C: rebound from GPIO3 (Relay net) to GPIO17
  # (schematic IO17 = expander_int per S360-100-R4).
  expander_int_pin: GPIO17

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: sense360.core
    version: ${device_version}
  on_boot:
    - priority: 800
      then:
        - logger.log: "Sense360 Core initializing..."
    - priority: -100
      then:
        - logger.log: "Sense360 Core ready"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y

psram:
  mode: octal
  speed: 80MHz

# Shared Core I2C bus (CORE-ABSTRACT-BUS-001B).
# Schematic IO48 = I2C_SDA, IO45 = I2C_SCL per S360-100-R4; pulled up by
# R22/R21 10 kΩ. Single bus serves both sensor and expander consumers
# that previously split across `i2c_primary` / `i2c_expander`.
i2c:
  - id: core_i2c
    sda: GPIO48
    scl: GPIO45
    scan: true
    frequency: 400kHz

uart:
  # CORE-ABSTRACT-BUS-001C: RoomIQ J10 Hi-Link radar UART.
  # Schematic-correct ESP-perspective direction: tx_pin=GPIO2 (Hi-Link_TX),
  # rx_pin=GPIO1 (Hi-Link_RX). Baud 256000 per operator decision #7.
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

  # CORE-ABSTRACT-BUS-001C: RoomIQ J10 DFRobot SEN0609 radar UART.
  # Schematic-correct ESP-perspective direction: tx_pin=GPIO5 (SEN0609_TX),
  # rx_pin=GPIO4 (SEN0609_RX). Baud 115200 per operator decision #7.
  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200
    parity: NONE
    stop_bits: 1

  - id: uart_auxiliary
    tx_pin: ${uart_aux_tx_pin}
    rx_pin: ${uart_aux_rx_pin}
    baud_rate: ${uart_aux_baud}
    parity: NONE
    stop_bits: 1

output:
  # LEGACY / SUPERSEDED single-channel fan PWM output (see the `fan_pwm_pin`
  # note above). Retained as a source-of-truth alias (consumed by
  # packages/features/fan_control_advanced_profile.yaml); the canonical FanPWM
  # path is the four-channel native driver packages/expansions/fan_pwm_native.yaml.
  - platform: ledc
    id: fan_pwm_output
    pin: ${fan_pwm_pin}
    frequency: ${fan_pwm_frequency}Hz

switch:
  - platform: gpio
    name: "${friendly_name} Relay"
    id: main_relay
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF

# Fan Status LED (Core-side indicator on IO46 = GP_Fan_Status_Led).
# CORE-ABSTRACT-BUS-001C: replaces the retired generic `status_led_simple_pin`
# (which was on GPIO47 = ALS_INT and is now schematic-correct for ALS_INT).
status_led:
  pin:
    number: ${fan_status_led_pin}
    inverted: true

# RGB Status LED
light:
  - platform: esp32_rmt_led_strip
    id: status_led_rgb
    rgb_order: GRB
    chipset: WS2812
    pin: ${status_led_rgb_pin}
    num_leds: 1
    name: "${friendly_name} Status LED"
    internal: true
    default_transition_length: 100ms

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    id: system_status

  - platform: gpio
    name: "${friendly_name} User Button"
    id: user_button
    pin:
      number: ${user_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at least 300ms
        then:
          - switch.toggle: main_relay
      - timing:
          - ON for at most 500ms
          - OFF for at most 300ms
          - ON for at most 500ms
          - OFF for at least 300ms
        then:
          - button.press: restart_button

  - platform: gpio
    id: expander_interrupt
    pin:
      number: ${expander_int_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    internal: true

button:
  - platform: restart
    id: restart_button
    name: "${friendly_name} Restart"

  # Internal alias used by shared API actions expecting a reset_button ID
  - platform: template
    id: reset_button
    internal: true
    on_press:
      - button.press: restart_button

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"

  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn
    disabled_by_default: true

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s

  - platform: internal_temperature
    name: "${friendly_name} MCU Temperature"
    id: mcu_temperature
    update_interval: 60s

  # LEGACY / SUPERSEDED single-channel fan tach (see the `fan_tach_pin` note
  # above). Retained as a source-of-truth alias (consumed by
  # packages/features/fan_control_advanced_profile.yaml); the canonical per-fan
  # tach path is the four-channel native driver
  # packages/expansions/fan_pwm_native.yaml (Pul_Cou1..4 native pulse_counter).
  - platform: pulse_counter
    id: fan_tach_sensor
    pin:
      number: ${fan_tach_pin}
      mode:
        input: true
        pullup: true
    name: "${friendly_name} Fan RPM"
    internal: true
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    update_interval: 2s
    filters:
      - multiply: 30.0

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} SSID"
    mac_address:
      name: "${friendly_name} MAC Address"

  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: true

globals:
  - id: core_i2c_healthy
    type: bool
    restore_value: false
    initial_value: 'true'

  - id: uart_presence_connected
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_airiq_present
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_comfort_present
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_presence_present
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_fan_gp8403_present
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_gpio_expander_present
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: module_comfort_ceiling_present
    type: bool
    restore_value: false
    initial_value: 'false'

# ============================================================================
# I2C ADDRESS MAP (Reference)
# ============================================================================
# Address | Device           | Module          | Notes
# --------|------------------|-----------------|-----------------------------
# 0x10    | VEML7700         | Comfort Ceiling | Ambient light sensor (lux)
# 0x23    | BH1750           | Comfort         | Light sensor
# 0x44    | SHT40/SHT30      | Comfort/AirIQ   | Temp/Humidity (conflict!)
# 0x58    | GP8403           | Fan DAC         | Channel 0x58 or 0x59
# 0x59    | GP8403 alt/SGP40 | Fan DAC/Bath    | Address conflict possible
# 0x62    | SCD41            | AirIQ           | CO2 sensor
# 0x69    | SEN55            | AirIQ           | PM/VOC/NOx sensor
# 0x3E    | SX1509 (LEGACY)  | GPIO Expander   | DEPRECATED — removed from the
#         |                  |                 | S360-100 fan signal path; the
#         |                  |                 | fan path is native ESP32-S3 GPIO
#         |                  |                 | (S360-100-NATIVE-FAN-GPIO-MAP-001)
# 0x3F    | SX1509 alt (LEG.)| GPIO Expander   | DEPRECATED (legacy alt address)
# 0x70    | TCA9548A         | I2C Mux         | For multi-module support
# 0x76    | BME680           | Comfort         | Pressure/Gas sensor
# ============================================================================
