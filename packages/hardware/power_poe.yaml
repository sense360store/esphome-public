# ============================================================================
# Sense360 Core — PoE (Power over Ethernet) Configuration  (legacy alias)
# ============================================================================
# PACKAGE-RENAME-005 (docs/arch-board-bundle-plan.md §3.3, §5.5, §7 item 4).
# The authoritative, self-contained definition of the Sense360 PoE PSU power
# board (S360-410-R4: discrete TPS2378 PoE PD + TX4138 buck + F0505S isolated
# DC/DC chain, the diagnostic-only power-source text sensors, supply-voltage
# template, and PoE-connected binary sensor) now lives in the SKU-aligned board
# package `packages/boards/s360-410-poe-psu.yaml`. This legacy functional path
# is retained as a thin alias that `!include`s that board package, so the
# resolved config is byte-identical to before the source-of-truth flip. This is
# the FINAL non-deferred rename slice — it completes the sensor/PSU rename epic.
#
# Why this path is preserved (NOT deleted): the production / LED-preview bundles
# bind the board package directly, but every other PoE product still binds THIS
# path as `power_config` / `power`, e.g. `products/sense360-core-c-poe.yaml`,
# `sense360-core-v-c-poe.yaml`, `sense360-core-v-w-poe.yaml`,
# `sense360-core-w-poe.yaml`, `sense360-poe.yaml`, `sense360-fan-pwm.yaml`, the
# FanRelay / FanTRIAC / FanPWM / FanDAC and RoomIQ bundles, and the
# `products/compile-only/ceiling-poe*.yaml` lane. Per the alias policy (§3.3),
# no alias is dropped while a live binder exists; alias removal / consumer
# rebind is a separate later slice gated on the binder count reaching zero
# (CI-REFACTOR-VERIFY-001, §5.5).
#
# This slice is firmware-package authoritative ONLY: it makes no board-
# verification claim and does not change the S360-410 schematic_status
# (`cataloged_unverified`). The full hardware BOM, vendor typicals, safety /
# scope notes, and every config block are documented in the board package this
# file aliases (packages/boards/s360-410-poe-psu.yaml).
# ============================================================================

packages:
  board_poe_psu: !include ../boards/s360-410-poe-psu.yaml
