# Sense360 Core Board - Standard Edition
#
# This is the main core board for the Sense360 modular system.
# It provides the foundation for all expansion modules.
#
# Hardware Features:
# - ESP32-S3-WROOM-1 (8MB Flash, 2MB PSRAM)
# - WiFi 2.4GHz, Bluetooth 5.0 LE
# - Power: 240V AC / PoE / USB-C (configurable via power packages)
# - Shared Core I²C bus for expansion modules
# - RoomIQ J10 Hi-Link + DFRobot SEN0609 radar UARTs
# - Built-in relay (10A)
# - Core-side fan status LED indicator (GPIO46)
#
# CORE-ABSTRACT-BUS-001B rebinds applied here:
#   * Single shared Core I²C bus `core_i2c` on schematic-correct
#     `IO48` (SDA) / `IO45` (SCL) at `400kHz`; the legacy dual-bus
#     `i2c0` (`GPIO39` / `GPIO40`) and `i2c1` (`GPIO21` / `GPIO18`)
#     definitions and their `i2c0_*` / `i2c1_*` pin substitutions are
#     retired (hard rename only, no compatibility aliases per
#     CORE-ABSTRACT-BUS-001B-PLAN-001 operator decisions).
# CORE-ABSTRACT-BUS-001C rebinds applied here:
#   * generic `status_led_pin` retired (no Core-baseline status-LED net on the
#     schematic; the S360-300 LED ring is owned by `led_ring_ceiling.yaml`)
#   * `expansion_gpio1..4` retired (replaced by function-specific names where
#     needed by downstream modules; no generic replacement)
#   * UART split into `roomiq_hi_link_uart` (256000) and `roomiq_sen0609_uart`
#     (115200); ESP-perspective tx/rx direction is now schematic-correct
#   * `fan_status_led_pin` introduced on GPIO46 (Core-side indicator)
#
# Pin Assignments:
# - Core I2C (shared): SDA=GPIO48, SCL=GPIO45, 400kHz (schematic IO48/IO45;
#                      pulled up by R22/R21 10 kΩ per S360-100-R4)
# - UART (Hi-Link):    TX=GPIO2, RX=GPIO1, baud 256000
# - UART (SEN0609):    TX=GPIO5, RX=GPIO4, baud 115200
# - Relay:             GPIO3 (schematic Relay net; CORE-ABSTRACT-BUS-001A)
# - Fan Status LED:    GPIO46 (GP_Fan_Status_Led per Core schematic)
# - User Button:       GPIO9
# - Boot Button:       GPIO0

substitutions:
  device_name: sense360-core
  friendly_name: Sense360 Core
  timezone: "America/Los_Angeles"

  # Relay: schematic-correct Relay net on IO3 (CORE-ABSTRACT-BUS-001A).
  # GPIO3 was freed by CORE-ABSTRACT-BUS-001C (#557) moving ALS_INT to
  # GPIO47 and the expander interrupt to GPIO17.
  relay_pin: GPIO3

  # Status indicators
  # CORE-ABSTRACT-BUS-001C: generic `status_led_pin` retired (was GPIO2 =
  # Hi-Link_TX). Core-side indicator now uses `fan_status_led_pin`.
  status_led_rgb_pin: GPIO48
  fan_status_led_pin: GPIO46

  # Buttons
  user_button_pin: GPIO9
  boot_button_pin: GPIO0

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: sense360.core
    version: 1.0.0
  # Platform-specific initialization
  on_boot:
    - priority: 600
      then:
        - logger.log: "Sense360 Core board initializing..."
    - priority: -100
      then:
        - logger.log: "Sense360 Core board ready"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      # Enable PSRAM
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_MODE_OCT: y

# Shared Core I2C bus (CORE-ABSTRACT-BUS-001B).
# Schematic IO48 = I2C_SDA, IO45 = I2C_SCL per S360-100-R4; pulled up by
# R22/R21 10 kΩ. Single bus serves every Core-side I²C consumer (sensors,
# SX1509 expander, GP8403 DAC, halo LED PCA9685).
i2c:
  - id: core_i2c
    sda: GPIO48
    scl: GPIO45
    scan: true
    frequency: 400kHz

# CORE-ABSTRACT-BUS-001C: split single uart_bus into two named RoomIQ UARTs
# matching the schematic-correct ESP-perspective direction and baud rates.
uart:
  - id: roomiq_hi_link_uart
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 256000

  - id: roomiq_sen0609_uart
    tx_pin: GPIO5
    rx_pin: GPIO4
    baud_rate: 115200

# Core-side Fan Status LED indicator (independent of any module).
# Replaces the retired generic status_led_pin per CORE-ABSTRACT-BUS-001C.
status_led:
  pin:
    number: ${fan_status_led_pin}
    inverted: true

# Main relay output
switch:
  - platform: gpio
    name: "${friendly_name} Relay"
    id: main_relay
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:electric-switch

# User button
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    id: system_status

  - platform: gpio
    name: "${friendly_name} User Button"
    id: user_button
    pin:
      number: ${user_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - logger.log: "User button pressed"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

# System controls
button:
  - platform: restart
    id: restart_button
    name: "${friendly_name} Restart"
    icon: mdi:restart

  # Internal alias used by shared API actions expecting a reset_button ID
  - platform: template
    id: reset_button
    internal: true
    on_press:
      - button.press: restart_button

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
    icon: mdi:safety-goggles

  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn
    icon: mdi:delete-forever
    disabled_by_default: true

# System sensors
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s
    icon: mdi:wifi

  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 60s
    icon: mdi:clock-outline

  # Internal temperature sensor (ESP32-S3)
  - platform: internal_temperature
    name: "${friendly_name} Internal Temperature"
    id: internal_temp
    update_interval: 60s
    icon: mdi:thermometer

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:ip-network
    ssid:
      name: "${friendly_name} SSID"
      icon: mdi:wifi
    mac_address:
      name: "${friendly_name} MAC Address"
      icon: mdi:network-outline

  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: true
    icon: mdi:information-outline
