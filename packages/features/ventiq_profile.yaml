# ============================================================================
# SENSE360 VENTIQ FEATURE PROFILE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical VentIQ alias for the user-facing VentIQ feature profile
# (shower detection, mold risk warnings, ventilation advice,
# post-shower timer, copy-sensors of the bathroom_* globals defined
# in the VentIQ base hardware driver). Entity names exposed by the
# legacy file already use the productized `VentIQ` prefix in
# user-facing labels; only the filename remains legacy.
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-VENTIQ-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550). It exists so new product /
# compile-only YAMLs can `!include` the canonical productized
# `VentIQ` name instead of the legacy `bathroom_profile` filename,
# without breaking any current consumer of the legacy path.
#
# Implementation source of truth:
#   packages/features/bathroom_profile.yaml
#
# The legacy file remains the actual feature profile. Do not add
# substitutions, globals, sensors, or any other YAML blocks here —
# this file must stay a pure include wrapper per the naming-audit
# Phase 2 contract (docs/package-naming-audit.md §"Phase 2 — Add
# canonical aliases / wrapper packages").
# ============================================================================

packages:
  legacy_ventiq_profile: !include bathroom_profile.yaml
