# ============================================================================
# SENSE360 ROOMIQ RADAR FEATURE PROFILE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical RoomIQ alias for the user-facing RoomIQ radar / occupancy
# feature profile (Room Occupied binary sensor + Presence Score
# percentage entities driven by the `presence_confidence` global
# defined by the radar hardware driver).
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-ROOMIQ-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550) and the sibling Phase 2 slice
# PACKAGE-NAMING-ALIASES-VENTIQ-001 (PR #552). It exists so new
# product / compile-only YAMLs can `!include` the canonical
# productized `RoomIQ` name instead of the legacy
# `presence_basic_profile` filename, without breaking any current
# consumer of the legacy path (Release-One product
# `products/sense360-ceiling-poe-ventiq-roomiq.yaml` and several
# Core / Mini / compile-only YAMLs `!include` the legacy file by
# path).
#
# The `_radar` suffix is deliberately not `_presence`: per the
# naming-audit Rule 7, `Presence` is a forbidden customer-facing
# token from config/webflash-compatibility.json's forbidden_tokens
# list and must not appear in any newly added package filename.
# `_radar` matches the sibling `roomiq_radar.yaml` hardware alias
# and avoids the deprecated `Presence` token.
#
# Implementation source of truth:
#   packages/features/presence_basic_profile.yaml
#
# The legacy file remains the actual feature profile. Do not add
# substitutions, globals, sensors, or any other YAML blocks here —
# this file must stay a pure include wrapper per the naming-audit
# Phase 2 contract (docs/package-naming-audit.md §"Phase 2 — Add
# canonical aliases / wrapper packages").
# ============================================================================

packages:
  legacy_roomiq_radar_profile: !include presence_basic_profile.yaml
