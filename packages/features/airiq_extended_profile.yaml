# ============================================================================
# SENSE360 AIRIQ EXTENDED FEATURE PROFILE - CANONICAL ALIAS (Phase 2)
# ============================================================================
# Canonical AirIQ alias for the extended user-facing AirIQ feature
# profile (full CO₂ / PM1.0 / PM2.5 / PM4.0 / PM10 / VOC index / NOx
# index template sensors on top of the base AirIQ profile, plus
# threshold globals, customizable threshold controls, sensor
# calibration buttons, and a composite AQI evaluation script). The
# legacy file `!include`s `airiq_basic.yaml` and stays a pure
# sensing / display / threshold surface — it does not drive any GPIO
# output and does not toggle any fan switch.
#
# This file is a thin `!include` wrapper introduced by
# PACKAGE-NAMING-ALIASES-AIRIQ-001 as the Phase 2 follow-up to
# PACKAGE-NAMING-AUDIT-001 (PR #550) and mirrors the sibling Phase 2
# slices PACKAGE-NAMING-ALIASES-VENTIQ-001 (PR #552) and
# PACKAGE-NAMING-ALIASES-ROOMIQ-001 (PR #553). It exists so new
# product / compile-only YAMLs can `!include` the canonical
# productized `AirIQ` name instead of the legacy `airiq_advanced`
# filename, without breaking any current consumer of the legacy
# path.
#
# The `_extended` suffix is deliberately not `_advanced` or `_pro`:
# per naming-audit Rule 5 (docs/package-naming-audit.md §"Rule 5 —
# Avoid `basic`, `advanced`, and `pro` unless explicitly defined"),
# a filename containing `advanced` or `pro` must not imply a
# productized tier customer SKU unless that SKU exists in
# config/hardware-catalog.json and config/kit-intent-matrix.json,
# which is not the case today for any AirIQ extended tier.
#
# Implementation source of truth:
#   packages/features/airiq_advanced.yaml
#
# The legacy file remains the actual feature profile. Do not add
# substitutions, globals, sensors, or any other YAML blocks here —
# this file must stay a pure include wrapper per the naming-audit
# Phase 2 contract (docs/package-naming-audit.md §"Phase 2 — Add
# canonical aliases / wrapper packages").
# ============================================================================

packages:
  legacy_airiq_extended_profile: !include airiq_advanced.yaml
