# ============================================================================
# SECRETS EXAMPLE FOR SENSE360 ESPHOME
# ============================================================================
# Copy this file to secrets.yaml for local ESPHome builds:
#
#     cp secrets.example.yaml secrets.yaml
#
# secrets.yaml is gitignored. Never commit your real secrets.yaml.
# CI generates its own placeholder secrets at runtime for validation/builds.
# ============================================================================

# ----------------------------------------------------------------------------
# WIFI CREDENTIALS
# ----------------------------------------------------------------------------
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# ----------------------------------------------------------------------------
# API ENCRYPTION KEY
# ----------------------------------------------------------------------------
# This is an obviously-fake all-"a" base64 placeholder so `esphome config`
# still validates on a fresh checkout. Replace it before flashing.
# Generate a real one with one of:
#   esphome wizard
#   python3 -c 'import secrets; print(secrets.token_urlsafe(32))'
#   openssl rand -base64 32
api_encryption_key: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa="

# ----------------------------------------------------------------------------
# OTA AND FALLBACK ACCESS POINT
# ----------------------------------------------------------------------------
ota_password: "REPLACE_WITH_SECURE_OTA_PASSWORD"

# fallback_ap_password is consumed by packages/base/wifi.yaml as
# `ap: password: !secret fallback_ap_password`. The fallback AP plus
# captive_portal comes up whenever the device cannot join WiFi (first boot,
# network change, outage), so this is a real credential: anyone in RF range
# who joins the AP reaches the captive portal. Generate a UNIQUE, strong
# value PER BUILD (8-64 chars; do NOT reuse one value across units), e.g.:
#   python3 -c 'import secrets; print(secrets.token_urlsafe(18))'
#   openssl rand -base64 18
# The build rejects the historical hardcoded literals "Sense360Fallback" and
# "sense360poe" (scripts/check_fallback_ap_password.py, SEC-ESP-FALLBACK-AP-001).
fallback_ap_password: "REPLACE_WITH_SECURE_FALLBACK_PASSWORD"

# ----------------------------------------------------------------------------
# WEB SERVER AUTHENTICATION
# ----------------------------------------------------------------------------
web_username: "admin"
web_password: "REPLACE_WITH_SECURE_WEB_PASSWORD"

# ----------------------------------------------------------------------------
# MQTT CREDENTIALS (required for AirIQ / VentIQ MQTT publishing)
# ----------------------------------------------------------------------------
# The Release-One configuration (Ceiling-POE-VentIQ-RoomIQ) uses VentIQ for
# air quality; the same MQTT substitutions cover both AirIQ and VentIQ.
# 192.0.2.0/24 is TEST-NET-1 (RFC 5737); safe to ship as a documentation IP.
mqtt_broker: "192.0.2.10"
mqtt_port: "1883"
mqtt_username: "YOUR_MQTT_USERNAME"
mqtt_password: "YOUR_MQTT_PASSWORD"

# AirIQ / VentIQ MQTT substitutions (used by airiq_basic_profile.yaml and
# the bathroom/VentIQ profile). These mirror the standard MQTT vars above
# by default.
airiq_mqtt_broker: "192.0.2.10"
airiq_mqtt_port: "1883"
airiq_mqtt_username: "YOUR_MQTT_USERNAME"
airiq_mqtt_password: "YOUR_MQTT_PASSWORD"
