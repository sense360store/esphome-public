# ============================================================================
# SENSE360 CUSTOMER CONFIGURATION EXAMPLE
# ============================================================================
# Manual / custom-flash template for advanced ESPHome users.
#
# Most customers should use WebFlash at https://mysense360.com instead — it
# is the recommended production path for official, signed Sense360 firmware.
# This template is for advanced users who want to inspect or customize the
# ESPHome YAML directly.
#
# Production Release-One configuration:
#   - WebFlash config string: Ceiling-POE-VentIQ-RoomIQ
#   - Product YAML:           products/sense360-ceiling-poe-ventiq-roomiq.yaml
#   - Firmware artifact:      Sense360-Ceiling-POE-VentIQ-RoomIQ-v1.0.0-stable.bin
#
# The default option below points at this Release-One product YAML.
# Legacy-compatible Mini variants are retained as commented-out alternatives.
# They are NOT part of production Release-One firmware; uncomment one only if
# you know your hardware matches that variant.
#
# FanTRIAC is blocked pending HW-005 and must not be treated as production
# Release-One. See docs/release-one-hardware-audit.md#fantriac-mapping-resolution.
#
# Sense360 LED is excluded from Release-One because the WebFlash config
# string `Ceiling-POE-VentIQ-RoomIQ` does not carry a `LED` token.
#
# Copy this to your ESPHome dashboard and customize for your room.
#
# Filename suggestion: sense360-<room-name>.yaml
# Example: sense360-bathroom.yaml, sense360-living-room.yaml
# ============================================================================

# ----------------------------------------------------------------------------
# DEVICE IDENTIFICATION & MQTT
# ----------------------------------------------------------------------------
substitutions:
  # === REQUIRED: Customize these for your device ===
  device_name: sense360-bathroom         # Unique name (lowercase, no spaces)
  friendly_name: "Bathroom Sense360"     # Display name in Home Assistant

  # === MQTT Configuration (Required for AirIQ / VentIQ MQTT publishing) ===
  # Uncomment and configure these for air quality MQTT publishing
  # (used by both AirIQ and VentIQ air-quality features):
  # airiq_mqtt_broker: !secret mqtt_broker
  # airiq_mqtt_port: "1883"  # Standard port (use 8883 for TLS)
  # airiq_mqtt_username: !secret mqtt_username
  # airiq_mqtt_password: !secret mqtt_password

# ----------------------------------------------------------------------------
# ESPHOME CONFIGURATION
# ----------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.10.0  # Minimum ESPHome version for Release-One

# ----------------------------------------------------------------------------
# CHOOSE YOUR FIRMWARE
# ----------------------------------------------------------------------------
# The default (OPTION 0) below is the current production Release-One Ceiling
# product. Most users should keep that option and ignore the rest.
#
# The Mini variants further down (OPTIONS 1–4) are legacy-compatible
# alternatives kept for advanced users with older Mini-form-factor hardware.
# They are NOT part of production Release-One firmware. To use one, comment
# OPTION 0 and uncomment exactly ONE Mini option that matches your device.
# ----------------------------------------------------------------------------

packages:
  sense360_firmware:
    url: https://github.com/sense360store/esphome-public
    ref: v1.0.0  # Pin to a release tag — never use 'main' in production
    files:
      # ═══════════════════════════════════════════════════════════════
      # OPTION 0 (DEFAULT): Production Release-One
      # WebFlash config: Ceiling-POE-VentIQ-RoomIQ
      # ═══════════════════════════════════════════════════════════════
      # Matches WebFlash artifact:
      #   Sense360-Ceiling-POE-VentIQ-RoomIQ-v1.0.0-stable.bin
      # Hardware: Sense360 Core R4 (ceiling) + PoE PSU + VentIQ + RoomIQ.
      # FanTRIAC is intentionally excluded while HW-005 is open.
      # Sense360 LED is intentionally excluded (no LED token in config).
      # ───────────────────────────────────────────────────────────────
      - products/sense360-ceiling-poe-ventiq-roomiq.yaml

      # ───────────────────────────────────────────────────────────────
      # LEGACY-COMPATIBLE MINI OPTIONS (advanced / custom users only)
      # ───────────────────────────────────────────────────────────────
      # The Mini variants below are NOT part of production Release-One.
      # They are retained for users running the older Sense360 Mini
      # form factor. Uncomment ONE of these only if it matches your
      # hardware AND comment OPTION 0 above.

      # ═══════════════════════════════════════════════════════════════
      # OPTION 1 (legacy): Mini Air Quality — Basic
      # ═══════════════════════════════════════════════════════════════
      # Shows: Air Quality (Excellent/Good/Fair/Poor)
      #        Temperature & Humidity
      #        Simple recommendations
      # For: legacy Sense360 Mini hardware (not Release-One)
      # ───────────────────────────────────────────────────────────────
      # - products/sense360-mini-airiq-basic.yaml

      # ═══════════════════════════════════════════════════════════════
      # OPTION 2 (legacy): Mini Presence Detection — Basic
      # ═══════════════════════════════════════════════════════════════
      # Shows: Room Occupied (Yes/No)
      #        Activity Level (Still/Moving)
      # For: legacy Sense360 Mini hardware (not Release-One)
      # ───────────────────────────────────────────────────────────────
      # - products/sense360-mini-presence-basic.yaml

      # ═══════════════════════════════════════════════════════════════
      # OPTION 3 (legacy): Mini Air Quality — Advanced
      # ═══════════════════════════════════════════════════════════════
      # Shows: CO₂ (ppm), PM1.0, PM2.5, PM4.0, PM10 (µg/m³)
      #        VOC & NOx Index, Temperature, Humidity, Pressure
      #        Light Level, Customizable thresholds, Calibration
      # For: legacy Sense360 Mini hardware (not Release-One)
      # ───────────────────────────────────────────────────────────────
      # - products/sense360-mini-airiq-advanced.yaml

      # ═══════════════════════════════════════════════════════════════
      # OPTION 4 (legacy): Mini Presence Detection — Advanced
      # ═══════════════════════════════════════════════════════════════
      # Shows: Multi-zone tracking, Individual targets (up to 3)
      #        Distance measurements, Sensitivity controls
      #        Zone configuration, Full diagnostics
      # For: legacy Sense360 Mini hardware (not Release-One)
      # ───────────────────────────────────────────────────────────────
      # - products/sense360-mini-presence-advanced.yaml

    refresh: 1d  # Check for updates daily

# ----------------------------------------------------------------------------
# WIFI CONFIGURATION
# ----------------------------------------------------------------------------
# Add these values to your secrets.yaml file:
# wifi_ssid: "YourNetworkName"
# wifi_password: "YourWiFiPassword"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback access point (if WiFi fails)
  ap:
    ssid: "${device_name} Fallback"
    password: "sense360config"  # Change this if desired

# ----------------------------------------------------------------------------
# HOME ASSISTANT API
# ----------------------------------------------------------------------------
# Add this to your secrets.yaml:
# api_encryption_key: "GENERATE_WITH_ESPHOME_WIZARD"

api:
  encryption:
    key: !secret api_encryption_key

# ----------------------------------------------------------------------------
# OVER-THE-AIR UPDATES
# ----------------------------------------------------------------------------
# Add this to your secrets.yaml:
# ota_password: "your-secure-password"

ota:
  - platform: esphome
    password: !secret ota_password

# ----------------------------------------------------------------------------
# MQTT CONFIGURATION (Required for AirIQ / VentIQ Air Quality Publishing)
# ----------------------------------------------------------------------------
# If using the AirIQ or VentIQ air quality features, MQTT is required to
# publish data. (Release-One uses VentIQ; the same MQTT substitutions cover
# both air-quality modules.)
# For Home Assistant's Mosquitto add-on:
# 1. Install Mosquitto broker add-on in Home Assistant
# 2. Create a user in: Settings > Add-ons > Mosquitto broker > Configuration
# 3. Add credentials to your secrets.yaml:
#    mqtt_broker: "192.168.x.x"    # Your Home Assistant IP
#    mqtt_port: "1883"             # Default MQTT port
#    mqtt_username: "your_mqtt_user"
#    mqtt_password: "your_mqtt_password"

# To disable MQTT entirely (if not using AirIQ or VentIQ features), add:
# mqtt: null

# ----------------------------------------------------------------------------
# OPTIONAL: ADVANCED THRESHOLD CUSTOMIZATION
# ----------------------------------------------------------------------------
# Only needed if you're using an ADVANCED version and want custom thresholds.
# Uncomment and adjust any values you want to change:

# substitutions:
#   # Air Quality Thresholds (Advanced version only)
#   co2_good_limit: "800"            # Default: 750 ppm
#   co2_moderate_limit: "1000"       # Default: 950 ppm
#   co2_unhealthy_limit: "1500"      # Default: 1400 ppm
#
#   pm2_5_good_limit: "12"           # Default: 10 µg/m³
#   pm2_5_moderate_limit: "30"       # Default: 25 µg/m³
#   pm2_5_unhealthy_limit: "60"      # Default: 55 µg/m³
#
#   voc_good_limit: "100"            # Default: 80 (index)
#   voc_moderate_limit: "150"        # Default: 120 (index)
#
#   # Presence Detection Settings (Advanced version only)
#   presence_timeout: "60"           # Default: 30 seconds
#   detection_threshold: "25"        # Default: 30 percent

# ----------------------------------------------------------------------------
# OPTIONAL: CUSTOM AUTOMATIONS
# ----------------------------------------------------------------------------
# Add your custom sensors, automations, or overrides below this line.

# Example: High CO2 Alert (Advanced version only)
# binary_sensor:
#   - platform: template
#     name: "${friendly_name} High CO2 Alert"
#     lambda: |-
#       return id(co2_ppm).state > 1200;

# Example: Automatic Ventilation Control (Advanced version only)
# switch:
#   - platform: gpio
#     name: "${friendly_name} Exhaust Fan"
#     pin: GPIO25
#     on_turn_on:
#       - delay: 600s  # Run for 10 minutes
#       - switch.turn_off: exhaust_fan

# Example: Occupancy-Based Lighting (Basic version works)
# light:
#   - platform: binary
#     name: "${friendly_name} Auto Light"
#     output: light_output
#     on_turn_on:
#       - if:
#           condition:
#             binary_sensor.is_on: room_occupied
#           then:
#             - light.turn_on: auto_light

# ============================================================================
# QUICK START GUIDE
# ============================================================================
#
# STEP 1: Confirm which firmware option you need
# ────────────────────────────────────────────────
# - Default (OPTION 0): Production Release-One — Ceiling-POE-VentIQ-RoomIQ.
#   Use this unless you specifically have legacy Mini hardware.
# - OPTIONS 1–4: legacy-compatible Mini variants. Uncomment ONE only if
#   your hardware matches; comment OPTION 0 in that case.
#
# STEP 2: Update device name
# ────────────────────────────
# Change 'device_name' and 'friendly_name' to match your room.
#
# STEP 3: Add secrets
# ────────────────────────────
# Copy secrets.example.yaml to secrets.yaml and edit it:
#   cp secrets.example.yaml secrets.yaml
# Required entries:
#   wifi_ssid: "YourNetwork"
#   wifi_password: "YourPassword"
#   api_encryption_key: "GENERATE_THIS_WITH_ESPHOME"
#   ota_password: "your-password"
#
# STEP 4: Upload to device
# ────────────────────────────
# Connect via USB and upload using the ESPHome dashboard.
#
