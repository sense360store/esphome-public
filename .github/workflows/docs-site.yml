# ============================================================================
# DOCS: PRODUCT GUIDES SITE (PRODUCT-GUIDES-001 G1)
# ============================================================================
# Builds the customer product-guides site (site/, mkdocs-material) and
# deploys it to GitHub Pages on pushes to main. On pull requests that touch
# the site, the derivation script, or the firmware YAML it derives from,
# the validate job runs WITHOUT deploying.
#
# Two gates run before any deploy:
#   1. Entity-table freshness — site/generated/*.md must byte-match what
#      scripts/generate_product_entity_tables.py derives from the firmware
#      YAML composition, so the published tables can never drift from the
#      firmware source.
#   2. mkdocs build --strict — broken nav entries, missing pages, or
#      missing snippet includes fail the build.
#
# Scope guards (PRODUCT-GUIDES-001): this workflow is docs-only. It builds
# no firmware, publishes no release artifact, and touches no release
# surface. Pages deployment requires the repo Pages source to be set to
# "GitHub Actions" (Settings -> Pages), a one-time owner action.
# ============================================================================

name: "Docs: Product Guides Site"

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "site/**"
      - "scripts/generate_product_entity_tables.py"
      - "packages/**"
      - "products/**"
      - "config/webflash-builds.json"
      - ".github/workflows/docs-site.yml"

# Least-privilege default; the deploy job elevates only itself.
permissions:
  contents: read

# One Pages deployment at a time; never cancel an in-flight deploy.
concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Entity-table freshness + strict mkdocs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install docs-site dependencies (pinned)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r site/requirements.txt pyyaml

      - name: Entity-table freshness check
        run: python3 scripts/generate_product_entity_tables.py --check

      - name: Build site (strict)
        run: python3 -m mkdocs build --strict -f site/mkdocs.yml

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/.site-build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
