---
# ============================================================================
# PREVIEW FAN FIRMWARE PUBLISH WORKFLOW (merged)
# ============================================================================
# Merges the two structurally identical fan-publish workflows into one with a
# `fan_set` selector (see the CI/CD workflow audit section 3.1 "Merge the two
# fan-publish workflows"):
#
#   - single-driver set (RELEASE-PREVIEW-FAN-PUBLISH-WORKFLOW-001, formerly
#     manual-preview-fan-publish.yml): the three buildable single-driver
#     manual-preview fan rows from config/preview-fan-triac-build-rows.json,
#     compile run 26821900127:
#       - Ceiling-POE-VentIQ-FanRelay-RoomIQ
#       - Ceiling-POE-FanPWM
#       - Ceiling-POE-FanDAC
#   - room-bundle set (ROOM-BUNDLE-FAN-PUBLISH-WORKFLOW-001, formerly
#     room-bundle-fan-publish.yml): the five full-composition room-bundle
#     fan-control configs from config/room-bundle-fan-variants.json +
#     config/compile-only-targets.json, compile run 26913592989:
#       - Ceiling-POE-VentIQ-FanPWM-RoomIQ
#       - Ceiling-POE-VentIQ-FanDAC-RoomIQ
#       - Ceiling-POE-AirIQ-FanRelay-RoomIQ
#       - Ceiling-POE-AirIQ-FanDAC-RoomIQ
#       - Ceiling-POE-AirIQ-FanPWM-RoomIQ
#
# `fan_set` selects which existing matrix-generation script(s) to call:
# single-driver -> scripts/validate_manual_preview_fan_publish.py,
# room-bundle -> scripts/validate_room_bundle_fan_publish.py, all -> the union.
# The scripts are reused UNCHANGED; the workflow only annotates each matrix row
# with its `fan_set` and per-set `compile_run` provenance (single-driver cites
# 26821900127, room-bundle cites 26913592989) so the published release body and
# build-info manifest keep the same citation they have today.
#
# It deliberately does NOT read config/webflash-builds.json as a release matrix,
# does NOT add fan rows to the WebFlash build ledger, and does NOT touch
# firmware/sources.json or repo-root manifest.json. The artifacts are published
# to the shared v1.0.0-preview preview release (RELEASE-PREVIEW-FAN-SHARED-TAG-001)
# — the single preview release for every preview artifact (room-bundle + LED +
# fan). WebFlash import eligibility is controlled separately by WebFlash import
# policy, so attaching an artifact here does NOT imply WebFlash one-click import,
# Simple-install exposure, stable status, recommendation, default selection, or
# commercial availability.
#
# TRIAC (Ceiling-POE-VentIQ-FanTRIAC-RoomIQ) is excluded from both sets (HW-005;
# its advanced-manual-preview publish stays gated by COMPLIANCE-001 mains-voltage
# review and is delivered separately). The two FanDAC artifacts carry the GP8403
# IC2 0x5A address override requirement + the pending FANDAC-I2C-ADDR-001 bench
# verification in the release body; no FanDAC hardware verification is claimed.
# Nothing here is stable / recommended / default / buyable.
#
# RELEASE-PREVIEW-FAN-PUBLISH-TAG-GUARD-001 (tag confirm-gate): the shared
# v1.0.0-preview release is the frictionless default. The "Guard release tag"
# step fails fast — before any build — if a dispatch targets any OTHER tag
# without confirm_tag_override=true, so an accidental wrong tag (a typo, the
# stable release, or a stray new release) cannot create / overwrite the wrong
# release. This does not reintroduce a dedicated fan tag.
# ============================================================================

name: "Publish: Fan Firmware (preview)"

on:
  workflow_dispatch:
    inputs:
      fan_set:
        description: >-
          Which fan set to publish: single-driver (3 single-driver rows,
          compile run 26821900127), room-bundle (5 full-composition rows,
          compile run 26913592989), or all (the union).
        required: true
        default: "all"
        type: choice
        options:
          - single-driver
          - room-bundle
          - all
      version:
        description: "Preview fan firmware version"
        required: true
        default: "1.0.0"
      release_tag:
        description: "Shared preview release tag for all preview artifacts (room + LED + fan)"
        required: true
        default: "v1.0.0-preview"
      confirm_tag_override:
        description: >-
          Confirm a non-shared release tag. The default is the shared
          v1.0.0-preview preview release; set this to true only to deliberately
          publish to a different tag (guards against an accidental wrong tag).
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Dry-run only (default true; validates scope and release body, publishes nothing)"
        required: true
        default: true
        type: boolean

concurrency:
  group: preview-fan-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  ESPHOME_VERSION: "2026.4.5"

jobs:
  generate-matrix:
    name: Preview fan matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      target_count: ${{ steps.matrix.outputs.target_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Guard release tag (confirm a non-shared release tag)
        # RELEASE-PREVIEW-FAN-PUBLISH-TAG-GUARD-001: the shared v1.0.0-preview
        # release is the frictionless default; any other tag must be confirmed,
        # so an accidental dispatch to the wrong tag fails fast before any build.
        # Both fan-set scripts enforce the same guard; run it for each active set.
        env:
          FAN_SET: ${{ inputs.fan_set }}
        run: |
          set -euo pipefail
          guard() {
            python3 "$1" --validate-release-tag \
              --release-tag "${{ inputs.release_tag }}" \
              --confirm-tag-override "${{ inputs.confirm_tag_override }}"
          }
          case "$FAN_SET" in
            single-driver) guard scripts/validate_manual_preview_fan_publish.py ;;
            room-bundle) guard scripts/validate_room_bundle_fan_publish.py ;;
            all)
              guard scripts/validate_manual_preview_fan_publish.py
              guard scripts/validate_room_bundle_fan_publish.py
              ;;
          esac

      - name: Validate preview fan metadata
        env:
          FAN_SET: ${{ inputs.fan_set }}
        run: |
          set -euo pipefail
          meta() {
            python3 "$1" --metadata-only \
              --version "${{ inputs.version }}" \
              --release-tag "${{ inputs.release_tag }}" \
              --confirm-tag-override "${{ inputs.confirm_tag_override }}"
          }
          case "$FAN_SET" in
            single-driver) meta scripts/validate_manual_preview_fan_publish.py ;;
            room-bundle) meta scripts/validate_room_bundle_fan_publish.py ;;
            all)
              meta scripts/validate_manual_preview_fan_publish.py
              meta scripts/validate_room_bundle_fan_publish.py
              ;;
          esac

      - name: Generate preview fan matrix
        id: matrix
        env:
          FAN_SET: ${{ inputs.fan_set }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Reuse the existing matrix-generation scripts UNCHANGED and select
          # which to call by fan_set; annotate each row with its fan_set and
          # per-set compile_run provenance (single-driver 26821900127,
          # room-bundle 26913592989). all is the union (single-driver first).
          python3 - "$FAN_SET" "$VERSION" > matrix.json <<'PY'
          import json
          import subprocess
          import sys

          fan_set, version = sys.argv[1], sys.argv[2]
          SETS = {
              "single-driver": (
                  "scripts/validate_manual_preview_fan_publish.py",
                  "26821900127",
                  "candidate_id",
              ),
              "room-bundle": (
                  "scripts/validate_room_bundle_fan_publish.py",
                  "26913592989",
                  "target_id",
              ),
          }
          order = {
              "single-driver": ["single-driver"],
              "room-bundle": ["room-bundle"],
              "all": ["single-driver", "room-bundle"],
          }[fan_set]
          include = []
          for name in order:
              script, compile_run, id_key = SETS[name]
              out = subprocess.run(
                  ["python3", script, "--print-matrix", "--version", version],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
              for row in json.loads(out)["include"]:
                  row["fan_set"] = name
                  row["compile_run"] = compile_run
                  row["artifact_id"] = row[id_key]
                  include.append(row)
          print(json.dumps({"include": include}, separators=(",", ":")))
          PY
          MATRIX="$(cat matrix.json)"
          COUNT="$(python3 -c 'import json; print(len(json.load(open("matrix.json"))["include"]))')"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "target_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Preview fan publish matrix (fan_set=$FAN_SET, $COUNT target(s)):"
          cat matrix.json

  dry-run:
    name: Preview fan publish dry-run
    needs: generate-matrix
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Build and validate release body (per active set)
        env:
          FAN_SET: ${{ inputs.fan_set }}
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm_tag_override }}
        run: |
          set -euo pipefail
          # Each script generates its own release body, keeping its own compile-run
          # citation (single-driver 26821900127, room-bundle 26913592989), and each
          # body is validated against the WebFlash preview release-notes contract.
          body() {
            python3 "$1" --release-body \
              --version "$VERSION" \
              --release-tag "$RELEASE_TAG" \
              --confirm-tag-override "$CONFIRM" > "$2"
            python3 scripts/validate-webflash-release-notes.py "$2" --channel preview
          }
          case "$FAN_SET" in
            single-driver)
              body scripts/validate_manual_preview_fan_publish.py release-notes-single-driver.md
              ;;
            room-bundle)
              body scripts/validate_room_bundle_fan_publish.py release-notes-room-bundle.md
              ;;
            all)
              body scripts/validate_manual_preview_fan_publish.py release-notes-single-driver.md
              body scripts/validate_room_bundle_fan_publish.py release-notes-room-bundle.md
              ;;
          esac

      - name: Confirm dry-run side effects are absent
        run: |
          set -euo pipefail
          fail=0
          if [ -f firmware/sources.json ]; then
            echo "::error::dry-run produced firmware/sources.json"; fail=1
          fi
          if [ -f manifest.json ]; then
            echo "::error::dry-run produced repo-root manifest.json"; fail=1
          fi
          if ls ./*.bin >/dev/null 2>&1; then
            echo "::error::dry-run produced repo-root .bin artifact(s)"; fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Dry-run complete: fan_set=${{ inputs.fan_set }}"
          echo "Targets in scope: ${{ needs.generate-matrix.outputs.target_count }}"
          echo "No firmware was built, no Release/tag was created, and no WebFlash state changed."

  build:
    name: "Build preview fan: ${{ matrix.config_string }}"
    needs: generate-matrix
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up ESPHome build environment
        uses: ./.github/actions/setup-esphome-build
        with:
          # ESPHOME_VERSION is sourced from the workflow env so the value baked
          # into the build-info manifest stays the single pinned version. Both
          # original fan workflows patched external_components to the local
          # components/ tree and provisioned only the repo-root + products/
          # test secrets (the composite defaults).
          esphome-version: ${{ env.ESPHOME_VERSION }}
          patch-external-components: "true"

      - name: Compile preview fan firmware
        run: |
          set -euo pipefail
          echo "Compiling ${{ matrix.product_yaml }}"
          esphome config "${{ matrix.product_yaml }}"
          OUTPUT_DIR="preview-fan-firmware"
          OUTPUT_FILE="$OUTPUT_DIR/${{ matrix.artifact_name }}"
          mkdir -p "$OUTPUT_DIR"
          if esphome compile --help 2>&1 | grep -q -- '--output-file'; then
            esphome compile "${{ matrix.product_yaml }}" --output-file "$OUTPUT_FILE"
          else
            esphome compile "${{ matrix.product_yaml }}"
          fi

      - name: Locate compiled binary
        id: bin
        run: |
          set -euo pipefail
          OUTPUT_FILE="preview-fan-firmware/${{ matrix.artifact_name }}"
          if [ ! -f "$OUTPUT_FILE" ]; then
            FOUND="$(find . -path '*/.esphome/build/*' -name 'firmware*.bin' -type f 2>/dev/null | head -1 || true)"
            if [ -z "$FOUND" ]; then
              echo "ERROR: no compiled firmware binary found"
              exit 1
            fi
            mkdir -p preview-fan-firmware
            cp "$FOUND" "$OUTPUT_FILE"
          fi
          SIZE="$(stat -c%s "$OUTPUT_FILE")"
          if [ "$SIZE" -lt 102400 ]; then
            echo "ERROR: compiled binary is suspiciously small: $SIZE bytes"
            exit 1
          fi
          echo "Compiled preview fan binary: $OUTPUT_FILE ($SIZE bytes)"
          echo "path=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload preview fan firmware artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Set-prefixed so the publish job can download each set into its own
          # directory and validate it with the matching script.
          name: preview-fan-firmware-${{ matrix.fan_set }}-${{ matrix.artifact_id }}
          path: ${{ steps.bin.outputs.path }}
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Attach preview fan release assets
    needs: [generate-matrix, build]
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Download single-driver fan artifacts
        if: inputs.fan_set == 'single-driver' || inputs.fan_set == 'all'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: preview-fan-firmware-single-driver-*
          path: firmware/single-driver
          merge-multiple: true

      - name: Validate single-driver output and build release notes
        if: inputs.fan_set == 'single-driver' || inputs.fan_set == 'all'
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm_tag_override }}
        run: |
          set -euo pipefail
          python3 scripts/validate_manual_preview_fan_publish.py \
            --validate-output-dir firmware/single-driver \
            --version "$VERSION"
          mkdir -p notes
          python3 scripts/validate_manual_preview_fan_publish.py \
            --release-body \
            --version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --confirm-tag-override "$CONFIRM" > notes/single-driver.md
          python3 scripts/validate-webflash-release-notes.py notes/single-driver.md --channel preview

      - name: Download room-bundle fan artifacts
        if: inputs.fan_set == 'room-bundle' || inputs.fan_set == 'all'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: preview-fan-firmware-room-bundle-*
          path: firmware/room-bundle
          merge-multiple: true

      - name: Validate room-bundle output and build release notes
        if: inputs.fan_set == 'room-bundle' || inputs.fan_set == 'all'
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm_tag_override }}
        run: |
          set -euo pipefail
          python3 scripts/validate_room_bundle_fan_publish.py \
            --validate-output-dir firmware/room-bundle \
            --version "$VERSION"
          mkdir -p notes
          python3 scripts/validate_room_bundle_fan_publish.py \
            --release-body \
            --version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --confirm-tag-override "$CONFIRM" > notes/room-bundle.md
          python3 scripts/validate-webflash-release-notes.py notes/room-bundle.md --channel preview

      - name: Assemble combined release assets
        env:
          VERSION: ${{ inputs.version }}
          FAN_SET: ${{ inputs.fan_set }}
          GIT_SHA: ${{ github.sha }}
          ESPHOME_VERSION: ${{ env.ESPHOME_VERSION }}
          TARGET_COUNT: ${{ needs.generate-matrix.outputs.target_count }}
          MATRIX: ${{ needs.generate-matrix.outputs.matrix }}
        run: |
          set -euo pipefail
          mkdir -p all-firmware
          # Gather every built .bin from the per-set download directories.
          find firmware -name '*.bin' -exec cp {} all-firmware/ \;

          # Combined release notes: concatenate the per-set bodies that exist, so
          # both compile-run citations (26821900127 single-driver, 26913592989
          # room-bundle) survive into the shared preview release body.
          : > all-firmware/release-notes.md
          for note in notes/single-driver.md notes/room-bundle.md; do
            if [ -f "$note" ]; then
              cat "$note" >> all-firmware/release-notes.md
              printf '\n' >> all-firmware/release-notes.md
            fi
          done

          cd all-firmware
          {
            echo "# SHA256 Checksums"
            echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Version: $VERSION"
            echo "# Channel: preview"
            echo "# Delivery lane: manual-preview (fan_set=$FAN_SET)"
            echo "# Compile evidence (firmware-build proof only):"
            echo "#   single-driver fans: run 26821900127"
            echo "#   room-bundle fans: run 26913592989"
            echo ""
          } > checksums-sha256.txt
          sha256sum ./*.bin >> checksums-sha256.txt

          {
            echo "# MD5 Checksums"
            echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
          } > checksums-md5.txt
          md5sum ./*.bin >> checksums-md5.txt

          # build-info manifest with per-file compile_run sourced from the matrix.
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import os

          matrix = json.loads(os.environ["MATRIX"])["include"]
          run_by_artifact = {row["artifact_name"]: row["compile_run"] for row in matrix}
          files = []
          for name in sorted(n for n in os.listdir(".") if n.endswith(".bin")):
              data = open(name, "rb").read()
              files.append(
                  {
                      "name": name,
                      "sha256": hashlib.sha256(data).hexdigest(),
                      "size": len(data),
                      "compile_run": run_by_artifact.get(name),
                  }
              )
          manifest = {
              "version": os.environ["VERSION"],
              "channel": "preview",
              "delivery_lane": "manual-preview",
              "fan_set": os.environ["FAN_SET"],
              "build_date": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "git_sha": os.environ["GIT_SHA"],
              "esphome_version": os.environ["ESPHOME_VERSION"],
              "target_count": int(os.environ["TARGET_COUNT"]),
              "webflash_importable": False,
              "files": files,
          }
          with open("manifest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2)
          PY

      # Publishes to the shared v1.0.0-preview preview release. softprops/action-
      # gh-release upserts the release, so the name / body / checksums are a
      # metadata refresh, not a release error; preview .bin assets already
      # attached (room-bundle / LED / fan) keep their SHA256 intact. This
      # workflow attaches assets only — it does NOT create a new release / tag.
      - name: Upload preview fan release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Sense360 preview fan firmware ${{ inputs.version }}
          body_path: all-firmware/release-notes.md
          prerelease: true
          draft: false
          files: |
            all-firmware/*.bin
            all-firmware/checksums-sha256.txt
            all-firmware/checksums-md5.txt
            all-firmware/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

      - name: Publish summary
        run: |
          echo "Preview fan release complete."
          echo "Fan set: ${{ inputs.fan_set }}"
          echo "Tag: ${{ inputs.release_tag }}"
          echo "Version: ${{ inputs.version }}"
          echo "Targets: ${{ needs.generate-matrix.outputs.target_count }}"
          echo "No WebFlash build rows, firmware/sources.json, or repo manifest were written."
