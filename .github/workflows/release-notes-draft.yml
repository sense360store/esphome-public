---
# ============================================================================
# DRAFT WEBFLASH RELEASE NOTES (RELEASE-002)
# ============================================================================
# Manual operator helper: produces a WebFlash release-notes draft from the
# product catalog, validates it against the WebFlash release-body contract,
# and uploads the result as a workflow artifact.
#
# This workflow is preflight only. It does NOT:
#   - create a GitHub Release
#   - publish or compile firmware
#   - upload any release asset
#   - infer changelog content from git history
#   - commit the generated release-notes.md anywhere
#   - modify the firmware-build-release workflow's gates
#
# Publication of the actual GitHub Release body is still gated separately
# by scripts/validate-webflash-release-notes.py inside
# .github/workflows/firmware-build-release.yml at release.published time.
# That gate is unchanged by this workflow.
#
# Human review of the ## Changelog section remains required: when the
# `changelog` input is omitted, the draft contains a TODO placeholder that
# the release author must replace before tagging.
# ============================================================================

name: "Release 2: Draft Notes"

on:
  workflow_dispatch:
    inputs:
      # RELEASE-PRODUCT-SELECTION-001: operator-facing release-target picker.
      # The choices mirror the release-eligible entries in
      # config/webflash-builds.json so the operator never has to type a
      # free-text product name and the workflow cannot silently default to
      # only the stable RoomIQ. When a new release-eligible build is added
      # to config/webflash-builds.json, add a matching option here so the
      # picker stays in lock-step with the release matrix; the contract
      # test tests/test_release_product_selection.py enforces that lock-step.
      config_string:
        description: >-
          Release target. Must match a config_string in
          config/webflash-builds.json. Listed via
          `python3 scripts/list_release_targets.py`.
        required: true
        type: choice
        options:
          - Ceiling-POE-VentIQ-RoomIQ
          - Ceiling-POE-VentIQ-RoomIQ-LED
          - Ceiling-POE-AirIQ-RoomIQ
          - Ceiling-POE-RoomIQ
          - Ceiling-POE-RoomIQ-LED
      version:
        description: >-
          Release version, no leading 'v' (e.g. 1.0.0). Must match the
          catalog entry's declared version.
        required: true
        default: 1.0.0
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - preview
      changelog:
        description: >-
          Optional changelog text. One bullet per line; leading -/*/+ is
          stripped. If omitted, the draft contains a TODO placeholder that
          the release author must replace before publishing.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  draft:
    name: Draft release notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Generate release-notes draft
        env:
          CONFIG_STRING: ${{ inputs.config_string }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail

          # Inputs are passed via env to keep them out of the shell command
          # line. --require-changelog is intentionally NOT passed: when the
          # operator leaves the changelog input blank, the generator emits a
          # TODO placeholder that survives structural validation and signals
          # to the release author that the section still needs human review.
          ARGS=(
            --config-string "$CONFIG_STRING"
            --version "$VERSION"
            --channel "$CHANNEL"
            --output release-notes.md
          )
          if [ -n "${CHANGELOG:-}" ]; then
            ARGS+=( --changelog "$CHANGELOG" )
          fi

          python3 scripts/generate_webflash_release_notes.py "${ARGS[@]}"

          echo "----- generated release-notes.md -----"
          cat release-notes.md
          echo "--------------------------------------"

      - name: Validate release-notes draft
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          python3 scripts/validate-webflash-release-notes.py \
            release-notes.md --channel "$CHANNEL"

      - name: Upload release-notes artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: >-
            release-notes-${{ inputs.config_string }}-v${{ inputs.version }}-${{ inputs.channel }}
          path: release-notes.md
          if-no-files-found: error
          retention-days: 14
