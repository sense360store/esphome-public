---
# ============================================================================
# QUICK VALIDATION (Pre-flight Check)
# ============================================================================
# Ultra-fast syntax validation that runs on every pull_request (and on pushes
# to main). Provides immediate feedback (~30 seconds) before the full CI suite
# runs.
#
# This catches:
#   - YAML syntax errors
#   - Missing required keys (substitutions, esphome)
#   - Invalid package references
#
# For broad legacy/manual ESPHome compilation sweeps, run the manual
# workflow ci-validate-configs.yml (workflow_dispatch only).
# ============================================================================

name: "CI: Quick Validation"

on:
  # CI-PIPELINE-CLARITY-001 P6 (audit finding F — redundant CI): scope the push
  # trigger to `main` only. This gate still runs on every `pull_request`
  # (`synchronize` fires on each new commit to a PR branch, for PRs into any
  # target branch), so PR gating is UNCHANGED. Narrowing push removes the
  # duplicate run that previously fired on both the branch push AND the
  # pull_request for every commit on a branch with an open PR, while still
  # validating `main` after merge. Matches the `push: [main]` pattern already
  # used by docs-site.yml.
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

# SECURITY-AUDIT-FIX-001: least-privilege token scope. This workflow only
# reads the repo and runs validation scripts; it never writes contents,
# issues, PRs, or any other resource, so it is pinned to read-only.
permissions:
  contents: read

jobs:
  quick-validate:
    name: YAML Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          pip install pyyaml

      - name: Run validation script
        run: |
          python3 tests/validate_configs.py

      - name: Preflight product substitutions (fallback SSID length, AP password, device_name)
        run: |
          python3 tests/test_product_substitutions.py

      - name: Presence framework contract (PRESENCE-FRAMEWORK-001)
        run: |
          python3 tests/test_presence_framework.py

      - name: LED framework contract (LED-FRAMEWORK-001)
        run: |
          python3 tests/test_led_framework.py

      - name: RoomIQ framework contract (ROOMIQ-FRAMEWORK-001)
        run: |
          python3 tests/test_roomiq_framework.py

      - name: AirIQ framework contract (AIRIQ-FRAMEWORK-001)
        run: |
          python3 tests/test_airiq_framework.py

      - name: Reject known fallback-AP password literals (SEC-ESP-FALLBACK-AP-001)
        run: |
          python3 scripts/check_fallback_ap_password.py

      # DEV-HARNESS-001: dev/ is the bench-only development harness
      # (docs/DEV_WORKFLOW.md). The guard fails the PR if (a) the committed
      # scratch overlay dev/dev-overlay.yaml contains anything other than
      # comments and blank lines — promote overlay content into a package
      # layer before merge — or (b) any config/*.json build/release
      # declaration references a path under dev/. Every build, compile, and
      # release matrix is declaration-driven from config/*.json (ESP-007) or
      # enumerates products/ only, so this pins the guarantee that nothing
      # under dev/ is ever built or released.
      - name: Dev harness guard (DEV-HARNESS-001)
        run: |
          python3 scripts/check_dev_harness_guard.py

      - name: Dev harness guard unit tests (DEV-HARNESS-001)
        run: |
          python3 tests/test_check_dev_harness_guard.py

      # SEC-ESP-BUILD-GATES-001 (SECURITY-AUDIT-2026-06 H1/H2): the release
      # pipeline refuses to publish a binary carrying a default / placeholder /
      # burned credential, and release builds strip the shared compile-time
      # credentials from packages/base/. These two test files pin the gate's
      # denylist behaviour and prove the posture patch still applies cleanly
      # to the live committed packages/base/ shapes on every PR — a reshape
      # that would make the release lane fail closed is caught here first.
      - name: Default-credential firmware gate unit tests (SEC-ESP-BUILD-GATES-001)
        run: |
          python3 tests/test_check_firmware_default_credentials.py

      - name: Release credential-posture patch unit tests (SEC-ESP-BUILD-GATES-001)
        run: |
          python3 tests/test_apply_release_secret_posture.py

      - name: Preflight Release-One profile entity-name collisions
        run: |
          python3 tests/test_release_one_entity_names.py

      - name: Validate WebFlash build matrix
        run: |
          python3 tests/validate_webflash_builds.py

      - name: Test WebFlash release-notes validator
        run: |
          python3 tests/test_validate_webflash_release_notes.py

      - name: Test WebFlash release-notes generator
        run: |
          python3 tests/test_generate_webflash_release_notes.py

      - name: Smoke-check release-notes draft workflow
        run: |
          python3 tests/test_release_notes_draft_workflow.py

      - name: Test Draft Notes version-declared preflight (decide logic)
        run: |
          python3 tests/test_check_pending_version_bump.py

      - name: Verify WebFlash artifact naming (mapper agrees with builds JSON)
        run: |
          python3 tests/test_webflash_artifact_naming.py

      - name: Validate product catalog
        run: |
          python3 tests/test_product_catalog.py

      - name: Validate product catalog cross-file consistency
        run: |
          python3 scripts/validate_product_catalog_consistency.py

      - name: Product catalog consistency unit tests
        run: |
          python3 tests/test_product_catalog_consistency.py

      - name: Catalog release-artifact guard unit tests
        run: |
          python3 tests/test_check_catalog_release_artifacts.py

      # The phantom-version guard (scripts/check-catalog-release-artifacts.py)
      # used to run here as a hard per-push/PR step. It was moved to the
      # scheduled workflow .github/workflows/scheduled-catalog-artifact-guard.yml
      # because a legitimate promotion sets the catalog to the new stable version
      # BEFORE the release that produces that asset is cut, so a per-PR hard check
      # cannot tell a pending release from a real phantom and would red-flag or
      # block every promote PR until the release lands. The release-time asset
      # check (scripts/check-webflash-release-assets.py in firmware-build-release
      # .yml) still fails closed at build time; the scheduled run catches a
      # phantom that LINGERS in the catalog (the LED 1.0.3 case) out of band. Do
      # not re-add this as a per-PR/per-push hard step. The unit tests above keep
      # the guard's detection logic covered on every PR.

      # FW-MATRIX-001 / FW-MATRIX-002 freshness. Both files are generated:
      # a catalog / build-matrix edit (e.g. a version bump or a promote-to-
      # stable PR) that does not regenerate them leaves the repo internally
      # inconsistent. The Kitchen (v1.0.6) and Bedroom (v1.0.5) promotions
      # both merged with a stale matrix because this gate was missing.
      - name: Firmware combination matrix freshness (FW-MATRIX-001)
        run: |
          python3 scripts/generate_firmware_matrix.py --check

      - name: Firmware build-gap report freshness (FW-MATRIX-002)
        run: |
          python3 scripts/report_firmware_build_gaps.py --check

      # The preview/stable release-target manifest must track the live build
      # ledger (channel + artifact per target). The Kitchen / Bedroom stable
      # promotions left it stale, which broke the manual Preview Compile
      # Dry-Run workflow's preflight; gating it here keeps catalog edits and
      # the manifest in lock-step.
      - name: Release-target manifest consistency (preview-release-targets)
        run: |
          python3 scripts/validate_preview_release_targets.py --metadata-only

      - name: Bump-release-version unit tests
        run: |
          python3 tests/test_bump_release_version.py

      - name: Plan-release unit tests
        run: |
          python3 tests/test_plan_release.py

      - name: Count products
        run: |
          PRODUCT_COUNT=$(find products/ -name "*.yaml" -type f ! -name "secrets.yaml" | wc -l)
          PACKAGE_COUNT=$(find packages/ -name "*.yaml" -type f | wc -l)
          echo "Products: $PRODUCT_COUNT"
          echo "Packages: $PACKAGE_COUNT"
          echo ""
          echo "For a broad legacy/manual ESPHome compilation sweep, manually dispatch the 'CI - Validate Firmware Configs' workflow"
