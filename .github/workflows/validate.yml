---
# ============================================================================
# QUICK VALIDATION (Pre-flight Check)
# ============================================================================
# Ultra-fast syntax validation that runs on every push/PR
# Provides immediate feedback (~30 seconds) before the full CI suite runs.
#
# This catches:
#   - YAML syntax errors
#   - Missing required keys (substitutions, esphome)
#   - Invalid package references
#
# For broad legacy/manual ESPHome compilation sweeps, run the manual
# workflow ci-validate-configs.yml (workflow_dispatch only).
# ============================================================================

name: Quick Validation

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# SECURITY-AUDIT-FIX-001: least-privilege token scope. This workflow only
# reads the repo and runs validation scripts; it never writes contents,
# issues, PRs, or any other resource, so it is pinned to read-only.
permissions:
  contents: read

jobs:
  quick-validate:
    name: YAML Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          pip install pyyaml

      - name: Run validation script
        run: |
          python3 tests/validate_configs.py

      - name: Preflight product substitutions (fallback SSID length, AP password, device_name)
        run: |
          python3 tests/test_product_substitutions.py

      - name: Preflight Release-One profile entity-name collisions
        run: |
          python3 tests/test_release_one_entity_names.py

      - name: Validate WebFlash build matrix
        run: |
          python3 tests/validate_webflash_builds.py

      - name: Test WebFlash release-notes validator
        run: |
          python3 tests/test_validate_webflash_release_notes.py

      - name: Test WebFlash release-notes generator
        run: |
          python3 tests/test_generate_webflash_release_notes.py

      - name: Smoke-check release-notes draft workflow
        run: |
          python3 tests/test_release_notes_draft_workflow.py

      - name: Verify WebFlash artifact naming (mapper agrees with builds JSON)
        run: |
          python3 tests/test_webflash_artifact_naming.py

      - name: Validate product catalog
        run: |
          python3 tests/test_product_catalog.py

      - name: Validate product catalog cross-file consistency
        run: |
          python3 scripts/validate_product_catalog_consistency.py

      - name: Product catalog consistency unit tests
        run: |
          python3 tests/test_product_catalog_consistency.py

      - name: Count products
        run: |
          PRODUCT_COUNT=$(find products/ -name "*.yaml" -type f ! -name "secrets.yaml" | wc -l)
          PACKAGE_COUNT=$(find packages/ -name "*.yaml" -type f | wc -l)
          echo "Products: $PRODUCT_COUNT"
          echo "Packages: $PACKAGE_COUNT"
          echo ""
          echo "For a broad legacy/manual ESPHome compilation sweep, manually dispatch the 'CI - Validate Firmware Configs' workflow"
