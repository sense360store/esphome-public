---
# ============================================================================
# CI - VALIDATE FIRMWARE CONFIGURATIONS (MANUAL BROAD/LEGACY SWEEP)
# ============================================================================
# This workflow is a MANUAL broad/legacy compatibility sweep across every
# product YAML in the repo (excluding the WebFlash wrappers in
# products/webflash/, which are not standalone configs).
#
# It is NOT the normal PR gate. The Release-One / WebFlash blocking checks
# live in:
#   - .github/workflows/validate.yml
#   - .github/workflows/firmware-build-release.yml
# along with the test scripts they invoke (validate_configs.py,
# validate_webflash_builds.py, test_webflash_compatibility.py,
# test_webflash_artifact_naming.py, test_product_substitutions.py,
# test_release_one_entity_names.py, test_validate_webflash_release_notes.py).
#
# Purpose (manual use):
#   - Spot-check that historical / manual / reference product configurations
#     still validate against the current ESPHome version.
#   - Validate YAML syntax across products and packages.
#   - Lint C++ headers.
#
# Test Modes (scope the product sweep in test-all-products):
#   - quick (default): the maintained Ceiling-POE shipping set ONLY — the
#     canonical product YAML for each config_string declared in
#     config/webflash-builds.json. Fast, focused, and the set this repo
#     actually ships.
#   - full:  the broad legacy/manual deep check (opt-in) — every product YAML
#     in the repo (legacy / manual / reference configs; webflash wrappers
#     excluded). This is where legacy boards outside the shipping set are
#     exercised.
#
# Failures here indicate legacy/manual compatibility issues. They do NOT
# block normal PRs and do NOT indicate a Release-One/WebFlash regression
# unless the same failure also surfaces in validate.yml or the release
# workflow.
#
# external_components: the ESPHome lane below patches the shared base include
# (packages/base/external_components.yaml) to the locally checked-out
# components/ tree via the setup-esphome-build action. Cloning this repo
# through the git source is unnecessary inside the checked-out repo and fails
# non-interactively when the rewritten ref is not fetchable on GitHub, which
# is what made this manual sweep fail across the matrix.
# ============================================================================

name: "CI: Validate Configs"

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Product sweep scope: quick (maintained shipping set), full (every product YAML)'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

# SECURITY-AUDIT-FIX-001: least-privilege token scope. This manual
# broad/legacy sweep only reads the repo and runs validation / esphome
# config / lint; it never writes contents or any other resource, so the
# token is pinned to read-only.
permissions:
  contents: read

jobs:
  # ============================================================================
  # JOB 1: YAML VALIDATION
  # ============================================================================
  # Fast syntax check for all YAML files - catches obvious errors early
  # ============================================================================
  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml yamllint

      - name: Validate YAML syntax with validation script
        run: |
          python3 tests/validate_configs.py

      - name: Run yamllint
        run: |
          yamllint -c .yamllint products/ packages/

  # ============================================================================
  # JOB 2: DISCOVER PRODUCTS (mode-aware)
  # ============================================================================
  # quick (default): the maintained Ceiling-POE shipping set — the canonical
  #   product YAML for each config_string in config/webflash-builds.json. This
  #   is drift-free: a new shipping build appears here automatically.
  # full: the broad legacy/manual sweep — every product YAML in the repo,
  #   excluding secrets.yaml, the tracked secrets.example.yaml template, and
  #   the WebFlash wrappers in products/webflash/ (thin mappers the release
  #   workflow short-circuits via config/webflash-builds.json), so legacy
  #   boards outside the shipping set are exercised only in this opt-in deep
  #   check.
  # ============================================================================
  discover-products:
    name: Discover Products
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      product_count: ${{ steps.discover.outputs.product_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Discover product configurations
        id: discover
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'quick' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import glob
          import json
          import os
          import sys

          mode = os.environ.get("TEST_MODE", "quick")
          include = []

          if mode == "full":
              # Broad legacy/manual sweep: every product YAML in the repo,
              # excluding secrets.yaml, the tracked secrets.example.yaml
              # template, and the webflash wrappers (thin mappers the release
              # workflow short-circuits via webflash-builds.json). The
              # secrets.example.yaml template is a placeholder secrets map, not
              # an ESPHome product config, so `esphome config` would fail on it.
              for path in sorted(glob.glob("products/**/*.yaml", recursive=True)):
                  if os.path.basename(path) in ("secrets.yaml", "secrets.example.yaml"):
                      continue
                  if path.startswith("products/webflash/"):
                      continue
                  include.append(
                      {"product": os.path.splitext(os.path.basename(path))[0], "file": path}
                  )
          else:
              # Default (quick): the maintained Ceiling-POE shipping set only —
              # the canonical product YAML for each config_string declared in
              # config/webflash-builds.json.
              with open("config/webflash-builds.json", encoding="utf-8") as handle:
                  builds = json.load(handle)["builds"]
              seen = set()
              for build in builds:
                  config_string = build["config_string"]
                  path = "products/sense360-{}.yaml".format(config_string.lower())
                  if path in seen or not os.path.exists(path):
                      continue
                  seen.add(path)
                  include.append(
                      {"product": os.path.splitext(os.path.basename(path))[0], "file": path}
                  )

          print("matrix=" + json.dumps({"include": include}))
          print("product_count=" + str(len(include)))

          # Human-readable log to stderr so it stays out of $GITHUB_OUTPUT.
          print(
              "mode={}: {} product(s) to validate".format(mode, len(include)),
              file=sys.stderr,
          )
          for entry in include:
              print("  " + entry["file"], file=sys.stderr)
          PY

  # ============================================================================
  # JOB 3: BROAD LEGACY/MANUAL PRODUCT SWEEP
  # ============================================================================
  # Runs `esphome config` against every discovered product YAML (legacy,
  # manual, and reference configs included; WebFlash wrappers excluded).
  # Failures here flag legacy/manual compatibility drift, NOT a Release-One
  # or WebFlash regression. The Release-One/WebFlash gate is owned by
  # validate.yml and firmware-build-release.yml.
  # ============================================================================
  test-all-products:
    name: "Test: ${{ matrix.product }}"
    needs: discover-products
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover-products.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up ESPHome build environment
        uses: ./.github/actions/setup-esphome-build
        with:
          # Use the locally checked-out components/ tree instead of cloning
          # this repo through external_components (git source). The remote
          # clone is unnecessary inside the checked-out repo and fails
          # non-interactively when the rewritten ref is not fetchable on
          # GitHub. The full sweep also reaches configs under
          # products/compile-only/ and products/bundles/, so each needs a
          # secrets.yaml beside it (the quick shipping set lives in products/).
          patch-external-components: "true"
          extra-secrets-dirs: "products/compile-only products/bundles"

      - name: Validate ESPHome config - ${{ matrix.product }}
        run: |
          echo "Validating: ${{ matrix.file }}"
          esphome config "${{ matrix.file }}"

  # ============================================================================
  # JOB 4: C++ LINTING
  # ============================================================================
  lint-cpp:
    name: Lint C++ Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          echo "Checking C++ header formatting..."
          if [ -d "include/" ]; then
            find include/ -name "*.h" -o -name "*.cpp" | while read -r file; do
              echo "Checking: $file"
              clang-format --dry-run --Werror "$file" || echo "Warning: $file needs formatting"
            done
          else
            echo "No include/ directory found, skipping C++ lint"
          fi

  # ============================================================================
  # JOB 5: TEST SUMMARY
  # ============================================================================
  test-summary:
    name: Test Summary
    needs: [validate-yaml, discover-products, test-all-products, lint-cpp]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'quick' }}
        run: |
          echo "=============================================="
          echo "CONFIG SWEEP SUMMARY (mode: ${TEST_MODE})"
          echo "=============================================="
          echo ""
          echo "quick (default) = maintained Ceiling-POE shipping set only."
          echo "full            = broad legacy/manual product sweep (every product YAML)."
          echo "This is a MANUAL workflow; it is NOT the Release-One/WebFlash PR gate."
          echo "Release-One/WebFlash gating lives in:"
          echo "  - .github/workflows/validate.yml"
          echo "  - .github/workflows/firmware-build-release.yml"
          echo ""
          echo "Products validated: ${{ needs.discover-products.outputs.product_count }}"
          echo ""
          echo "Job Results:"
          echo "  - YAML Validation:        ${{ needs.validate-yaml.result }}"
          echo "  - Product Discovery:      ${{ needs.discover-products.result }}"
          echo "  - Legacy/Manual Sweep:    ${{ needs.test-all-products.result }}"
          echo "  - C++ Linting:            ${{ needs.lint-cpp.result }}"
          echo ""

          # Fail if any critical job failed. Failures here indicate
          # legacy/manual compatibility issues; they do not gate normal PRs
          # because this workflow runs only on manual dispatch.
          if [ "${{ needs.validate-yaml.result }}" = "failure" ] || \
             [ "${{ needs.test-all-products.result }}" = "failure" ]; then
            echo "LEGACY/MANUAL SWEEP FAILED (manual workflow; not a PR gate)."
            exit 1
          fi

          echo "Legacy/manual sweep passed."
