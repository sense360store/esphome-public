---
# ============================================================================
# CI - VALIDATE FIRMWARE CONFIGURATIONS (MANUAL BROAD/LEGACY SWEEP)
# ============================================================================
# This workflow is a MANUAL broad/legacy compatibility sweep across every
# product YAML in the repo (excluding the WebFlash wrappers in
# products/webflash/, which are not standalone configs) plus generated
# module combinations.
#
# It is NOT the normal PR gate. The Release-One / WebFlash blocking checks
# live in:
#   - .github/workflows/validate.yml
#   - .github/workflows/firmware-build-release.yml
# along with the test scripts they invoke (validate_configs.py,
# validate_webflash_builds.py, test_webflash_compatibility.py,
# test_webflash_artifact_naming.py, test_product_substitutions.py,
# test_release_one_entity_names.py, test_validate_webflash_release_notes.py).
#
# Purpose (manual use):
#   - Spot-check that historical / manual / reference product configurations
#     still validate against the current ESPHome version.
#   - Validate YAML syntax across products and packages.
#   - Exercise generated module combinations.
#   - Lint C++ headers.
#
# Test Modes:
#   - quick: Fast representative subset of generated module combinations.
#   - full:  All generated module combinations.
#
# Failures here indicate legacy/manual compatibility issues. They do NOT
# block normal PRs and do NOT indicate a Release-One/WebFlash regression
# unless the same failure also surfaces in validate.yml or the release
# workflow.
# ============================================================================

name: "CI: Validate Configs"

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode: quick (representative), full (all combinations)'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

# SECURITY-AUDIT-FIX-001: least-privilege token scope. This manual
# broad/legacy sweep only reads the repo and runs validation / esphome
# config / lint; it never writes contents or any other resource, so the
# token is pinned to read-only.
permissions:
  contents: read

jobs:
  # ============================================================================
  # JOB 1: YAML VALIDATION
  # ============================================================================
  # Fast syntax check for all YAML files - catches obvious errors early
  # ============================================================================
  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml yamllint

      - name: Validate YAML syntax with validation script
        run: |
          python3 tests/validate_configs.py

      - name: Run yamllint
        run: |
          yamllint -c .yamllint products/ packages/

  # ============================================================================
  # JOB 2: DISCOVER ALL PRODUCTS
  # ============================================================================
  # Dynamically discovers all product YAML files for the broad legacy/manual
  # sweep. WebFlash wrappers in products/webflash/ are intentionally excluded:
  # they are not standalone product configs but thin mappers from WebFlash
  # config strings to canonical products/sense360-*.yaml files, and the
  # release workflow short-circuits them via config/webflash-builds.json.
  # ============================================================================
  discover-products:
    name: Discover Products
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      product_count: ${{ steps.discover.outputs.product_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Discover product configurations
        id: discover
        run: |
          # Find all product YAML files (excluding secrets.yaml and the
          # WebFlash wrapper directory, which is not a standalone product).
          PRODUCTS=$(find products/ -name "*.yaml" -type f ! -name "secrets.yaml" ! -path "products/webflash/*" | sort)

          # Build JSON matrix
          MATRIX='{"include":['
          FIRST=true
          COUNT=0

          for PRODUCT_FILE in $PRODUCTS; do
            PRODUCT_NAME=$(basename "$PRODUCT_FILE" .yaml)

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX+=','
            fi

            MATRIX+="{\"product\":\"$PRODUCT_NAME\",\"file\":\"$PRODUCT_FILE\"}"
            COUNT=$((COUNT + 1))
          done

          MATRIX+=']}'

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "product_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT products to test"
          echo "Products: $(echo $PRODUCTS | tr '\n' ' ')"

  # ============================================================================
  # JOB 3: BROAD LEGACY/MANUAL PRODUCT SWEEP
  # ============================================================================
  # Runs `esphome config` against every discovered product YAML (legacy,
  # manual, and reference configs included; WebFlash wrappers excluded).
  # Failures here flag legacy/manual compatibility drift, NOT a Release-One
  # or WebFlash regression. The Release-One/WebFlash gate is owned by
  # validate.yml and firmware-build-release.yml.
  # ============================================================================
  test-all-products:
    name: "Test: ${{ matrix.product }}"
    needs: discover-products
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover-products.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up ESPHome build environment
        # This lane keeps its own external_components rewrite (sed ref: main ->
        # current branch + feature-package @main -> branch) in the step below,
        # so patch-external-components stays false (the default). Secrets only
        # need the repo root and products/, so no extra-secrets-dirs.
        uses: ./.github/actions/setup-esphome-build

      - name: Update external_components and includes to use current branch
        run: |
          # For CI testing, we need to use the current branch's components instead of 'main'
          # This prevents CI failures when component changes haven't been merged to main yet
          # The checked-in files use 'ref: main' or '@main' which is correct for end-users
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Updating external_components.yaml to use branch: $BRANCH_NAME"
          sed -i "s|ref: main|ref: $BRANCH_NAME|g" packages/base/external_components.yaml
          echo "Updated external_components.yaml:"
          cat packages/base/external_components.yaml

          # Also update github:// includes in feature packages to use current branch
          echo ""
          echo "Updating github:// includes in feature packages to use branch: $BRANCH_NAME"
          find packages/features -name "*.yaml" -exec sed -i "s|@main|@$BRANCH_NAME|g" {} \;
          echo "Updated feature packages with github:// includes:"
          grep -r "github://" packages/features/ || echo "No github:// URLs found"

      - name: Validate ESPHome config - ${{ matrix.product }}
        run: |
          echo "Validating: ${{ matrix.file }}"
          esphome config ${{ matrix.file }}

  # ============================================================================
  # JOB 4: GENERATED CONFIG TESTS (Module Combinations)
  # ============================================================================
  # Tests dynamically generated configurations to verify module combinations
  # work correctly. This catches issues with package composition.
  # ============================================================================
  generate-test-matrix:
    name: Generate Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      config_count: ${{ steps.generate.outputs.config_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Generate test matrix
        id: generate
        run: |
          # Determine test mode
          TEST_MODE="${{ github.event.inputs.test_mode || 'quick' }}"

          if [ "$TEST_MODE" = "full" ]; then
            echo "Running FULL test matrix (all combinations)"
            MATRIX=$(python3 tests/generate_test_configs.py --mode matrix --full)
            COUNT=$(python3 tests/generate_test_configs.py --mode list --full --json | jq '.total')
          else
            echo "Running QUICK test matrix (representative subset)"
            MATRIX=$(python3 tests/generate_test_configs.py --mode matrix --representative)
            COUNT=$(python3 tests/generate_test_configs.py --mode list --representative --json | jq '.total')
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "config_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Generated $COUNT test configurations"

  test-generated-configs:
    name: "Generated: ${{ matrix.name }}"
    needs: generate-test-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-test-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up ESPHome build environment
        uses: ./.github/actions/setup-esphome-build
        with:
          # The generated configs are written to tests/generated/, so secrets
          # are provisioned there and in tests/ as well as the repo root and
          # products/. This lane keeps its own external_components rewrite (the
          # step below), so patch-external-components stays false (the default).
          extra-secrets-dirs: "tests tests/generated"

      - name: Update external_components and includes to use current branch
        run: |
          # For CI testing, we need to use the current branch's components instead of 'main'
          # This prevents CI failures when component changes haven't been merged to main yet
          # The checked-in files use 'ref: main' or '@main' which is correct for end-users
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Updating external_components.yaml to use branch: $BRANCH_NAME"
          sed -i "s|ref: main|ref: $BRANCH_NAME|g" packages/base/external_components.yaml
          echo "Updated external_components.yaml:"
          cat packages/base/external_components.yaml

          # Also update github:// includes in feature packages to use current branch
          echo ""
          echo "Updating github:// includes in feature packages to use branch: $BRANCH_NAME"
          find packages/features -name "*.yaml" -exec sed -i "s|@main|@$BRANCH_NAME|g" {} \;
          echo "Updated feature packages with github:// includes:"
          grep -r "github://" packages/features/ || echo "No github:// URLs found"

      - name: Generate test config
        run: |
          mkdir -p tests/generated
          TEST_MODE="${{ github.event.inputs.test_mode || 'quick' }}"
          if [ "$TEST_MODE" = "full" ]; then
            python3 tests/generate_test_configs.py --mode generate --full --output-dir tests/generated
          else
            python3 tests/generate_test_configs.py --mode generate --representative --output-dir tests/generated
          fi

      - name: Validate ESPHome config - ${{ matrix.name }}
        run: |
          CONFIG_FILE="tests/generated/test-${{ matrix.name }}.yaml"
          echo "Validating: $CONFIG_FILE"

          if [ -f "$CONFIG_FILE" ]; then
            esphome config "$CONFIG_FILE"
          else
            echo "Config file not found: $CONFIG_FILE"
            echo "Available configs:"
            ls -la tests/generated/
            exit 1
          fi

  # ============================================================================
  # JOB 5: C++ LINTING
  # ============================================================================
  lint-cpp:
    name: Lint C++ Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          echo "Checking C++ header formatting..."
          if [ -d "include/" ]; then
            find include/ -name "*.h" -o -name "*.cpp" | while read file; do
              echo "Checking: $file"
              clang-format --dry-run --Werror "$file" || echo "Warning: $file needs formatting"
            done
          else
            echo "No include/ directory found, skipping C++ lint"
          fi

  # ============================================================================
  # JOB 6: TEST SUMMARY
  # ============================================================================
  test-summary:
    name: Test Summary
    needs: [validate-yaml, discover-products, test-all-products, generate-test-matrix, test-generated-configs, lint-cpp]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "=============================================="
          echo "BROAD LEGACY/MANUAL CONFIG SWEEP SUMMARY"
          echo "=============================================="
          echo ""
          echo "This is a MANUAL broad/legacy compatibility sweep."
          echo "It is NOT the Release-One/WebFlash PR gate."
          echo "Release-One/WebFlash gating lives in:"
          echo "  - .github/workflows/validate.yml"
          echo "  - .github/workflows/firmware-build-release.yml"
          echo ""
          echo "Products Swept (legacy/manual, webflash wrappers excluded): ${{ needs.discover-products.outputs.product_count }}"
          echo "Generated Configs: ${{ needs.generate-test-matrix.outputs.config_count }}"
          echo ""
          echo "Job Results:"
          echo "  - YAML Validation:        ${{ needs.validate-yaml.result }}"
          echo "  - Product Discovery:      ${{ needs.discover-products.result }}"
          echo "  - Legacy/Manual Sweep:    ${{ needs.test-all-products.result }}"
          echo "  - Matrix Generation:      ${{ needs.generate-test-matrix.result }}"
          echo "  - Generated Configs:      ${{ needs.test-generated-configs.result }}"
          echo "  - C++ Linting:            ${{ needs.lint-cpp.result }}"
          echo ""

          # Fail if any critical job failed. Failures here indicate
          # legacy/manual compatibility issues; they do not gate normal PRs
          # because this workflow runs only on manual dispatch.
          if [ "${{ needs.validate-yaml.result }}" = "failure" ] || \
             [ "${{ needs.test-all-products.result }}" = "failure" ] || \
             [ "${{ needs.test-generated-configs.result }}" = "failure" ]; then
            echo "LEGACY/MANUAL SWEEP FAILED (manual workflow; not a PR gate)."
            exit 1
          fi

          echo "Legacy/manual sweep passed."
