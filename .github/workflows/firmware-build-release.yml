---
# ============================================================================
# FIRMWARE BUILD & RELEASE WORKFLOW
# ============================================================================
# This workflow automates the build and release of ESPHome firmware binaries
# for all Sense360 products. It integrates with WebFlash for browser-based
# device flashing.
#
# Triggers:
#   - Release creation (published)
#   - Manual dispatch (for testing/preview releases)
#
# Process:
#   1. Generate build matrix from products directory
#   2. Build all product configurations using ESPHome
#   3. Rename binaries to WebFlash-compatible format
#   4. Attach binaries to GitHub release with checksums
#
# Output Format:
#   Sense360-[Product]-[Variant]-v[Version]-[Channel].bin
#
# ============================================================================

name: Build & Release Firmware

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.0.0)'
        required: true
        default: '0.0.0-dev'
      channel:
        description: 'Release channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - stable
          - preview
          - beta
      single_product:
        description: >-
          Optional: build only this single product (matrix.product basename,
          e.g. sense360-ceiling-poe-ventiq-roomiq). Leave blank to build the
          full product matrix.
        required: false
        default: ''
      # RELEASE-WORKFLOW-DRYRUN-MODE-001: explicit, safe-by-default dry-run
      # mode. When enabled (the default), a manual dispatch only exercises
      # release-note planning, validation, and the release guardrails for the
      # release-eligible builds (stable Ceiling-POE-VentIQ-RoomIQ + preview
      # Ceiling-POE-VentIQ-RoomIQ-LED). Dry-run creates NO GitHub Release,
      # uploads NO release assets, and writes NO firmware/sources.json or
      # manifest.json. Publishing remains gated to a real `release` event:
      # this input cannot publish (the `release` job's gate ignores it).
      dry_run:
        description: >-
          Dry-run release mode (default ON / safe; non-publishing). Validates
          release-note planning + guardrails for the release-eligible builds
          without creating a GitHub Release or uploading any release asset.
        required: false
        default: true
        type: boolean

# Ensure only one release workflow runs at a time
concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: false

# SECURITY-AUDIT-FIX-001: least-privilege top-level token scope. Only the
# `release` job uploads release assets, and it requests `contents: write`
# at the job level (see below). The matrix-generation, build, and summary
# jobs only read the repo and exchange CI artifacts (via the artifact
# service, which does not use the `contents` scope), so the workflow-level
# default is pinned to read-only.
permissions:
  contents: read

env:
  ESPHOME_VERSION: "2026.4.5"

jobs:
  # ============================================================================
  # JOB 1: GENERATE BUILD MATRIX
  # ============================================================================
  # Scans the products directory and generates a build matrix for all
  # product configurations.
  # ============================================================================
  generate-matrix:
    name: Generate Build Matrix
    # RELEASE-WORKFLOW-DRYRUN-GATE-FIX-001: skip this job (and the build /
    # release / summary jobs that depend on it) on a workflow_dispatch run
    # with dry_run=true, so the dry-run lane is fully isolated from the
    # release / build artifact path. The dry-run job (release-dry-run) is
    # the only thing a dispatch with dry_run=true should exercise.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      product_count: ${{ steps.generate.outputs.product_count }}
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine version and channel
        id: version
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            # RELEASE-004: tag normalization is delegated to a tested
            # script so preview tags can carry a suffix
            # (e.g. v1.0.0-led-preview) while still resolving to the
            # semver in config/webflash-builds.json. The script writes
            # version= and channel= to $GITHUB_OUTPUT.
            python3 scripts/derive_release_version_channel.py
            VERSION="$(grep '^version=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
            CHANNEL="$(grep '^channel=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
          else
            # Manual dispatch
            VERSION="$DISPATCH_VERSION"
            CHANNEL="$DISPATCH_CHANNEL"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          fi

          echo "Building version: $VERSION (channel: $CHANNEL)"

      - name: Generate product build matrix
        id: generate
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          SINGLE_PRODUCT: ${{ github.event.inputs.single_product }}
        run: |
          set -euo pipefail

          # ESP-007: the release/build matrix is driven by
          # config/webflash-builds.json, filtered by version + channel (and
          # optional single_product for manual dispatch). This replaces the
          # previous broad `find products/` scan, which built every legacy
          # / reference / blocked product (including FanTRIAC) when a real
          # Release was published. The WebFlash build matrix is the single
          # source of truth for what release publishing ships.
          #
          # When a JSON entry points at a products/webflash/* wrapper, we
          # compile the canonical products/sense360-<stem>.yaml instead.
          # The wrapper changes ESPHome's config_dir to products/webflash/,
          # which breaks the `path: ../components` rewrite emitted by the
          # external_components patch step (that path resolves to
          # products/components from the wrapper's config_dir). The
          # WebFlash artifact name is still produced because
          # scripts/product_name_mapper.py maps the wrapper stem to the
          # same display name as the canonical stem.

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          REPO_ROOT = Path(".").resolve()
          BUILDS_PATH = REPO_ROOT / "config" / "webflash-builds.json"

          version = os.environ["VERSION"]
          channel = os.environ["CHANNEL"]
          single_product = os.environ.get("SINGLE_PRODUCT", "").strip()

          if not BUILDS_PATH.is_file():
              sys.exit(f"error: {BUILDS_PATH} does not exist")

          try:
              data = json.loads(BUILDS_PATH.read_text())
          except json.JSONDecodeError as exc:
              sys.exit(f"error: cannot parse {BUILDS_PATH}: {exc}")

          entries = data.get("builds", [])
          if not isinstance(entries, list):
              sys.exit(f"error: {BUILDS_PATH}: 'builds' must be a list")

          rows = []
          for entry in entries:
              if not isinstance(entry, dict):
                  continue
              if entry.get("version") != version:
                  continue
              if entry.get("channel") != channel:
                  continue

              product_yaml = entry.get("product_yaml", "")
              if not product_yaml:
                  sys.exit(
                      f"error: webflash-builds entry missing product_yaml: {entry}"
                  )

              wrapper_stem = Path(product_yaml).stem
              canonical_stem = f"sense360-{wrapper_stem}"

              if product_yaml.startswith("products/webflash/"):
                  canonical_yaml = f"products/{canonical_stem}.yaml"
                  if not (REPO_ROOT / canonical_yaml).is_file():
                      sys.exit(
                          f"error: wrapper {product_yaml} has no canonical "
                          f"product YAML at {canonical_yaml}"
                      )
                  build_file = canonical_yaml
              else:
                  if not (REPO_ROOT / product_yaml).is_file():
                      sys.exit(
                          f"error: product_yaml does not exist: {product_yaml}"
                      )
                  build_file = product_yaml

              if single_product:
                  allowed = {wrapper_stem, canonical_stem}
                  if single_product not in allowed:
                      continue

              rows.append({
                  "product": wrapper_stem,
                  "file": build_file,
                  "artifact_name": entry.get("artifact_name", ""),
              })

          if not rows:
              detail = (
                  f"version={version!r} channel={channel!r} "
                  f"single_product={single_product!r}"
              )
              sys.exit(
                  f"error: no config/webflash-builds.json entries matched {detail}"
              )

          matrix_json = json.dumps({"include": rows}, separators=(",", ":"))
          count = len(rows)

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as fh:
                  fh.write(f"matrix={matrix_json}\n")
                  fh.write(f"product_count={count}\n")

          print(f"WebFlash build matrix ({count} entry/entries) "
                f"for version={version} channel={channel}:")
          for row in rows:
              print(
                  f"  - product={row['product']} "
                  f"file={row['file']} "
                  f"artifact={row['artifact_name']}"
              )
          print(f"Matrix JSON: {matrix_json}")
          PY

          if [ -n "${SINGLE_PRODUCT:-}" ]; then
            echo "single_product filter active: $SINGLE_PRODUCT"
          fi

  # ============================================================================
  # JOB 2: BUILD FIRMWARE
  # ============================================================================
  # Compiles each product configuration and renames the output binary
  # to WebFlash-compatible format.
  # ============================================================================
  build:
    name: "Build: ${{ matrix.product }}"
    needs: generate-matrix
    # RELEASE-WORKFLOW-DRYRUN-GATE-FIX-001: belt-and-braces gate. The build
    # job already depends on the gated generate-matrix job (so a dry-run
    # dispatch will skip it via the `needs` chain), but the explicit `if`
    # here makes it impossible for a future edit to wire build into the
    # dry-run lane.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ env.ESPHOME_VERSION }}-${{ hashFiles(matrix.file) }}-${{ matrix.product }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ env.ESPHOME_VERSION }}-
            ${{ runner.os }}-pio-

      - name: Install ESPHome
        run: |
          pip install esphome==${{ env.ESPHOME_VERSION }}

      - name: Create secrets.yaml for build
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "Sense360_Setup"
          wifi_password: "sense360setup"
          api_encryption_key: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa="
          ota_password: "sense360-ota-default"
          fallback_ap_password: "sense360fallback"
          web_username: "admin"
          web_password: "sense360admin"
          EOF
          # Copy secrets to all locations where configs might look for them
          # Remove symlinks first (products/secrets.yaml may be a symlink to ../secrets.yaml)
          rm -f products/secrets.yaml
          rm -f tests/secrets.yaml
          cp secrets.yaml products/secrets.yaml
          mkdir -p tests/generated
          cp secrets.yaml tests/secrets.yaml
          cp secrets.yaml tests/generated/secrets.yaml

      - name: Patch external_components to use local checked-out source
        run: |
          # CI/release builds run inside the checked-out repo, so cloning
          # https://github.com/sense360store/esphome-public@<ref> through
          # external_components is both unnecessary and fragile (the requested
          # ref may not yet exist on GitHub, e.g. when proving a fix on a
          # working branch). Override the shared external_components include
          # and any inline external_components blocks in product YAMLs to
          # point at the local components/ directory.
          #
          # IMPORTANT: this rewrite happens in the workflow workspace only.
          # It is never committed back to the repo, so end-users consuming
          # this repo as a remote ESPHome package continue to get the
          # git-source version checked into git.

          echo "Rewriting packages/base/external_components.yaml -> local source"
          cat > packages/base/external_components.yaml <<'EOF'
          # CI-only override: use the locally checked-out components/ tree
          # instead of cloning this repo from GitHub. The committed version
          # of this file (with type: git) is intentionally unchanged.
          #
          # NOTE on the relative path: ESPHome resolves
          # external_components.source.path relative to the directory of
          # the main YAML being compiled (the config_dir), NOT relative
          # to the file in which the external_components block appears.
          # Every product YAML in the build matrix lives under products/,
          # so ../components points at the repo-root components/ tree.
          # Using `path: components` would make ESPHome look for
          # products/components, which does not exist.
          external_components:
            - source:
                type: local
                path: ../components
              components: [ld2412, ld2450, ld24xx]
          EOF
          echo "Patched packages/base/external_components.yaml:"
          cat packages/base/external_components.yaml

          # Some product YAMLs declare their own inline external_components
          # block (e.g. products/sense360-mini-full-ld2412.yaml). Rewrite any
          # such block to also use the local components/ directory. Path is
          # ../components because product YAMLs live in products/.
          echo ""
          echo "Searching products/ for inline external_components blocks..."
          python3 - <<'PY'
          import pathlib
          import re

          PRODUCTS = pathlib.Path("products")
          # Match a top-level external_components: block followed by a single
          # git-source entry. Conservative: only rewrites blocks that look
          # exactly like the known shape we ship.
          pattern = re.compile(
              r"^external_components:\s*\n"
              r"(?:[ \t]*#[^\n]*\n)*"
              r"[ \t]*-[ \t]*source:\s*\n"
              r"[ \t]+type:[ \t]*git\s*\n"
              r"[ \t]+url:[ \t]*\S+\s*\n"
              r"[ \t]+ref:[ \t]*\S+\s*\n"
              r"([ \t]+components:[ \t]*\[[^\]]*\]\s*\n)"
              r"(?:[ \t]+refresh:[ \t]*\S+\s*\n)?",
              re.MULTILINE,
          )

          for path in sorted(PRODUCTS.glob("*.yaml")):
              text = path.read_text()
              match = pattern.search(text)
              if not match:
                  continue
              components_line = match.group(1).strip()
              replacement = (
                  "external_components:\n"
                  "  # CI-only override: rewritten to local source by the\n"
                  "  # firmware-build-release workflow.\n"
                  "  - source:\n"
                  "      type: local\n"
                  "      path: ../components\n"
                  f"    {components_line}\n"
              )
              new_text = pattern.sub(replacement, text, count=1)
              path.write_text(new_text)
              print(f"  rewrote inline external_components in {path}")
          PY

          # Sanity check: no committed/inline references should still be
          # pulling from github.com inside the workspace after this step.
          if grep -RIn --include="*.yaml" -E "type:[[:space:]]*git" packages/base products; then
            echo "::warning::Some YAMLs still declare type: git external_components after patch (see above). They will fall back to network cloning."
          else
            echo "All external_components in packages/base and products are now local."
          fi

      - name: Compile firmware
        run: |
          echo "=============================================="
          echo "Compiling: ${{ matrix.file }}"
          echo "ESPHome version: ${{ env.ESPHOME_VERSION }}"
          echo "=============================================="
          # First validate config to catch errors early.
          # Do NOT redirect to /dev/null — we need the real ESPHome error to
          # surface in the workflow log if validation fails.
          esphome config "${{ matrix.file }}"
          echo "Config validation passed, starting compilation..."
          OUTPUT_DIR="firmware-output"
          OUTPUT_FILE="$OUTPUT_DIR/${{ matrix.product }}.bin"
          mkdir -p "$OUTPUT_DIR"
          echo "Requested output file: $OUTPUT_FILE"

          if esphome compile --help 2>&1 | grep -q -- '--output-file'; then
            echo "Using --output-file flag for deterministic binary path"
            COMPILE_CMD=(esphome compile "${{ matrix.file }}" --output-file "$OUTPUT_FILE")
          else
            echo "--output-file flag not available; compiling with default output location"
            COMPILE_CMD=(esphome compile "${{ matrix.file }}")
          fi

          # Compile with verbose output on failure
          if ! "${COMPILE_CMD[@]}"; then
            echo "=============================================="
            echo "COMPILATION FAILED"
            echo "=============================================="
            echo "Showing build directory contents:"
            find .esphome -type f -name "*.log" 2>/dev/null | head -5 | xargs cat 2>/dev/null || true
            exit 2
          fi

      - name: Find and rename firmware binary
        id: rename
        run: |
          set -euo pipefail

          echo "Searching for firmware binary..."

          # Prefer the explicitly requested output file from the compile step
          OUTPUT_FILE="firmware-output/${{ matrix.product }}.bin"
          FIRMWARE_PATH=""

          if [ -f "$OUTPUT_FILE" ]; then
            echo "Found firmware at explicit output path: $OUTPUT_FILE"
            FIRMWARE_PATH="$OUTPUT_FILE"
          else
            echo "Explicit output file not found. Falling back to search in .esphome and build directories..."

            # ESPHome with ESP-IDF outputs to various locations depending on
            # version. `find` can return non-zero (e.g., a missing directory),
            # so each tolerant lookup is suffixed with `|| true` so the strict
            # `set -euo pipefail` mode does not abort the step on a benign
            # not-found result.
            SEARCH_ROOTS=$(find . -type d -name ".esphome" -prune -print 2>/dev/null || true)
            if [ -d build ]; then
              SEARCH_ROOTS="$SEARCH_ROOTS build"
            fi

            for ROOT in $SEARCH_ROOTS; do
              BASE_DIR="$ROOT"
              [ -d "$ROOT/build" ] && BASE_DIR="$ROOT/build"

              # Pattern 1: Standard firmware.bin
              if [ -z "$FIRMWARE_PATH" ]; then
                FIRMWARE_PATH=$(find "$BASE_DIR" -name "firmware.bin" -type f 2>/dev/null | head -1 || true)
              fi

              # Pattern 2: Factory bin (ESP-IDF merged binary for initial flash)
              if [ -z "$FIRMWARE_PATH" ]; then
                FIRMWARE_PATH=$(find "$BASE_DIR" -name "firmware-factory.bin" -type f 2>/dev/null | head -1 || true)
              fi

              # Pattern 3: ESP-IDF style merged binary
              if [ -z "$FIRMWARE_PATH" ]; then
                FIRMWARE_PATH=$(find "$BASE_DIR" -path "*/.pioenvs/*/firmware*.bin" -type f 2>/dev/null | head -1 || true)
              fi

              # Pattern 4: Any .bin file in idedata directory (ESP-IDF)
              if [ -z "$FIRMWARE_PATH" ]; then
                FIRMWARE_PATH=$(find "$BASE_DIR" -path "*/idedata/*" -name "*.bin" -type f 2>/dev/null | grep -v bootloader | head -1 || true)
              fi

              # Pattern 5: Last resort - any firmware*.bin
              if [ -z "$FIRMWARE_PATH" ]; then
                FIRMWARE_PATH=$(find "$BASE_DIR" -name "firmware*.bin" -type f 2>/dev/null | head -1 || true)
              fi
            done
          fi

          if [ -z "$FIRMWARE_PATH" ]; then
            echo "=============================================="
            echo "Error: Could not find compiled firmware binary"
            echo "=============================================="
            echo "Available .bin files:"
            find . -path "*/.esphome/build/*" -type f -name "*.bin" 2>/dev/null || echo "No .bin files found"
            echo ""
            echo "Build directory structure:"
            find . -path "*/.esphome/build" -type d 2>/dev/null || echo "No build directory"
            exit 1
          fi

          echo "Found firmware at: $FIRMWARE_PATH"
          echo "File size: $(stat -c%s "$FIRMWARE_PATH") bytes"

          # Generate WebFlash-compatible filename.
          # `tail -n 1 | tr -d '\r\n'` is a defensive guard: it isolates the
          # final line of stdout and strips any CR/LF so a future debug print
          # in the mapper cannot pollute the captured filename.
          VERSION="${{ needs.generate-matrix.outputs.version }}"
          CHANNEL="${{ needs.generate-matrix.outputs.channel }}"
          WEBFLASH_NAME="$(python3 scripts/product_name_mapper.py "${{ matrix.product }}" "$VERSION" "$CHANNEL" | tail -n 1 | tr -d '\r\n')"

          if [ -z "$WEBFLASH_NAME" ]; then
            echo "ERROR: product_name_mapper.py returned empty filename"
            exit 1
          fi

          case "$WEBFLASH_NAME" in
            *.bin) ;;
            *)
              echo "ERROR: WebFlash filename does not end in .bin: '$WEBFLASH_NAME'"
              exit 1
              ;;
          esac

          echo "Renaming to: $WEBFLASH_NAME"

          # Pre-copy debug: confirm cwd, firmware-output state, and which
          # compiled .bin files exist under products/.esphome.
          echo "--- pre-copy debug ---"
          pwd
          ls -la firmware-output 2>/dev/null || true
          find products/.esphome -type f -name "*.bin" -printf "%p %s bytes\n" 2>/dev/null || true
          echo "----------------------"

          # Create output directory and copy with new name
          mkdir -p firmware-output
          DEST="firmware-output/$WEBFLASH_NAME"
          cp "$FIRMWARE_PATH" "$DEST"

          if [ ! -f "$DEST" ]; then
            echo "ERROR: copied firmware not found at $DEST"
            exit 1
          fi

          SIZE="$(stat -c%s "$DEST")"
          echo "Copied firmware to: $DEST"
          echo "Copied size: $SIZE bytes"

          # A real Release-One binary is ~1MB; anything under 100KB indicates
          # a truncated copy or wrong source path.
          if [ "$SIZE" -lt 102400 ]; then
            echo "ERROR: copied firmware is suspiciously small: $SIZE bytes"
            exit 1
          fi

          # Post-copy debug: confirm the copy landed in firmware-output.
          echo "--- post-copy debug ---"
          pwd
          ls -la firmware-output 2>/dev/null || true
          echo "-----------------------"

          {
            echo "webflash_name=$WEBFLASH_NAME"
            echo "firmware_path=$DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Assert renamed binary matches WebFlash build matrix
        run: |
          # Fail the build if config/webflash-builds.json declares an
          # artifact for this product at this version+channel and the
          # renamed file's basename does not match. Skipped (exit 0) when
          # no entry matches — e.g. dev/preview dispatches with version
          # values that aren't in the published WebFlash matrix.
          python3 tests/check_webflash_build_output.py \
            --product "${{ matrix.product }}" \
            --version "${{ needs.generate-matrix.outputs.version }}" \
            --channel "${{ needs.generate-matrix.outputs.channel }}" \
            --actual "${{ steps.rename.outputs.firmware_path }}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: firmware-${{ matrix.product }}
          path: ${{ steps.rename.outputs.firmware_path }}
          retention-days: 7
          if-no-files-found: error

  # ============================================================================
  # JOB 3: RELEASE ATTACHMENT
  # ============================================================================
  # Downloads all compiled binaries, generates checksums, and attaches
  # them to the GitHub release.
  # ============================================================================
  release:
    name: Attach to Release
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    # SECURITY-AUDIT-FIX-001: this is the only job that needs write. It
    # attaches firmware binaries + checksums + manifest to the GitHub
    # Release via softprops/action-gh-release, which requires
    # `contents: write`. Scoped to this job so the rest of the workflow
    # stays read-only.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download all firmware artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: firmware-*
          path: all-firmware
          merge-multiple: true

      - name: List downloaded firmware
        run: |
          echo "Downloaded firmware files:"
          ls -la all-firmware/
          echo ""
          echo "Total files: $(ls -1 all-firmware/*.bin 2>/dev/null | wc -l)"

      - name: Generate checksums
        run: |
          cd all-firmware

          # Generate SHA256 checksums
          echo "# SHA256 Checksums" > checksums-sha256.txt
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> checksums-sha256.txt
          echo "# Version: ${{ needs.generate-matrix.outputs.version }}" >> checksums-sha256.txt
          echo "# Channel: ${{ needs.generate-matrix.outputs.channel }}" >> checksums-sha256.txt
          echo "" >> checksums-sha256.txt
          sha256sum *.bin >> checksums-sha256.txt

          # Generate MD5 checksums (for compatibility)
          echo "# MD5 Checksums" > checksums-md5.txt
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> checksums-md5.txt
          echo "" >> checksums-md5.txt
          md5sum *.bin >> checksums-md5.txt

          echo "Checksums generated:"
          cat checksums-sha256.txt

      - name: Create firmware manifest
        run: |
          VERSION="${{ needs.generate-matrix.outputs.version }}"
          CHANNEL="${{ needs.generate-matrix.outputs.channel }}"

          cat > all-firmware/manifest.json << EOF
          {
            "version": "$VERSION",
            "channel": "$CHANNEL",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_sha": "${{ github.sha }}",
            "esphome_version": "${{ env.ESPHOME_VERSION }}",
            "product_count": ${{ needs.generate-matrix.outputs.product_count }},
            "files": [
          $(ls -1 all-firmware/*.bin 2>/dev/null | while read f; do
            BASENAME=$(basename "$f")
            SHA256=$(sha256sum "$f" | cut -d' ' -f1)
            SIZE=$(stat -c%s "$f")
            echo "    {\"name\": \"$BASENAME\", \"sha256\": \"$SHA256\", \"size\": $SIZE},"
          done | sed '$ s/,$//')
            ]
          }
          EOF

          echo "Manifest created:"
          cat all-firmware/manifest.json

      - name: Validate WebFlash release notes
        env:
          RELEASE_CHANNEL: ${{ needs.generate-matrix.outputs.channel }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          if not event_path or not Path(event_path).is_file():
              raise SystemExit(
                  "GITHUB_EVENT_PATH is not set or does not exist; "
                  "cannot read release body."
              )
          event = json.loads(Path(event_path).read_text(encoding="utf-8"))
          body = (event.get("release") or {}).get("body") or ""
          Path("release-notes.md").write_text(body, encoding="utf-8")
          print(f"Wrote release-notes.md ({len(body)} bytes)")
          PY

          python3 scripts/validate-webflash-release-notes.py \
            release-notes.md \
            --channel "$RELEASE_CHANNEL"

      - name: Check WebFlash release assets
        run: |
          python3 scripts/check-webflash-release-assets.py \
            --dir all-firmware \
            --version "${{ needs.generate-matrix.outputs.version }}" \
            --channel "${{ needs.generate-matrix.outputs.channel }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            all-firmware/*.bin
            all-firmware/checksums-sha256.txt
            all-firmware/checksums-md5.txt
            all-firmware/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

      - name: Release summary
        run: |
          echo "=============================================="
          echo "FIRMWARE RELEASE COMPLETE"
          echo "=============================================="
          echo ""
          echo "Version: ${{ needs.generate-matrix.outputs.version }}"
          echo "Channel: ${{ needs.generate-matrix.outputs.channel }}"
          echo "Products built: ${{ needs.generate-matrix.outputs.product_count }}"
          echo "Git SHA: ${{ github.sha }}"
          echo ""
          echo "Firmware files attached to release:"
          ls -1 all-firmware/*.bin
          echo ""
          echo "WebFlash can now sync these binaries via the"
          echo "sync-from-releases.py script."

  # ============================================================================
  # JOB 4: BUILD SUMMARY (for manual dispatch)
  # ============================================================================
  # Provides a summary when manually triggered (no release attachment)
  # ============================================================================
  summary:
    name: Build Summary
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    # RELEASE-WORKFLOW-DRYRUN-GATE-FIX-001: a dry-run dispatch must not
    # download "all firmware" artifacts (no build job ran). Restrict the
    # summary to non-dry-run dispatches; the dry-run job emits its own
    # summary instead.
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: firmware-*
          path: all-firmware
          merge-multiple: true

      - name: Build summary
        run: |
          echo "=============================================="
          echo "FIRMWARE BUILD COMPLETE (Preview)"
          echo "=============================================="
          echo ""
          echo "Version: ${{ needs.generate-matrix.outputs.version }}"
          echo "Channel: ${{ needs.generate-matrix.outputs.channel }}"
          echo "Products built: ${{ needs.generate-matrix.outputs.product_count }}"
          echo ""
          echo "Built firmware files:"
          ls -la all-firmware/
          echo ""
          echo "Note: This was a manual dispatch. To attach firmware"
          echo "to a release, create a GitHub release instead."

  # ============================================================================
  # JOB 5: RELEASE DRY-RUN (RELEASE-WORKFLOW-DRYRUN-MODE-001)
  # ============================================================================
  # Safe, non-publishing dry-run of the release pipeline. Runs ONLY on a manual
  # workflow_dispatch with dry_run enabled (the default). It exercises
  # release-note planning, validation, and the release guardrails for the
  # release-eligible builds in config/webflash-builds.json — confirming the
  # stable Ceiling-POE-VentIQ-RoomIQ and preview Ceiling-POE-VentIQ-RoomIQ-LED
  # builds while asserting FanRelay / FanPWM / FanDAC are excluded.
  #
  # This job intentionally:
  #   * does NOT create a GitHub Release (no softprops/action-gh-release);
  #   * does NOT upload any release asset;
  #   * does NOT write firmware/sources.json or manifest.json (the planner is
  #     read-only and writes nothing to the repo);
  #   * runs read-only (no `contents: write`) — least privilege.
  #
  # Publishing is unaffected by this job and by the dry_run input: it stays
  # gated on the `release` job's `if: github.event_name == 'release'`.
  # ============================================================================
  release-dry-run:
    name: Release Dry-Run (no publish)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    # Least-privilege: read-only. This job must never publish.
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dry-run test dependencies
        # RELEASE-WORKFLOW-DRYRUN-GATE-FIX-001: the planner contract test
        # tests/test_release_dry_run_mode.py parses the workflow YAML with
        # PyYAML to enforce the dry-run gating invariants. setup-python
        # provides a clean interpreter, so PyYAML must be installed before
        # the test step runs. Without this, the "Verify dry-run guardrails
        # (planner contract tests)" step fails on `import yaml`, masking the
        # real dry-run isolation invariants the test is meant to enforce.
        run: |
          pip install pyyaml

      - name: Plan room release notes (dry-run, no publish)
        run: |
          echo "=============================================="
          echo "RELEASE DRY-RUN (RELEASE-WORKFLOW-DRYRUN-MODE-001)"
          echo "=============================================="
          echo "This is a non-publishing dry-run. It creates no GitHub"
          echo "Release, uploads no release assets, and writes no"
          echo "firmware/sources.json or manifest.json."
          echo ""
          # The planner enumerates the release-eligible builds from
          # config/webflash-builds.json, runs each draft body through the
          # release-notes validator, and enforces the fan-exclusion guardrail.
          # It exits non-zero (failing the dry-run) on any guardrail violation
          # or a build the generator refuses. It writes nothing (no --output).
          python3 scripts/plan_room_release_notes.py --commit "${{ github.sha }}"

      - name: Verify dry-run guardrails (planner contract tests)
        run: |
          # Locks in: only the two release-eligible builds are planned (stable
          # RoomIQ + preview LED); FanRelay / FanPWM / FanDAC are excluded; and
          # the planner never writes firmware/sources.json or manifest.json.
          python3 tests/test_plan_room_release_notes.py
          python3 tests/test_release_dry_run_mode.py

      - name: Assert no release side effects were produced
        run: |
          set -euo pipefail
          # Belt-and-braces: the dry-run must not have produced any release
          # publish side-effect file in the workspace.
          fail=0
          if [ -f firmware/sources.json ]; then
            echo "::error::dry-run produced firmware/sources.json"; fail=1
          fi
          if [ -f manifest.json ]; then
            echo "::error::dry-run produced manifest.json"; fail=1
          fi
          if ls ./*.bin >/dev/null 2>&1; then
            echo "::error::dry-run produced .bin artifact(s) in the repo root"; fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Dry-run confirmed: stable RoomIQ + preview LED planned, fans"
          echo "excluded, and no release was published."
