# ============================================================================
# Sense360 WebFlash wrapper — PREVIEW fan room bundle (AirIQ + FanDAC +
# RoomIQ, HW-RELEASE-001; documented address-overridden exception).
# ============================================================================
# HW-RELEASE-001 (docs/hw-release-001.md): promoted to the preview channel by
# owner declaration (bench-proof documentation requirement retired as a
# release gate; hardware readiness declared by the owner directly). This is
# the WebFlash-namespaced release-gate wrapper so the declaration-driven
# release matrix (config/webflash-builds.json, ESP-007) can address the build
# via the products/webflash/ namespace; the release workflow compiles the
# canonical products/sense360-ceiling-poe-airiq-fandac-roomiq.yaml, not this
# wrapper.
#
# Canonical YAML (full substitutions, packages, board config — unchanged):
#   products/sense360-ceiling-poe-airiq-fandac-roomiq.yaml
#
#   WebFlash config string : Ceiling-POE-AirIQ-FanDAC-RoomIQ
#   Build channel          : preview
#   Artifact name          : Sense360-Ceiling-POE-AirIQ-FanDAC-RoomIQ-v1.0.0-preview.bin
#   Owner declaration      : docs/hw-release-001.md (HW-RELEASE-001)
#
# ADDRESS-OVERRIDDEN EXCEPTION: the fandac_conflicts_with_airiq token mutex
# stays TRUE for the WebFlash one-click easy-mode grammar (which cannot
# encode the DIP-switch override); this bundle is the documented exception
# (config/webflash-compatibility.json fandac_airiq_address_override
# exception list) because it relocates the second GP8403 (IC2) from the 0x59
# package default to 0x5A so it cannot collide with the AirIQ SGP41 at 0x59
# on the shared core_i2c bus. The installer MUST set the IC2 DIP switch (SW2)
# to 0x5A to match. FANDAC-I2C-ADDR-001 stays PENDING.
#
# PREVIEW — NOT stable, NOT recommended, NOT a customer default, NOT buyable,
# NOT in any kit or kit picker, NOT in release_one_required_configs. Fan
# configs never ship on the stable channel (RELEASE-DAC-001 stays the stable
# blocker). Firmware-build proof only, released under owner declaration
# HW-RELEASE-001 — no hardware / bench / compliance / safety claim. The
# S360-312 board is SELV (no mains). Kit / customer visibility is unchanged
# by this wrapper.
# ============================================================================

packages:
  airiq_fandac_roomiq_preview: !include ../sense360-ceiling-poe-airiq-fandac-roomiq.yaml
