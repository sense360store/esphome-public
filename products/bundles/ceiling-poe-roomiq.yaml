# ============================================================================
# SENSE360 R4 PRODUCT — Ceiling-POE-RoomIQ (authored, release-blocked)
# ============================================================================
# WebFlash config string : Ceiling-POE-RoomIQ
#
# Authoring slice         : V1-R4-CREATE-001 (the S360-KIT-BEDROOM-P firmware)
# Source kit              : S360-KIT-BEDROOM-P (PoE Bedroom room bundle)
#
# Status — what this YAML IS:
#   The smallest RoomIQ-only PoE ceiling product: Core ceiling + PoE PSU +
#   RoomIQ (comfort + presence). It is the validated base the AirIQ
#   (V1-R4-CREATE-002) and LED (V1-R4-CREATE-003) stacks build on. The
#   package composition is the WebFlash-shipping `Ceiling-POE-VentIQ-RoomIQ`
#   build with VentIQ removed; the same RoomIQ subset is exercised by the
#   compile-only skeleton products/compile-only/ceiling-poe-roomiq.yaml.
#
# Status — what this YAML is NOT (release-blocked on S360-410):
#   * NOT a WebFlash exposed build. No entry is added to
#     config/webflash-builds.json; webflash_build_matrix stays false; no
#     webflash_wrapper is created under products/webflash/; no artifact_name
#     is declared.
#   * NOT a release artifact. No .bin / version / channel / checksum /
#     build-info manifest / GitHub Release tag / proof row is created.
#   * NOT hardware proof. The PoE PSU (S360-410) schematic_status stays
#     cataloged_unverified and the Release-One PoE "schematic verification
#     pending" caveat (PRODUCT-POE-410-001) remains open. Compile success
#     says nothing about bench / harness / silkscreen / schematic / pinmap
#     evidence.
#   * NOT production / preview / verified / release-ready. The catalog row
#     (config/product-catalog.json) is status: blocked, blocker
#     PRODUCT-POE-410-001. Channel target is stable-candidate
#     (STABLE-TARGET-ROOMIQ-001); promotion is owned by that follow-up and
#     held behind the shared S360-410 schematic-verification gate.
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive; this build ships neither
#   (config string `Ceiling-POE-RoomIQ` carries no air-quality token).
# - RoomIQ is the R4 merge of the legacy Comfort + Presence boards.
# - This build ships no fan-driver firmware and no LED firmware (the config
#   string carries no fan token and no LED token).
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af) — schematic
#                  verification pending; this product does NOT close that
#                  caveat (PRODUCT-POE-410-001).
# - Air Quality  : not included     (no AirIQ / no VentIQ token in config string)
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - Fan Driver   : not included     (no fan token in config string)
# - LED          : not included     (no LED token in config string)
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: v1.0.0
#       files:
#         - products/sense360-ceiling-poe-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-bedroom
#     friendly_name: "Bedroom Sense360"
# ============================================================================

substitutions:
  # === Device Configuration ===
  # ESPHome hostnames are limited to 31 chars; this is the shortened hostname
  # only. WebFlash identity (config string, text sensors) remains
  # `Ceiling-POE-RoomIQ`.
  device_name: s360-ceil-poe-roomiq
  friendly_name: Sense360 Ceiling RoomIQ
  device_sku: S360-CORE-C-POE
  device_version: "0.0.0-blocked-s360-410"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  # ESPHome enforces a 32-character maximum on the AP SSID. Override with a
  # short, human-readable label that identifies the RoomIQ-only build during
  # AP/setup mode.
  fallback_ssid: "S360 RoomIQ"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Compile-time capability declaration for the shared device framework
  # (packages/base/device_framework.yaml). Values must match this config
  # string's entry in config/core-framework.json — enforced by
  # tests/test_core_framework.py. These are compile-time composition
  # facts only; no runtime hardware autodetection is claimed.
  s360_config_string: "Ceiling-POE-RoomIQ"
  s360_hardware_model: "S360-100"
  s360_hardware_revision: "R4"
  s360_capabilities: "core,power_poe,roomiq,presence"
  s360_capabilities_human: "Core, PoE power, RoomIQ, Presence"
  s360_module_roomiq: "Included"
  s360_module_presence: "Included"

# ============================================================================
# PACKAGE INCLUDES
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  # Defines the canonical single shared Core I²C bus `core_i2c` that the
  # RoomIQ peripherals bind.
  core_hardware: !include ../../packages/hardware/sense360_core_ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  # Package-level expected; schematic verification pending — S360-410 stays
  # schematic_status: cataloged_unverified. See docs/hardware/s360-410-r4-poe.md.
  power_config: !include ../../packages/hardware/power_poe.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included. The config string `Ceiling-POE-RoomIQ` does
  # not carry the `LED` token (LED is a separately selectable module per the
  # WebFlash taxonomy — see docs/webflash-contract.md §3). A future
  # LED-included variant uses a distinct config string (`Ceiling-POE-RoomIQ-LED`,
  # V1-R4-CREATE-003) and a distinct artifact name.

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  # The package filenames (`comfort_ceiling.yaml`, `presence_ceiling.yaml`)
  # retain the legacy split-board naming and are kept for backwards
  # compatibility (see docs/webflash-contract.md §6 footnote).
  roomiq_comfort: !include ../../packages/expansions/comfort_ceiling.yaml
  # === Sense360 RoomIQ framework (ROOMIQ-FRAMEWORK-001) ===
  # Canonical comfort and environmental service: calibrated Temperature /
  # Humidity / Illuminance, Comfort, Environment State, Brightness and the
  # RoomIQ module runtime status (supersedes the legacy
  # comfort_basic_profile display path in bundles; legacy products keep
  # the profile and every pre-framework entity id remains available as a
  # disabled-by-default compatibility entity inside the framework).
  roomiq_framework: !include ../../packages/features/roomiq_framework.yaml
  roomiq_presence: !include ../../packages/expansions/presence_ceiling.yaml
  # === Sense360 Presence framework (PRESENCE-FRAMEWORK-001) ===
  # Tri-sensor customer Presence experience: PIR (immediate movement) +
  # LD2450 (radar half above) + SEN0609 (static presence), fused by
  # packages/features/presence_framework.yaml (supersedes the legacy
  # presence_basic_profile in bundles; legacy products keep the profile).
  roomiq_pir_board: !include ../../packages/boards/s360-200-roomiq-pir.yaml
  roomiq_sen0609_board: !include ../../packages/boards/s360-200-roomiq-sen0609.yaml
  roomiq_presence_framework: !include ../../packages/features/presence_framework.yaml

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Shared identity / capability / module-status / health entities.
  framework: !include ../../packages/base/device_framework.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} WebFlash Config"
    lambda: |-
      return {"Ceiling-POE-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
