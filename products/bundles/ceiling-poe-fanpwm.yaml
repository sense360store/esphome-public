# ============================================================================
# SENSE360 PWM FAN-CONTROL PRODUCT (PRODUCT-PWM-001)
# ============================================================================
# LEGACY / SUPERSEDED SX1509 FAN PATH — see
# docs/hardware/s360-100-native-fan-gpio-map.md
# (S360-100-NATIVE-FAN-GPIO-MAP-001):
#   * The S360-100-R4 schematic terminates every per-fan FanPWM control
#     net (`TachPMW1..4`) and every per-fan tach net (`Pul_Cou1..4`) plus
#     the shared `TachIO` passthrough directly at native ESP32-S3 GPIO.
#     The SX1509 (`U3`) I/O expander is removed from the S360-100 fan
#     signal path.
#   * The package composition under this product (`fan_pwm.yaml` ->
#     `fan_pwm_sx1509.yaml`) is therefore LEGACY / SUPERSEDED relative to
#     the canonical native ESP32-S3 GPIO map. It is NOT the current FanPWM
#     control / tach path.
#   * This product YAML is retained as a manual / no-WebFlash firmware
#     candidate against the legacy SX1509 composition; it MUST NOT be
#     presented as the current hardware path and MUST NOT be promoted to
#     WebFlash / release until the firmware has been re-bound against the
#     canonical native ESP32-S3 GPIO map, an `esphome compile` pass
#     validates that re-bind, and a bench session captures measured PWM /
#     current / thermal / RPM evidence.
#   * `Ceiling-POE-FanPWM` stays `status: hardware-pending`,
#     `webflash_build_matrix: false`, no `artifact_name`, no
#     `config/webflash-builds.json` row, `rpm_supported: false`.
#     `WEBFLASH-PWM-001` / `RELEASE-PWM-001` / `WF-IMPORT-PWM-001` stay
#     blocked.
# ----------------------------------------------------------------------------
# Product-layer YAML that composes the Sense360 Core ceiling + PoE PSU +
# base/health stack with the canonical PWM-drive-only FanPWM package
# `packages/expansions/fan_pwm.yaml` (four independent SX1509 PWM-drive
# fan-speed controllers; composes the neutral binding
# `packages/expansions/fan_pwm_sx1509.yaml`). The customer outcome is
# four-channel 12V PWM fan-speed control on the S360-311 Sense360 PWM
# board. PRODUCT-PWM-001 is the product-YAML-only / no-WebFlash-exposure
# slice that follows PACKAGE-PWM-001-IMPLEMENT-001 (PR #590, package
# layer), FW-COMPILE-PWM-001 (PR #591, compile-only target) and
# FW-COMPILE-PWM-RESULT-001 (PR #592, full-compile result).
#
# ----------------------------------------------------------------------------
# Status — what this YAML is NOT (read before installing or planning a build)
# ----------------------------------------------------------------------------
#
#   * Full-compile-validated (compile coverage only — NOT shipment
#     readiness). The full ESPHome compile of the PWM-drive-only FanPWM
#     composition is recorded green by the `Compile-only Firmware
#     Validation` run `26414398902` (`compile_mode=full`, 10 compile-only
#     targets, conclusion `success`; FW-COMPILE-PWM-RESULT-001 / PR #592),
#     and the FanPWM compile-only target carries
#     `compile_validation_status: validated-full-compile` with
#     `rpm_supported: false`. A clean full compile is NOT WebFlash
#     exposure, NOT a release artifact, and NOT hardware / bench / harness
#     proof; the bench caveats below still stand.
#
#   * NOT RPM support. The PWM-drive-only package exposes no per-fan and
#     no aggregate RPM and wires no `pulse_counter`. An SX1509 expander
#     pin is compile-proven unable to back an ESPHome `pulse_counter`
#     (PWM-SX1509-TACH-PROOF-001 / PR #589: `esphome config` rejects it
#     with `[sx1509] is an invalid option for [pin]`). This product makes
#     no RPM claim of any kind. The four `Pul_Cou1..4` lines stay as the
#     binding's INTERNAL diagnostic binary GPIO states, never surfaced as
#     RPM. Per-fan RPM is future work (COMPONENT-SX1509-TACH-001 or a
#     bench-confirmed TachIO follow-up).
#
#   * TachIO / GPIO16 reserved / pending. This product binds no TachIO
#     sensor and makes no aggregate-RPM claim; `TachIO` / `GPIO16` stays
#     reserved / pending.
#
#   * NOT WebFlash-exposed. There is no `products/webflash/` wrapper for
#     this product, no `config/webflash-builds.json` row, no
#     `config/product-catalog.json` `webflash_build_matrix: true` flip,
#     and no `artifact_name`. WebFlash exposure is owned by a separate
#     `WEBFLASH-PWM-001` slice. See
#     `docs/webflash-exposure-readiness-matrix.md` §PWM / S360-311
#     WebFlash posture.
#
#   * NOT a default / recommended / general-user kit. This is an advanced
#     four-channel PWM fan-driver concept, NOT a default bathroom option.
#     The default sellable bathroom kit stays `S360-KIT-BATH-POE` mapped
#     to Release-One `Ceiling-POE-VentIQ-RoomIQ`.
#
#   * NOT a release artifact. PRODUCT-PWM-001 does not build a `.bin`,
#     does not tag a release, does not author release notes, and does not
#     attach checksums or a build-info manifest. `RELEASE-PWM-001` stays
#     BLOCKED. The product YAML is the only deliverable; consumers compile
#     their own firmware.
#
#   * NOT compliance-certified. The S360-311 is a SELV low-voltage board
#     (5 V in → 12 V boost out via the MT3608); there is no mains path, so
#     `COMPLIANCE-001` (mains UK/EU) does not gate FanPWM. No board-level
#     thermal / EMI / EMC certification is claimed by this YAML.
#
#   * NOT hardware-stable-ready. `S360-311` `schematic_status` stays
#     `cataloged_unverified`. Compile and package coverage say nothing
#     about bench / harness / silkscreen evidence. This YAML is NOT
#     product-release approval.
#
# ----------------------------------------------------------------------------
# Bench caveats that MUST be honoured before relying on this product
# ----------------------------------------------------------------------------
#
# PWM polarity pending:
#   Whether the SX1509 PWM-drive output is the correct polarity for the
#   fan's PWM input (and whether any inversion / pull-up is required on
#   the `TachPMW*` gate path) is NOT bench-confirmed. Confirm PWM polarity
#   on the bench against the actual fan before relying on speed control.
#
# Per-fan / aggregate current and thermal envelope pending:
#   The per-fan current budget, the MT3608 boost output-current ceiling,
#   the multi-fan aggregate load, and the locked-rotor / inrush envelope
#   are NOT specified and NOT bench-characterised. Do not load the four
#   channels to an un-characterised current / thermal envelope.
#
# Product bench not complete:
#   The S360-311 / FanPWM product bench is NOT complete. This product YAML
#   exists for manual / custom compile-your-own use; it is not a
#   bench-signed-off product.
#
# ----------------------------------------------------------------------------
# Compatibility rules (see docs/release-one.md):
# - Fan driver variants (FanRelay/FanPWM/FanDAC/FanTRIAC) are
#   firmware-distinct and not interchangeable. This product ships FanPWM
#   only. Any future `FanPWM`-bearing config is mutually exclusive with
#   `FanRelay` / `FanDAC` / `FanTRIAC` (the fan-driver `max-one-of` rule).
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af) — schematic
#                  verification pending; this product does NOT close that.
# - Air Quality  : not included     (no AirIQ / no VentIQ)
# - Room Sense   : not included     (no RoomIQ token in config string)
# - Fan Driver   : Sense360 PWM     (S360-311, four SX1509 PWM-drive
#                                    outputs; PWM-drive-only, no RPM)
# - LED          : not included     (no LED token in config string)
#
# Cross-references:
#   - docs/product-readiness-matrix.md §FanPWM / S360-311
#   - docs/webflash-exposure-readiness-matrix.md §PWM / S360-311 WebFlash posture
#   - docs/release-artifact-readiness-matrix.md §PWM / S360-311 release posture
#   - docs/hardware/s360-311-r4-pwm.md
#   - packages/expansions/fan_pwm.yaml -> packages/expansions/fan_pwm_sx1509.yaml
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: main
#       files:
#         - products/sense360-ceiling-poe-fanpwm.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-pwm-fan
#     friendly_name: "PWM Fan Sense360"
# ============================================================================

substitutions:
  # === Device Configuration ===
  # ESPHome hostnames are limited to 31 chars; this is the shortened
  # hostname only. Customer-facing narrative stays outcome-first
  # ("PWM fan-speed control") rather than loose board naming.
  device_name: s360-ceil-poe-fanpwm
  friendly_name: Sense360 Ceiling PWM Fan
  device_sku: S360-CORE-C-POE
  device_version: "1.0.0"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  # Explicit literal so the fallback AP SSID stays short, human-readable,
  # and under ESPHome's 32-character AP SSID limit regardless of how
  # `device_name` is later edited. Distinct from Release-One and the
  # FanDAC / FanRelay siblings so devices on the same network do not
  # collide at provisioning time.
  fallback_ssid: "S360 POE FanPWM"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === FanPWM binding ===
  # The FanPWM package (packages/expansions/fan_pwm.yaml) composes the
  # neutral binding packages/expansions/fan_pwm_sx1509.yaml, which binds
  # the SX1509 expander hub to the shared `core_i2c` bus inherited from
  # the Core abstract package (CORE-ABSTRACT-BUS-001B). The four PWM-drive
  # outputs (fan_pwm_drive_1..4 on SX1509 channels 0..3) and the speed
  # step count come from the package substitutions; do NOT hard-code them
  # here. No RPM, no pulse_counter; TachIO / GPIO16 stays reserved.

# ============================================================================
# PACKAGE INCLUDES
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  # Provides the shared `core_i2c` bus the SX1509 expander binds to.
  core_hardware: !include ../../packages/hardware/sense360_core_ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_config: !include ../../packages/hardware/power_poe.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included. A LED-bearing variant would be a separate
  # scoped slice with a distinct config string.

  # === Sense360 PWM (S360-311, four SX1509 PWM-drive outputs) ===
  # PWM-drive-only canonical FanPWM package. Composes the neutral binding
  # fan_pwm_sx1509.yaml (SX1509 hub on `core_i2c`, four fan_pwm_drive_1..4
  # PWM outputs on channels 0..3). Exposes four fan_pwm_1..4 speed
  # controllers. No RPM, no pulse_counter; TachIO / GPIO16 reserved. Do
  # NOT hard-code its substitutions here. PACKAGE-PWM-001-IMPLEMENT-001 /
  # PR #590 implemented the package at the package layer; PRODUCT-PWM-001
  # (this product YAML) is the product-layer slice and adds NO WebFlash
  # exposure / release artifact / build-matrix row. The full ESPHome
  # compile of this composition is validated by run 26414398902 (see
  # header full-compile-validated caveat).
  fan_pwm_module: !include ../../packages/expansions/fan_pwm.yaml

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Product Config"
    lambda: |-
      return {"Ceiling-POE-FanPWM"};
    update_interval: never
    entity_category: diagnostic
