# ============================================================================
# SENSE360 PWM FAN-CONTROL ROOM-BUNDLE PRODUCT (ROOM-BUNDLE-FAN-CONFIGS-001)
# ============================================================================
# Kitchen room-bundle sibling of the preview product
# `products/sense360-ceiling-poe-airiq-roomiq.yaml` that additionally composes
# the native FanPWM package `packages/expansions/fan_pwm_native.yaml` (S360-311
# Sense360 PWM) so the full Kitchen bundle (AirIQ + RoomIQ) gains four-channel
# low-voltage / DC PWM extract / boost control.
#
# This is the full-composition firmware config for the OPTIONAL, policy-gated
# `S360-KIT-KITCHEN-P-PWM` preview bundle variant defined in
# `config/room-bundle-fan-variants.json` (ROOM-BUNDLE-FAN-VARIANTS-002),
# framed as low-voltage / custom extract / MVHR boost — NOT generic cooker-hood
# control. It carries the Kitchen room-sensing modules (AirIQ + RoomIQ) PLUS the
# FanPWM driver; it is NOT the fan-only `Ceiling-POE-FanPWM` config (which omits
# the room modules and is deliberately NOT substituted for a room-bundle SKU).
#
# Status — what this YAML is NOT:
#
#   * NOT Release-One stable. Release-One stays `Ceiling-POE-VentIQ-RoomIQ` on
#     the `stable` channel. This is a preview sibling and does NOT change it.
#   * NOT compile-validated yet. ROOM-BUNDLE-FAN-CONFIGS-001 authored this
#     full-composition YAML and registered the matching compile-only target
#     `ceiling-poe-airiq-fanpwm-roomiq-compile-only`
#     (`compile_validation_status: pending-ci`); the hosted ESPHome compile
#     dry-run is queued, not yet run (ESPHome CLI was unavailable and no
#     compile is fabricated). GPIO compatibility is structurally verified: the
#     native FanPWM pins (IO9/IO10/IO11/IO12/IO16/IO17/IO18/IO39) do not collide
#     with AirIQ / RoomIQ (I2C-only on `core_i2c`) or the Core relay/UART pins.
#   * NOT WebFlash-exposed. No `products/webflash/` wrapper, no
#     `config/webflash-builds.json` row, no `webflash_build_matrix: true`, no
#     `artifact_name`, no release artifact.
#   * NOT a default / recommended kit / not in `release_one_required_configs`.
#     The `S360-KIT-KITCHEN-P-PWM` variant stays `waitlist-only` (hidden / not
#     buyable) AND is policy-gated (it may be dropped if low-voltage / custom
#     kitchen extract use is not approved). The default sellable bathroom kit
#     remains `S360-KIT-BATH-POE` mapped to Release-One.
#   * NOT compliance-certified, NOT hardware verified. S360-311 is a SELV
#     low-voltage / DC board; no bench / current / thermal evidence is claimed.
#   * NO RPM. The native FanPWM package exposes no per-fan or aggregate RPM.
#   * The base Kitchen bundle `Ceiling-POE-AirIQ-RoomIQ` is itself a preview /
#     stable-candidate (release-blocked on S360-410 + AirIQ sensor-stack bench
#     evidence); this fan sibling inherits those blockers.
#   * FanTRIAC stays blocked under HW-005; LED is intentionally omitted.
#
# ----------------------------------------------------------------------------
# Bundle configuration (this YAML):
# - Mount       : Ceiling
# - Power       : POE  (IEEE 802.3af)
# - Air Quality : AirIQ (full indoor air-quality stack)
# - Room Sense  : RoomIQ (comfort + presence)
# - Fan Driver  : FanPWM (S360-311, four native ESP32-S3 ledc PWM-drive outputs)
# - LED         : not included
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive; this bundle uses AirIQ.
# - RoomIQ can be combined with either AirIQ or VentIQ.
# - Fan driver variants (FanRelay/FanPWM/FanDAC/FanTRIAC) are firmware-distinct
#   and not interchangeable. This sibling ships FanPWM.
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af) — schematic
#                  verification pending (PRODUCT-POE-410-001).
# - Air Quality  : Sense360 AirIQ   (S360-210-R4, full ceiling air-quality stack)
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - Fan Driver   : Sense360 PWM     (S360-311, four native ledc PWM outputs)
# - LED          : not included
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: main
#       files:
#         - products/sense360-ceiling-poe-airiq-fanpwm-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-kitchen-pwm
#     friendly_name: "Kitchen Sense360 PWM"
# ============================================================================

substitutions:
  # === Device Configuration ===
  device_name: s360-ceil-poe-airiq-rm-pwm
  friendly_name: Sense360 Ceiling Kitchen PWM
  device_sku: S360-CORE-C-POE
  device_version: "1.0.0"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  fallback_ssid: "S360 AirIQ RoomIQ PWM"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Compile-time capability declaration for the shared device framework
  # (packages/base/device_framework.yaml). Values must match this config
  # string's entry in config/core-framework.json — enforced by
  # tests/test_core_framework.py. These are compile-time composition
  # facts only; no runtime hardware autodetection is claimed.
  s360_config_string: "Ceiling-POE-AirIQ-FanPWM-RoomIQ"
  s360_hardware_model: "S360-100"
  s360_hardware_revision: "R4"
  s360_capabilities: "core,power_poe,airiq,fan_pwm,roomiq,presence"
  s360_capabilities_human: "Core, PoE power, AirIQ, Fan (PWM), RoomIQ, Presence"
  s360_module_airiq: "Included"
  s360_module_fan_control: "Included"
  s360_module_roomiq: "Included"
  s360_module_presence: "Included"

  # === FanPWM binding ===
  # The native FanPWM package binds four ESP32-S3 ledc PWM-drive outputs
  # (IO10/IO11/IO12/IO39) and three internal diagnostic pulse_counter tach
  # inputs (IO17/IO18/IO9). None of these pins collide with AirIQ / RoomIQ
  # (I2C-only on core_i2c) or the Core relay/UART pins; do NOT re-bind them here.

# ============================================================================
# PACKAGE INCLUDES (board layer + base + profiles)
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  # Board package wraps packages/hardware/sense360_core_ceiling.yaml; defines
  # the shared `core_i2c` bus AirIQ + RoomIQ bind.
  core_board: !include ../../packages/boards/s360-100-core-ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_board: !include ../../packages/boards/s360-410-poe-psu.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included.

  # === Sense360 AirIQ (S360-210, full indoor air-quality stack) ===
  # AirIQ and VentIQ are mutually exclusive; this bundle ships AirIQ.
  airiq_board: !include ../../packages/boards/s360-210-airiq.yaml
  airiq_profile: !include ../../packages/features/airiq_basic_profile.yaml

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  roomiq_board: !include ../../packages/boards/s360-200-roomiq.yaml
  roomiq_comfort_profile: !include ../../packages/features/comfort_basic_profile.yaml
  # === Sense360 Presence framework (PRESENCE-FRAMEWORK-001) ===
  # Tri-sensor customer Presence experience: PIR (immediate movement) +
  # LD2450 (radar half above) + SEN0609 (static presence), fused by
  # packages/features/presence_framework.yaml (supersedes the legacy
  # presence_basic_profile in bundles; legacy products keep the profile).
  roomiq_pir_board: !include ../../packages/boards/s360-200-roomiq-pir.yaml
  roomiq_sen0609_board: !include ../../packages/boards/s360-200-roomiq-sen0609.yaml
  roomiq_presence_framework: !include ../../packages/features/presence_framework.yaml

  # === Sense360 PWM (S360-311, four native ledc PWM-drive fan outputs) ===
  # Native ESP32-S3 GPIO PWM path (SX1509-RECONCILE-001); the legacy SX1509
  # path is deprecated. No RPM is surfaced. PACKAGE-PWM-001 implemented the
  # package; this room-bundle product adds NO WebFlash exposure / release
  # artifact / build-matrix row.
  fan_pwm_module: !include ../../packages/expansions/fan_pwm_native.yaml

  # === Sense360 TRIAC (S360-320, AC phase-cut fan driver) ===
  # NOT included. The FanTRIAC slot remains blocked per HW-005.

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Shared identity / capability / module-status / health entities.
  framework: !include ../../packages/base/device_framework.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Product Config"
    lambda: |-
      return {"Ceiling-POE-AirIQ-FanPWM-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
