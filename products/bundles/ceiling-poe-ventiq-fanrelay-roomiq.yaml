# ============================================================================
# SENSE360 RELAY FAN-CONTROL SIBLING PRODUCT (PRODUCT-RELAY-001)
# ============================================================================
# Sibling of the Release-One product
# `products/sense360-ceiling-poe-ventiq-roomiq.yaml` that additionally
# composes the FanRelay package
# `packages/expansions/fan_relay.yaml` (S360-310 Sense360 Relay) to drive a
# single-speed (on/off) fan via the on-board relay K1.
#
# Status — what this YAML is NOT:
#
#   * NOT Release-One stable. Release-One stays
#     `Ceiling-POE-VentIQ-RoomIQ` (no fan-driver firmware) on the `stable`
#     channel. This YAML is an advanced / manual-warning-only sibling and
#     does NOT change Release-One.
#   * NOT WebFlash-shippable. No `products/webflash/` wrapper exists for
#     this product, no `config/webflash-builds.json` entry exists, no
#     `config/product-catalog.json` row sets `webflash_build_matrix: true`,
#     no `artifact_name` is declared, no release artifact has been built.
#     PRODUCT-RELAY-001 explicitly does not add a WebFlash wrapper or
#     promote the catalog entry to WebFlash exposure — that work belongs
#     to a separate `WEBFLASH-RELAY-001` slice gated additionally on
#     production-wide hardware characterisation, installation / safety
#     wording, competent-person sign-off, and WebFlash-side
#     manual-warning UX parity. See
#     `docs/webflash-exposure-readiness-matrix.md` §Relay / S360-310
#     WebFlash posture.
#   * NOT a default kit / not a recommended config / not in
#     `release_one_required_configs`. The `S360-KIT-BATH-RELAY` kit in
#     `config/kit-intent-matrix.json` stays
#     `tier: future-expansion`, `lifecycle_status: hardware-pending`,
#     `webflash_exposure_allowed_now: false`,
#     `stable_ready_now: false`. The default sellable bathroom kit
#     remains `S360-KIT-BATH-POE` mapped to Release-One.
#   * NOT compliance-certified. The contact-rating evidence captured by
#     `S360-310-BENCH-EVIDENCE-001` / PR #561 is public-reference only and
#     is explicitly NOT board-level mains-safety / installation-approval
#     / creepage / clearance / thermal / EMI / EMC certification. No
#     compliance claim is made by this YAML.
#   * NO release artifact. PRODUCT-RELAY-001 does not build a `.bin`,
#     does not tag a release, does not author release notes, does not
#     attach checksums, and does not import to WebFlash.
#   * NO LED. The Sense360 LED ring (S360-300) is intentionally omitted;
#     the LED-bearing sibling is the separate
#     `products/sense360-ceiling-poe-ventiq-roomiq-led.yaml`.
#   * FanTRIAC stays blocked under HW-005. This YAML uses FanRelay
#     instead — on/off contact-side switching, not phase-cut dimming.
#
# ----------------------------------------------------------------------------
# ADVANCED / MANUAL-WARNING wiring caveats — please read before installing
# ----------------------------------------------------------------------------
#
# Mains switching / bathroom fan-control path:
#   The FanRelay package binds the on-board K1 relay
#   (`relay_pin: ${relay_pin}`, schematic-correct GPIO3 per S360-100-R4
#   IO3 after `CORE-ABSTRACT-BUS-001A` / PR #558). K1 is a Songle
#   SRD-05VDC-SL-C with a public-reference contact rating of
#   10 A @ 250 VAC; 10 A @ 30 VDC. Common bathroom-fan use (e.g. a UK
#   Manrose MT100S-class extractor) switches mains AC through this
#   contact. Mains switching is NOT a SELV path.
#
# Installation by competent person where required:
#   Where mains AC switching is in scope, installation MUST be performed
#   by a competent person per the applicable jurisdiction
#   (e.g. UK Building Regulations Part P-equivalent). Wire isolation,
#   creepage / clearance, supplementary protection, derating against the
#   actual load (start-up surge, motor inrush, capacitive load,
#   inductive flyback), enclosure rating, and earth-bond integrity are
#   all the installer's responsibility. The PCB-mounted K1 contact alone
#   is NOT a substitute for in-line fusing, isolation, or local
#   disconnection per the applicable wiring regulations.
#
# Not WebFlash exposed:
#   No WebFlash flasher entry exists for this product. Installation is
#   manual: pin to a release tag in your own ESPHome project as shown in
#   "Customer usage" below.
#
# Not a default kit:
#   The default Sense360 bathroom kit is `S360-KIT-BATH-POE` mapped to
#   Release-One `Ceiling-POE-VentIQ-RoomIQ` (no fan driver). The Relay
#   bathroom kit `S360-KIT-BATH-RELAY` stays `future-expansion` /
#   `hardware-pending` and is not the default sellable kit.
#
# Not a release artifact:
#   PRODUCT-RELAY-001 does not produce a signed `.bin`, does not tag a
#   release, and does not import to WebFlash. The product YAML is the
#   only deliverable; consumers compile their own firmware.
#
# Not a compliance certification:
#   The package-evidence-layer operator self-report "as per UK standards"
#   in `S360-310-BENCH-EVIDENCE-001` is NOT an independent compliance
#   sign-off and is NOT a competent-person caveat. Mains-voltage
#   compliance for the S360-310 contact-side path remains the
#   installer's responsibility. PoE is SELV and is not in scope for
#   COMPLIANCE-001; the FanRelay contact-side mains path is.
#
# Advanced / manual-warning only:
#   This product is policy-recorded as
#   `advanced/manual-warning-only` in
#   `docs/product-readiness-matrix.md` §FanRelay / S360-310 (refreshed
#   by `PRODUCT-RELAY-001-READINESS-REFRESH` / PR #563). It is
#   explicitly NOT a `preview-candidate` for standard WebFlash surfacing
#   because a mains-switching driver without installation / safety
#   wording or a competent-person caveat is not appropriate for the
#   standard exposure ladder.
#
# Cross-references:
#   - docs/product-readiness-matrix.md §FanRelay / S360-310
#   - docs/webflash-exposure-readiness-matrix.md §Relay / S360-310 WebFlash posture
#   - docs/release-artifact-readiness-matrix.md §Relay / S360-310 release posture
#   - docs/hardware/s360-310-r4-relay.md
#   - docs/hardware/package-readiness-matrix.md §fan_relay.yaml / S360-310
#   - packages/expansions/fan_relay.yaml
#
# ----------------------------------------------------------------------------
# Sibling configuration (this YAML):
# - Mount       : Ceiling
# - Power       : POE  (IEEE 802.3af)
# - Air Quality : VentIQ (bathroom-focused — replaces AirIQ)
# - Room Sense  : RoomIQ (comfort + presence)
# - Fan Driver  : FanRelay (S360-310, on/off via on-board K1)
# - LED         : not included
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive.
# - VentIQ is the bathroom-focused air-quality module.
# - RoomIQ can be combined with either AirIQ or VentIQ.
# - Fan driver variants (FanRelay/FanPWM/FanDAC/FanTRIAC) are firmware-distinct
#   and not interchangeable. This sibling ships FanRelay; FanPWM / FanDAC /
#   FanTRIAC products are separate gated slices.
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af)
# - Air Quality  : Sense360 VentIQ  (S360-211, bathroom-focused) — schematic verification pending
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - Fan Driver   : Sense360 Relay   (S360-310, on-board K1 on Core; mains-switching contact)
# - LED          : not included     (LED-bearing sibling is sense360-ceiling-poe-ventiq-roomiq-led.yaml)
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: main
#       files:
#         - products/sense360-ceiling-poe-ventiq-fanrelay-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-bath-relay
#     friendly_name: "Bathroom Sense360 Relay"
# ============================================================================

substitutions:
  # === Device Configuration ===
  # ESPHome hostnames are limited to 31 chars; this is the shortened hostname
  # only. The matching `S360-KIT-BATH-RELAY` kit narrative stays
  # outcome-first ("Relay fan control") rather than loose board naming.
  device_name: s360-ceil-poe-ventiq-rm-fr
  friendly_name: Sense360 Ceiling Bathroom Relay
  device_sku: S360-CORE-C-POE
  device_version: "1.0.0"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  # Explicit literal so the fallback AP SSID is short, human-readable, and
  # under ESPHome's 32-character AP SSID limit regardless of how
  # `device_name` is later edited. Distinct from Release-One's
  # `S360 VentIQ RoomIQ` and the LED preview's
  # `S360 VentIQ RoomIQ LED` so devices on the same network don't collide
  # at provisioning time.
  fallback_ssid: "S360 VentIQ RoomIQ Relay"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === VentIQ (bathroom) thresholds ===
  shower_humidity_threshold: "75"
  shower_humidity_rate: "5"
  mold_risk_humidity: "65"
  mold_risk_duration_minutes: "30"

  # === FanRelay binding ===
  # The relay GPIO output is owned by the parent Core abstract package
  # `packages/hardware/sense360_core_ceiling.yaml`, which declares the
  # `main_relay` `switch.gpio` on `pin: ${relay_pin}` and binds
  # `relay_pin: GPIO3` (schematic-correct Relay net per S360-100-R4 IO3
  # after `CORE-ABSTRACT-BUS-001A` / PR #558). The FanRelay package
  # (packages/expansions/fan_relay.yaml) does NOT re-bind that GPIO; it
  # exposes a user-facing `fan_relay_switch` `template` switch that
  # proxies the Core `main_relay`, so the resolved relay pin has exactly
  # one owner (FW-COMPILE-RELAY-FULL-FIX-001 — fixes the GPIO3 double-bind
  # that a duplicate `switch.gpio` on `${relay_pin}` caused in the full
  # compile lane, run 26334334727). DO NOT hard-code `GPIO3` here — the
  # substitution chain must remain abstract so future Core rebinds
  # propagate without re-editing every product YAML. The
  # `tests/test_relay_product_readiness.py` `RelayProductGpio3Tests`
  # pins this guarantee.

# ============================================================================
# PACKAGE INCLUDES
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  core_hardware: !include ../../packages/hardware/sense360_core_ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_config: !include ../../packages/hardware/power_poe.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included for this sibling. The LED-bearing sibling
  # is `products/sense360-ceiling-poe-ventiq-roomiq-led.yaml`. Including
  # both LED and FanRelay would be a separate sibling
  # (`Ceiling-POE-VentIQ-FanRelay-RoomIQ-LED`) gated by its own scoped
  # PRODUCT-* slice and is NOT introduced by PRODUCT-RELAY-001.

  # === Sense360 VentIQ (S360-211, bathroom-focused air quality) ===
  # Package-level expected; schematic verification pending — no committed
  # S360-211 schematic in this repo. See docs/release-one-hardware-audit.md.
  # AirIQ and VentIQ are mutually exclusive; this sibling uses VentIQ.
  ventiq_module: !include ../../packages/expansions/airiq_bathroom_base.yaml
  ventiq_profile: !include ../../packages/features/bathroom_profile.yaml

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  # The package filenames (`comfort_ceiling.yaml`, `presence_ceiling.yaml`)
  # retain the legacy split-board naming and are kept for backwards
  # compatibility (see docs/webflash-contract.md §6 footnote).
  roomiq_comfort: !include ../../packages/expansions/comfort_ceiling.yaml
  roomiq_comfort_profile: !include ../../packages/features/comfort_basic_profile.yaml
  roomiq_presence: !include ../../packages/expansions/presence_ceiling.yaml
  roomiq_presence_profile: !include ../../packages/features/presence_basic_profile.yaml

  # === Sense360 Relay (S360-310, on-board K1, on/off fan-control) ===
  # The Core abstract package above owns the relay GPIO output as the
  # `main_relay` `switch.gpio` on `${relay_pin}` (post-CORE-ABSTRACT-BUS-001A
  # this resolves to GPIO3, schematic-correct Relay net per S360-100-R4 IO3).
  # The FanRelay package exposes the relay as the `fan_relay_switch`
  # `template` switch that proxies that single `main_relay` GPIO owner — see
  # packages/expansions/fan_relay.yaml. PACKAGE-RELAY-001 / PR #562
  # implemented the package at the package layer only; PRODUCT-RELAY-001
  # (this product YAML) is the product-layer slice and does NOT add
  # WebFlash exposure / release artifact / build-matrix row.
  fan_relay_module: !include ../../packages/expansions/fan_relay.yaml

  # === Sense360 TRIAC (S360-320, AC phase-cut fan driver) ===
  # NOT included. The FanTRIAC slot remains blocked per HW-005:
  #   - S360-320 schematic uncommitted at the time of writing.
  #   - Placeholder GPIO5/GPIO6 collide with RoomIQ J10 nets.
  #   - ESPHome's `ac_dimmer` driver requires direct interrupt-capable
  #     ESP32 GPIOs; SX1509 expander pins cannot meet the timing.
  # See: docs/release-one-hardware-audit.md#fantriac-mapping-resolution

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Product Config"
    lambda: |-
      return {"Ceiling-POE-VentIQ-FanRelay-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
