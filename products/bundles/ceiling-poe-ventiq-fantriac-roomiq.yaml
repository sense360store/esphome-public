# ============================================================================
# SENSE360 RELEASE-ONE PRODUCT
# ============================================================================
# WebFlash config string : Ceiling-POE-VentIQ-FanTRIAC-RoomIQ
# WebFlash artifact name  : Sense360-Ceiling-POE-VentIQ-FanTRIAC-RoomIQ-vX.Y.Z-{channel}.bin
#
# Release-One ship configuration:
# - Mount       : Ceiling
# - Power       : POE  (IEEE 802.3af)
# - Air Quality : VentIQ (bathroom-focused — replaces AirIQ)
# - Fan Driver  : FanTRIAC (AC phase-cut dimming)
# - Room Sense  : RoomIQ  (comfort + presence)
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive.
# - VentIQ is the bathroom-focused air-quality module.
# - RoomIQ can be combined with either AirIQ or VentIQ.
# - Fan driver variants (FanRelay/FanPWM/FanDAC/FanTRIAC) are firmware-distinct.
# - FanTRIAC is NOT interchangeable with FanRelay/FanPWM/FanDAC.
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af)
# - Air Quality  : Sense360 VentIQ  (S360-211, bathroom-focused) — schematic verification pending
# - Fan Driver   : Sense360 TRIAC   (S360-320, AC phase-cut) — pin mapping unverified, see audit
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - LED          : not included     (Sense360 LED S360-300 is an optional add-on;
#                                    config string `Ceiling-POE-VentIQ-FanTRIAC-RoomIQ`
#                                    does not carry the `LED` token)
#
# Hardware audit: docs/release-one-hardware-audit.md
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: v1.0.0
#       files:
#         - products/sense360-ceiling-poe-ventiq-fantriac-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-bathroom
#     friendly_name: "Bathroom Sense360"
# ============================================================================

substitutions:
  # === Device Configuration ===
  # BLOCKED / REFERENCE ONLY — this product is NOT in the WebFlash build
  # matrix (see header). Shortened hostname so the YAML still parses past
  # ESPHome's 31-char hostname check; this does not unblock FanTRIAC.
  device_name: s360-ceil-poe-ventiq-triac
  friendly_name: Sense360 Ceiling Bathroom
  device_sku: S360-CORE-C-POE
  device_version: "1.0.0"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  # NOTE: This product is BLOCKED / REFERENCE-ONLY (HW-005) and MUST NOT
  # ship as TRIAC-capable. See the FanTRIAC pins comment block below and
  # docs/release-one-hardware-audit.md#fantriac-mapping-resolution.
  #
  # The base wifi package (packages/base/wifi.yaml) defaults fallback_ssid
  # to '${device_name} FB'. The historical device_name
  # ('sense360-ceiling-poe-ventiq-fantriac-roomiq') made that resolve to
  # 46 chars; even the shortened device_name above
  # ('s360-ceil-poe-ventiq-triac', 26 chars) still benefits from an
  # explicit literal so this blocked/reference YAML continues to parse
  # past ESPHome's 32-character AP SSID limit. The override exists ONLY
  # so that ESPHome config validation in tests/CI can parse this YAML
  # while the FanTRIAC blocker remains open; it does not make this build
  # production-eligible.
  fallback_ssid: "S360 TRIAC BLOCKED"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === VentIQ (bathroom) thresholds ===
  shower_humidity_threshold: "75"
  shower_humidity_rate: "5"
  mold_risk_humidity: "65"
  mold_risk_duration_minutes: "30"

  # === FanTRIAC pins ===
  # BLOCKED / UNVERIFIED (HW-005) — must not ship as FanTRIAC-capable.
  # See: docs/hardware/s360-100-core-connector-pin-map.md (J15, authoritative)
  #      and docs/hardware/s360-320-r4-triac.md (HW-PINMAP-320 audit).
  #
  # The S360-100-R4 Core uses native ESP32-S3 GPIO (no SX1509 expander), but
  # the committed Core pin-map marks the ESP32-side source pins for the J15
  # TRIAC nets TRI_GPIO1 / TRI_GPIO2 as TBD, pending a KiCad/silkscreen-
  # confirmed assignment. No FanTRIAC pin mapping is schematic-backed.
  #
  # A prior change (TRIAC-UNBLOCK-BUILD-001) assigned TRI_GPIO1 -> IO13 and
  # TRI_GPIO2 -> IO14 and flipped this build to compile-only; that mapping was
  # NOT backed by a committed schematic and has been reverted
  # (TRIAC-REBLOCK-PINMAP-001). Note GPIO14 is the Core WS2812B LED-ring data
  # line (led_data_pin in packages/hardware/sense360_core_ceiling_s3.yaml), so
  # it is not free for the TRIAC zero-cross.
  #
  # Do NOT invent GPIOs to "fix" this. Resolution requires a KiCad-confirmed
  # TRI_GPIO1 / TRI_GPIO2 source-pin assignment. The placeholder values below
  # are parse-only so this reference YAML still parses; firmware compiled from
  # this YAML must NOT be published as TRIAC-capable.
  fan_triac_gate_pin: GPIO5
  fan_triac_zc_pin: GPIO6
  fan_triac_line_frequency: "50"

# ============================================================================
# PACKAGE INCLUDES
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  core_hardware: !include ../../packages/hardware/sense360_core_ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_config: !include ../../packages/hardware/power_poe.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included for Release-One.
  # WebFlash config string `Ceiling-POE-VentIQ-FanTRIAC-RoomIQ` does not carry
  # the `LED` token (LED is a separately selectable module per WebFlash
  # taxonomy — see docs/webflash-contract.md §3). A future LED-included
  # variant would use a distinct config string such as
  # `Ceiling-POE-VentIQ-FanTRIAC-RoomIQ-LED` and a distinct artifact name.
  # See docs/release-one-hardware-audit.md (Sense360 LED row) for the policy
  # decision and follow-ups.

  # === Sense360 VentIQ (S360-211, bathroom-focused air quality) ===
  # Package-level expected; schematic verification pending — no committed
  # S360-211 schematic in this repo. See docs/release-one-hardware-audit.md.
  # AirIQ and VentIQ are mutually exclusive; Release-One uses VentIQ.
  ventiq_module: !include ../../packages/expansions/airiq_bathroom_base.yaml
  ventiq_profile: !include ../../packages/features/bathroom_profile.yaml

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  # The package filenames (`comfort_ceiling.yaml`, `presence_ceiling.yaml`)
  # retain the legacy split-board naming and are kept for backwards
  # compatibility (see docs/webflash-contract.md §6 footnote).
  roomiq_comfort: !include ../../packages/expansions/comfort_ceiling.yaml
  roomiq_comfort_profile: !include ../../packages/features/comfort_basic_profile.yaml
  roomiq_presence: !include ../../packages/expansions/presence_ceiling.yaml
  roomiq_presence_profile: !include ../../packages/features/presence_basic_profile.yaml

  # === Sense360 TRIAC (S360-320, AC phase-cut fan driver) ===
  # Pin mapping unverified; see substitutions block above and
  # docs/release-one-hardware-audit.md (FanTRIAC row).
  fan_module: !include ../../packages/expansions/fan_triac.yaml
  fan_profile: !include ../../packages/features/fan_control_profile.yaml

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} WebFlash Config"
    lambda: |-
      return {"Ceiling-POE-VentIQ-FanTRIAC-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
