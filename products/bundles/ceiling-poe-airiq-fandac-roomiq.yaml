# ============================================================================
# SENSE360 0-10V (DAC) FAN-CONTROL ROOM-BUNDLE PRODUCT (ROOM-BUNDLE-FAN-CONFIGS-001)
# ============================================================================
# Kitchen room-bundle sibling of the preview product
# `products/sense360-ceiling-poe-airiq-roomiq.yaml` that additionally composes
# the FanDAC package `packages/expansions/fan_dac.yaml` -> `fan_gp8403.yaml`
# (S360-312 Sense360 DAC) so the full Kitchen bundle (AirIQ + RoomIQ) gains
# 0-10V analog extract / MVHR / EC fan-boost control.
#
# This is the full-composition firmware config for the
# `S360-KIT-KITCHEN-P-DAC` preview bundle variant defined in
# `config/room-bundle-fan-variants.json` (ROOM-BUNDLE-FAN-VARIANTS-002). It
# carries the Kitchen room-sensing modules (AirIQ + RoomIQ) PLUS the FanDAC
# driver; it is NOT the fan-only `Ceiling-POE-FanDAC` config (which omits the
# room modules and is deliberately NOT substituted for a room-bundle SKU).
#
# ----------------------------------------------------------------------------
# *** REQUIRED FanDAC I2C ADDRESS SWITCH SETTING — READ BEFORE INSTALLING ***
# ----------------------------------------------------------------------------
# The S360-312 FanDAC board carries TWO GP8403 DACs whose package defaults are
# IC1 @ 0x58 and IC2 @ 0x59. The AirIQ module carries an SGP41 VOC/NOx sensor
# at I2C 0x59 on the SAME shared `core_i2c` bus. So the FanDAC default
# (IC2 @ 0x59) WOULD COLLIDE with the AirIQ SGP41.
#
# This is exactly why `config/webflash-compatibility.json` carries the
# `fandac_conflicts_with_airiq` WebFlash-token mutex: the one-click WebFlash
# easy-mode surface cannot set DIP switches, so AirIQ + FanDAC stays excluded
# there. This advanced / manual room-bundle preview is the DOCUMENTED
# address-overridden exception: it overrides the second GP8403 to 0x5A
# (`fan_dac_2_i2c_address: "0x5A"`, see substitutions below) and REQUIRES the
# installer to set the S360-312 IC2 DIP switch (SW2) so IC2 reports 0x5A
# (A1 = 1; A0 = A2 = 0), NOT the 0x59 default. IC1 (SW1) stays at 0x58.
#
# Required FanDAC address map when an AirIQ/VentIQ air-quality module is present:
#   - GP8403 IC1 (SW1): 0x58   (unchanged; no SGP41 collision)
#   - GP8403 IC2 (SW2): 0x5A   (REQUIRED override; 0x59 is FORBIDDEN here)
#   - SGP41 (AirIQ):    0x59   (fixed; owned by the air-quality module)
#
# This required DIP-switch mapping is NOT yet bench-verified: the
# DIP-position -> 7-bit address truth table for S360-312 is still owed by the
# `FANDAC-I2C-ADDR-001` hardware follow-up (physically confirm SW1=0x58 + SW2=0x5A
# on the shared `core_i2c` bus with AirIQ/VentIQ present). Until then this config
# is preview / advanced-manual only and is gated behind that documented switch
# requirement; see docs/hardware/s360-312-r4-fandac.md §FANDAC-I2C-ADDR-001.
#
# Status — what this YAML is NOT:
#
#   * NOT Release-One stable. Release-One stays `Ceiling-POE-VentIQ-RoomIQ` on
#     the `stable` channel. This is a preview sibling and does NOT change it.
#   * NOT compile-validated yet. ROOM-BUNDLE-FAN-CONFIGS-001 authored this
#     full-composition YAML and registered the matching compile-only target
#     `ceiling-poe-airiq-fandac-roomiq-compile-only`
#     (`compile_validation_status: pending-ci`); the hosted ESPHome compile
#     dry-run is queued, not yet run (ESPHome CLI was unavailable and no
#     compile is fabricated).
#   * NOT WebFlash-exposed and NOT in the WebFlash firmware-combination matrix.
#     The `fandac_conflicts_with_airiq` token mutex keeps AirIQ + FanDAC out of
#     the one-click WebFlash grammar (which cannot encode the DIP-switch
#     override). No `products/webflash/` wrapper, no `config/webflash-builds.json`
#     row, no `webflash_build_matrix: true`, no `artifact_name`, no release
#     artifact.
#   * NOT a default / recommended kit / not in `release_one_required_configs`.
#     The `S360-KIT-KITCHEN-P-DAC` variant stays `waitlist-only` (hidden / not
#     buyable). The default sellable bathroom kit remains `S360-KIT-BATH-POE`
#     mapped to Release-One.
#   * NOT compliance-certified, NOT hardware verified. The 0-10V analog output
#     is SELV control signalling, not a mains path, but no compliance approval
#     and no bench evidence is claimed. S360-312 stays
#     `schematic_status: cataloged_unverified`.
#   * The base Kitchen bundle `Ceiling-POE-AirIQ-RoomIQ` is itself a preview /
#     stable-candidate (release-blocked on S360-410 + AirIQ sensor-stack bench
#     evidence); this fan sibling inherits those blockers and adds the
#     FANDAC-I2C-ADDR-001 address-bench + DAC-harness blockers on top.
#   * NO per-output range mixing on one GP8403. FanTRIAC stays blocked under
#     HW-005; LED is intentionally omitted.
#
# ----------------------------------------------------------------------------
# Bundle configuration (this YAML):
# - Mount       : Ceiling
# - Power       : POE  (IEEE 802.3af)
# - Air Quality : AirIQ (full indoor air-quality stack)
# - Room Sense  : RoomIQ (comfort + presence)
# - Fan Driver  : FanDAC (S360-312, two GP8403 DACs / four 0-10V outputs;
#                 IC2 relocated to 0x5A)
# - LED         : not included
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive; this bundle uses AirIQ.
# - RoomIQ can be combined with either AirIQ or VentIQ.
# - Fan driver variants (FanRelay/FanPWM/FanDAC/FanTRIAC) are firmware-distinct
#   and not interchangeable. This sibling ships FanDAC.
# - FanDAC IC2 must NOT sit at 0x59 alongside the AirIQ SGP41 (see the REQUIRED
#   address switch section above); this is the address-precise refinement of
#   the `fandac_conflicts_with_airiq` mutex.
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af) — schematic
#                  verification pending (PRODUCT-POE-410-001).
# - Air Quality  : Sense360 AirIQ   (S360-210-R4, full ceiling air-quality stack)
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - Fan Driver   : Sense360 DAC     (S360-312, two GP8403 DACs / four 0-10V
#                                    outputs; IC2 relocated to 0x5A)
# - LED          : not included
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: main
#       files:
#         - products/sense360-ceiling-poe-airiq-fandac-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-kitchen-dac
#     friendly_name: "Kitchen Sense360 0-10V"
# ============================================================================

substitutions:
  # === Device Configuration ===
  device_name: s360-ceil-poe-airiq-rm-dac
  friendly_name: Sense360 Ceiling Kitchen 0-10V
  device_sku: S360-CORE-C-POE
  device_version: "1.0.0"
  timezone: "America/New_York"

  # === Logging ===
  log_level: INFO

  # === WiFi Behavior ===
  wifi_fast_connect: "false"

  # === WiFi AP fallback ===
  fallback_ssid: "S360 AirIQ RoomIQ DAC"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

  # === FanDAC binding — REQUIRED I2C address override ===
  # The FanDAC package defaults the second GP8403 (IC2) to 0x59, which collides
  # with the AirIQ SGP41 at 0x59 on the shared core_i2c bus. This bundle
  # relocates IC2 to 0x5A so AirIQ + FanDAC can coexist. The installer MUST set
  # the S360-312 IC2 DIP switch (SW2) to 0x5A to match (see the REQUIRED address
  # switch section in the header). IC1 stays at the package default 0x58. Bench
  # verification of the DIP-position -> address mapping is owed by
  # FANDAC-I2C-ADDR-001.
  fan_dac_2_i2c_address: "0x5A"

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Compile-time capability declaration for the shared device framework
  # (packages/base/device_framework.yaml). Values must match this config
  # string's entry in config/core-framework.json — enforced by
  # tests/test_core_framework.py. These are compile-time composition
  # facts only; no runtime hardware autodetection is claimed.
  s360_config_string: "Ceiling-POE-AirIQ-FanDAC-RoomIQ"
  s360_hardware_model: "S360-100"
  s360_hardware_revision: "R4"
  s360_capabilities: "core,power_poe,airiq,fan_dac,roomiq,presence"
  s360_capabilities_human: "Core, PoE power, AirIQ, Fan (0-10V), RoomIQ, Presence"
  s360_module_airiq: "Included"
  s360_module_fan_control: "Included"
  s360_module_roomiq: "Included"
  s360_module_presence: "Included"

# ============================================================================
# PACKAGE INCLUDES (board layer + base + profiles)
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  # Board package wraps packages/hardware/sense360_core_ceiling.yaml; defines
  # the shared `core_i2c` bus AirIQ + RoomIQ + the GP8403 DACs bind.
  core_board: !include ../../packages/boards/s360-100-core-ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_board: !include ../../packages/boards/s360-410-poe-psu.yaml

  # === Sense360 LED (S360-300) ===
  # Intentionally NOT included.

  # === Sense360 AirIQ (S360-210, full indoor air-quality stack) ===
  # SGP41 sits at 0x59 on core_i2c; the FanDAC IC2 is relocated to 0x5A above
  # so the two do not collide. AirIQ and VentIQ are mutually exclusive; this
  # bundle ships AirIQ.
  airiq_board: !include ../../packages/boards/s360-210-airiq.yaml
  airiq_profile: !include ../../packages/features/airiq_basic_profile.yaml

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  roomiq_board: !include ../../packages/boards/s360-200-roomiq.yaml
  roomiq_comfort_profile: !include ../../packages/features/comfort_basic_profile.yaml
  roomiq_presence_profile: !include ../../packages/features/presence_basic_profile.yaml

  # === Sense360 DAC (S360-312, two GP8403 DACs / four 0-10V outputs) ===
  # Canonical FanDAC alias -> packages/expansions/fan_gp8403.yaml. IC1 @ 0x58,
  # IC2 relocated to 0x5A (see the REQUIRED address override above) so it does
  # not collide with the AirIQ SGP41 @ 0x59. PACKAGE-DAC-001 implemented the
  # package; this room-bundle product adds NO WebFlash exposure / release
  # artifact / build-matrix row.
  fan_dac_module: !include ../../packages/expansions/fan_dac.yaml

  # === Sense360 TRIAC (S360-320, AC phase-cut fan driver) ===
  # NOT included. The FanTRIAC slot remains blocked per HW-005.

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

  # === Sense360 Core framework (CORE-FRAMEWORK-001) ===
  # Shared identity / capability / module-status / health entities.
  framework: !include ../../packages/base/device_framework.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Product Config"
    lambda: |-
      return {"Ceiling-POE-AirIQ-FanDAC-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
