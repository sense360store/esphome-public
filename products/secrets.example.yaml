# ============================================================================
# SECRETS EXAMPLE FOR SENSE360 ESPHOME PRODUCTS (products/)
# ============================================================================
# SEC-ESP-SECRET-GUARD-001 (security.md finding #2): a file literally named
# `secrets.yaml` is no longer tracked under products/. ESPHome resolves
# `!secret` lookups relative to the top-level YAML being compiled, so product
# configs under products/ need a secrets.yaml next to them. Copy THIS template
# to products/secrets.yaml for local builds:
#
#     cp products/secrets.example.yaml products/secrets.yaml
#
# products/secrets.yaml is gitignored (the root .gitignore `secrets.yaml` rule
# matches it at every depth). NEVER commit a real secrets.yaml. CI provisions
# its own throwaway placeholder secrets at runtime, independent of this file.
#
# These placeholders mirror the repository-root secrets.example.yaml. Replace
# every value before flashing; generate api_encryption_key, ota_password, and
# fallback_ap_password uniquely per build.
# ============================================================================

# ----------------------------------------------------------------------------
# WIFI CREDENTIALS
# ----------------------------------------------------------------------------
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# ----------------------------------------------------------------------------
# API ENCRYPTION KEY (obvious all-"a" placeholder; replace before flashing)
# ----------------------------------------------------------------------------
api_encryption_key: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa="

# ----------------------------------------------------------------------------
# OTA AND FALLBACK ACCESS POINT
# ----------------------------------------------------------------------------
ota_password: "REPLACE_WITH_SECURE_OTA_PASSWORD"
fallback_ap_password: "REPLACE_WITH_SECURE_FALLBACK_PASSWORD"

# ----------------------------------------------------------------------------
# WEB SERVER AUTHENTICATION
# ----------------------------------------------------------------------------
web_username: "admin"
web_password: "REPLACE_WITH_SECURE_WEB_PASSWORD"

# ----------------------------------------------------------------------------
# MQTT CREDENTIALS (required for AirIQ / VentIQ MQTT publishing)
# 192.0.2.0/24 is TEST-NET-1 (RFC 5737); safe to ship as a documentation IP.
# ----------------------------------------------------------------------------
mqtt_broker: "192.0.2.10"
mqtt_port: "1883"
mqtt_username: "YOUR_MQTT_USERNAME"
mqtt_password: "YOUR_MQTT_PASSWORD"

airiq_mqtt_broker: "192.0.2.10"
airiq_mqtt_port: "1883"
airiq_mqtt_username: "YOUR_MQTT_USERNAME"
airiq_mqtt_password: "YOUR_MQTT_PASSWORD"
