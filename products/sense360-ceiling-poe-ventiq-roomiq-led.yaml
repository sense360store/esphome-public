# ============================================================================
# SENSE360 LED-BEARING PREVIEW PRODUCT (compat shim) — Ceiling-POE-VentIQ-RoomIQ-LED
# ============================================================================
# BUNDLE-LAYER-001 (docs/arch-board-bundle-plan.md §3.2). This product path is
# retained as a thin compatibility shim: its composition now lives in the
# config-string-named bundle
# `products/bundles/ceiling-poe-ventiq-roomiq-led.yaml` and this file does
# nothing but `!include` that bundle.
#
# Why this path is preserved (never deleted):
#   * The customer include contract pins this exact path.
#   * `config/webflash-builds.json` resolves the WebFlash wrapper
#     `products/webflash/ceiling-poe-ventiq-roomiq-led.yaml`, which re-includes
#     this canonical path. The preview release gate is unchanged.
#
# WebFlash config string : Ceiling-POE-VentIQ-RoomIQ-LED   (byte-identical)
# WebFlash artifact name  : Sense360-Ceiling-POE-VentIQ-RoomIQ-LED-v1.0.0-preview.bin
#
# This sibling stays a PREVIEW build (non-stable channel). The stable
# Release-One target remains the LED-less `Ceiling-POE-VentIQ-RoomIQ`.
#
# Full composition, substitutions, board assembly, and product identification:
#   products/bundles/ceiling-poe-ventiq-roomiq-led.yaml
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: v1.0.0
#       files:
#         - products/sense360-ceiling-poe-ventiq-roomiq-led.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-bathroom-led
#     friendly_name: "Bathroom Sense360 LED"
# ============================================================================

packages:
  bundle: !include bundles/ceiling-poe-ventiq-roomiq-led.yaml
