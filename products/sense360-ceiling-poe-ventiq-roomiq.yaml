# ============================================================================
# SENSE360 RELEASE-ONE PRODUCT (compat shim) — Ceiling-POE-VentIQ-RoomIQ
# ============================================================================
# BUNDLE-LAYER-001 (docs/arch-board-bundle-plan.md §3.2). This product path is
# retained as a thin compatibility shim: its composition now lives in the
# config-string-named bundle `products/bundles/ceiling-poe-ventiq-roomiq.yaml`
# and this file does nothing but `!include` that bundle.
#
# Why this path is preserved (never deleted):
#   * The customer include contract pins this exact path —
#     `files: - products/sense360-ceiling-poe-ventiq-roomiq.yaml`, `ref: v1.0.0`.
#     A customer who pinned v1.0.0 is unaffected (the tag is immutable); a
#     customer following `main` gets the same resolved config through the shim.
#   * `config/webflash-builds.json` resolves the WebFlash wrapper
#     `products/webflash/ceiling-poe-ventiq-roomiq.yaml`, which re-includes this
#     canonical path. The release gate (firmware-build-release.yml) is unchanged.
#
# WebFlash config string : Ceiling-POE-VentIQ-RoomIQ      (byte-identical)
# WebFlash artifact name  : Sense360-Ceiling-POE-VentIQ-RoomIQ-vX.Y.Z-{channel}.bin
#
# Full composition, substitutions, board assembly, and product identification:
#   products/bundles/ceiling-poe-ventiq-roomiq.yaml
#
# Customer usage in their ESPHome config (pin to a release tag):
#
#   packages:
#     sense360_firmware:
#       url: https://github.com/sense360store/esphome-public
#       ref: v1.0.0
#       files:
#         - products/sense360-ceiling-poe-ventiq-roomiq.yaml
#       refresh: 1d
#
#   substitutions:
#     device_name: sense360-bathroom
#     friendly_name: "Bathroom Sense360"
# ============================================================================

packages:
  bundle: !include bundles/ceiling-poe-ventiq-roomiq.yaml
