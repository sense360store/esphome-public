# ============================================================================
# COMPILE-ONLY SKELETON — Ceiling-POE-AirIQ-RoomIQ (FW-COMPILE-POE-NONFAN-001)
# ============================================================================
# WebFlash config string : Ceiling-POE-AirIQ-RoomIQ
#
# Status — what this YAML is NOT:
#
#   * NOT a WebFlash exposed build. No entry is added to
#     `config/webflash-builds.json`; no `webflash_build_matrix: true`
#     flip; no `webflash_wrapper` is created under
#     `products/webflash/`; no `artifact_name` is declared.
#   * NOT a release artifact. No `.bin` is produced for
#     `Ceiling-POE-AirIQ-RoomIQ`; no version, channel, checksum,
#     build-info manifest, GitHub Release tag, or proof row is created.
#   * NOT hardware proof. Compile success says nothing about
#     bench / harness / silkscreen / schematic / pinmap evidence.
#     The PoE PSU (`S360-410`) `schematic_status: cataloged_unverified`
#     remains open.
#   * NOT product-catalog promotion. No entry is added to
#     `config/product-catalog.json` and no `status: production` /
#     `status: preview` flip happens. Top-level catalog scanning is
#     intentionally avoided by placing this YAML in
#     `products/compile-only/`.
#   * NOT a stable / preview promotion. The two committed
#     WebFlash builds (`Ceiling-POE-VentIQ-RoomIQ` stable,
#     `Ceiling-POE-VentIQ-RoomIQ-LED` preview) are unchanged. AirIQ +
#     RoomIQ has no shipping WebFlash build today; this compile-only
#     target does NOT change that.
#
# Purpose:
#
#   Exercise the package composition for the AirIQ + RoomIQ POE
#   variant (Core ceiling + PoE PSU + airiq_ceiling +
#   airiq_basic_profile + comfort_ceiling + comfort_basic_profile +
#   presence_ceiling + presence_basic_profile) under the current
#   ESPHome version. The constituent packages are already used
#   together by `products/sense360-core-ceiling.yaml`, so the
#   composition is known to be expressible. This skeleton surfaces
#   AirIQ + RoomIQ regressions in CI without claiming AirIQ stable /
#   preview readiness or AirIQ hardware proof.
#
# Compatibility rules (see docs/release-one.md):
# - AirIQ and VentIQ are mutually exclusive; this skeleton uses AirIQ.
# - RoomIQ can be combined with either AirIQ or VentIQ.
#
# Hardware (canonical friendly names; see docs/hardware-catalog.md):
# - Core         : Sense360 Core    (S360-100-R4, ESP32-S3, ceiling mount)
# - Power        : Sense360 PoE PSU (S360-410, IEEE 802.3af) — schematic
#                  verification pending; this compile-only target does
#                  NOT close that caveat.
# - Air Quality  : Sense360 AirIQ   (S360-AIR-C, ceiling-mount full air-quality stack)
# - Room Sense   : Sense360 RoomIQ  (S360-200-R4, comfort + presence)
# - Fan Driver   : not included     (no fan token in config string)
# - LED          : not included     (no LED token in config string)
#
# See: docs/compile-only-firmware-validation.md
# ============================================================================

substitutions:
  device_name: s360-co-ceil-poe-air-rm
  friendly_name: Sense360 Ceiling POE AirIQ RoomIQ (compile-only)
  device_sku: S360-CORE-C-POE
  device_version: "0.0.0-compile-only"
  timezone: "UTC"

  log_level: INFO
  wifi_fast_connect: "false"
  fallback_ssid: "S360 CO POE AirIQ Rm"

  # === Power configuration (PoE) ===
  power_source: poe
  poe_class: "0"
  poe_standard: "802.3af"

# ============================================================================
# PACKAGE INCLUDES
# ============================================================================
packages:
  # === External Components (radar firmware) ===
  external_components: !include ../../packages/base/external_components.yaml

  # === Base System Components ===
  base_wifi: !include ../../packages/base/wifi.yaml
  base_logging: !include ../../packages/base/logging.yaml
  base_api: !include ../../packages/base/api_encrypted.yaml
  base_ota: !include ../../packages/base/ota.yaml
  base_time: !include ../../packages/base/time.yaml

  # === Sense360 Core (Ceiling, S360-100-R4) ===
  core_hardware: !include ../../packages/hardware/sense360_core_ceiling.yaml

  # === Sense360 PoE PSU (S360-410) ===
  power_config: !include ../../packages/hardware/power_poe.yaml

  # === Sense360 AirIQ (S360-AIR-C, ceiling-mount air quality) ===
  airiq_module: !include ../../packages/expansions/airiq_ceiling.yaml
  airiq_profile: !include ../../packages/features/airiq_basic_profile.yaml

  # === Sense360 RoomIQ (S360-200-R4, comfort + presence) ===
  # The package filenames (`comfort_ceiling.yaml`, `presence_ceiling.yaml`)
  # retain the legacy split-board naming and are kept for backwards
  # compatibility (see docs/webflash-contract.md §6 footnote).
  roomiq_comfort: !include ../../packages/expansions/comfort_ceiling.yaml
  roomiq_comfort_profile: !include ../../packages/features/comfort_basic_profile.yaml
  roomiq_presence: !include ../../packages/expansions/presence_ceiling.yaml
  roomiq_presence_profile: !include ../../packages/features/presence_basic_profile.yaml

  # === Device Health & Diagnostics ===
  health: !include ../../packages/features/device_health.yaml

# ============================================================================
# PRODUCT IDENTIFICATION
# ============================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Product SKU"
    lambda: |-
      return {"${device_sku}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Firmware Version"
    lambda: |-
      return {"${device_version}"};
    update_interval: never
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} WebFlash Config"
    lambda: |-
      return {"Ceiling-POE-AirIQ-RoomIQ"};
    update_interval: never
    entity_category: diagnostic
