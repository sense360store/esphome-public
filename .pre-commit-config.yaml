# Pre-commit hooks for Sense360 ESPHome repository
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md)$
      - id: end-of-file-fixer
      - id: check-yaml
        # SEC-ESP-SECRET-GUARD-001 (security.md finding #6, accepted): --unsafe
        # is REQUIRED, not a shortcut. ESPHome configs use custom YAML tags
        # (!secret, !include, !lambda, !extend, !remove) that PyYAML's safe
        # loader rejects, so without --unsafe check-yaml fails on valid configs.
        # --unsafe only relaxes this pre-commit *lint* (it switches check-yaml
        # to a syntax-only parse); it does NOT affect runtime parsing. Do NOT
        # remove it, and do NOT mirror --unsafe / yaml.unsafe_load into real
        # config-loading code (use yaml.safe_load with registered tag
        # constructors there, as tests/validate_configs.py does).
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - --format=parsable
          - --config-data={extends: default, rules: {line-length: {max: 120}, comments: {min-spaces-from-content: 1}, document-start: disable, truthy: {check-keys: false}}}
        files: \.(yaml|yml)$

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 26.5.0
    hooks:
      - id: black
        language_version: python3.11
        files: \.py$

  # Python code linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        files: \.py$

  # C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.3
    hooks:
      - id: clang-format
        files: \.(h|cpp)$
        args: ['-i']

  # Local validation script
  - repo: local
    hooks:
      - id: validate-esphome-configs
        name: Validate ESPHome Product Configs
        entry: python tests/validate_configs.py
        language: python
        pass_filenames: false
        files: ^(products|packages|base|features|hardware)/.*\.yaml$
        additional_dependencies:
          - pyyaml>=6.0

      - id: validate-webflash-builds
        name: Validate WebFlash Build Matrix
        entry: python tests/validate_webflash_builds.py
        language: python
        pass_filenames: false
        files: ^(config/webflash-(builds|compatibility)\.json|tests/validate_webflash_builds\.py)$

      - id: check-no-tracked-secrets
        name: Ensure secrets.yaml is not tracked
        entry: python3 scripts/check-no-tracked-secrets.py
        language: system
        pass_filenames: false
        always_run: true
